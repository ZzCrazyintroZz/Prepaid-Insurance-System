var _pcPeriod = '';

function loadPeriodClose() {
  // Set default period to current month
  var now = new Date();
  var defaultPeriod = now.getFullYear() + '-' + (now.getMonth() < 9 ? '0' : '') + (now.getMonth() + 1);
  document.getElementById('pcPeriod').value = defaultPeriod;
  _pcPeriod = defaultPeriod;
  document.getElementById('pcChecklistCard').style.display = 'none';
  document.getElementById('pcHistoryCard').style.display = 'none';
  document.getElementById('pcStatusBadge').style.display = 'none';
  document.getElementById('resultPeriodClose').classList.remove('show');
  // Auto-load checklist
  setTimeout(loadPeriodChecklist, 100);
}

function loadPeriodChecklist() {
  var period = document.getElementById('pcPeriod').value.trim();
  if (!period || !/^\d{4}-\d{2}$/.test(period)) { toast('กรุณากรอกงวดในรูปแบบ YYYY-MM','er'); return; }
  _pcPeriod = period;
  document.getElementById('loaderPeriodClose').classList.remove('hidden');
  document.getElementById('pcChecklistCard').style.display = 'none';
  document.getElementById('pcHistoryCard').style.display = 'none';
  document.getElementById('pcStatusBadge').style.display = 'none';
  document.getElementById('resultPeriodClose').classList.remove('show');

  google.script.run.withSuccessHandler(function(r) {
    document.getElementById('loaderPeriodClose').classList.add('hidden');
    if (!r.ok) { toast('❌ ' + (r.error || 'Error'), 'er'); return; }

    // Get period status as well
    google.script.run.withSuccessHandler(function(statusR) {
      if (statusR.ok) {
        renderPeriodChecklist(r, statusR);
      } else {
        renderPeriodChecklist(r, null);
      }
    }).withFailureHandler(function(e) {
      renderPeriodChecklist(r, null);
    }).getPeriodStatus(period);
  }).withFailureHandler(function(e) {
    document.getElementById('loaderPeriodClose').classList.add('hidden');
    toast('❌ ' + e.message, 'er');
  }).getCloseChecklist(period);
}

function renderPeriodChecklist(checklistR, statusR) {
  document.getElementById('pcChecklistCard').style.display = 'block';
  document.getElementById('pcChecklistPeriod').textContent = checklistR.period;

  // Status badge
  var badgeEl = document.getElementById('pcStatusBadge');
  badgeEl.style.display = 'block';
  var isClosed = statusR && statusR.isClosed;
  var closedBy = statusR ? statusR.closedBy : '';
  var closedAt = statusR ? statusR.closedAt : '';
  if (isClosed) {
    badgeEl.innerHTML = '<div class="al" style="background:rgba(184,82,82,.07);border-color:rgba(184,82,82,.18);color:#fca5a5"><i class="bi bi-lock-fill"></i> 🔒 ปิดแล้ว — โดย ' + esc(closedBy) + (closedAt ? ' เมื่อ ' + esc(closedAt.substring(0,10)) : '') + '</div>';
  } else {
    badgeEl.innerHTML = '<div class="al al-ok"><i class="bi bi-unlock-fill"></i> 🔓 เปิดอยู่ — ยังไม่ได้ปิดงวด</div>';
  }

  // Checklist items
  var itemsEl = document.getElementById('pcChecklistItems');
  var items = checklistR.items || [];
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var icon = item.done ? '✅' : '⏳';
    var statusClass = item.done ? '' : 'style="color:var(--mt)"';
    html += '<div class="card" style="padding:12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px">' +
      '<div style="display:flex;align-items:center;gap:10px">' +
      '<span style="font-size:18px">' + icon + '</span>' +
      '<div><div style="font-size:13px;font-weight:500">' + esc(item.label) + '</div>' +
      '<div style="font-size:11px;color:var(--mt)" ' + statusClass + '>' + esc(item.detail) + '</div></div></div>' +
      '<button class="btn ' + (item.done ? 'btn-ghost' : 'btn-pri') + ' btn-sm" onclick="runChecklistItem(\'' + esc(checklistR.period) + '\',\'' + esc(item.key) + '\')"' + (item.done ? ' disabled' : '') + '>' +
      (item.done ? '✅ Done' : '▶️ Run') + '</button></div>';
  }
  itemsEl.innerHTML = html;

  // Close/Reopen buttons
  var closeBtn = document.getElementById('pcCloseBtn');
  var reopenBtn = document.getElementById('pcReopenBtn');
  if (isClosed) {
    closeBtn.style.display = 'none';
    reopenBtn.style.display = 'inline-flex';
    document.getElementById('pcNotes').value = statusR.notes || '';
  } else {
    closeBtn.style.display = 'inline-flex';
    reopenBtn.style.display = 'none';
    closeBtn.disabled = !checklistR.allDone;
    if (checklistR.allDone) {
      closeBtn.innerHTML = '<i class="bi bi-lock-fill"></i> Close Period ✓';
      closeBtn.className = 'btn btn-gn';
    } else {
      closeBtn.innerHTML = '<i class="bi bi-lock-fill"></i> Close Period';
      closeBtn.className = 'btn btn-ghost';
    }
  }
}

function runChecklistItem(period, itemKey) {
  document.getElementById('loaderPeriodClose').classList.remove('hidden');
  document.getElementById('resultPeriodClose').classList.remove('show');

  if (itemKey === 'preChecker') {
    // Run pre-upload checker
    google.script.run.withSuccessHandler(function(r) {
      document.getElementById('loaderPeriodClose').classList.add('hidden');
      if (r.ok && r.status === 'PASS') {
        // Mark as done
        google.script.run.withSuccessHandler(function() {
          toast('✅ Pre-Upload Checker: PASS — บันทึกแล้ว', 'ok');
          loadPeriodChecklist();
        }).markChecklistItem(period, 'preChecker');
      } else {
        var errCount = r.errorCount || 0;
        var warnCount = r.warningCount || 0;
        toast('❌ Pre-Upload Checker: ' + errCount + ' errors, ' + warnCount + ' warnings — แก้ไขก่อน', 'er');
        showResult('resultPeriodClose', '<div class="al al-er"><i class="bi bi-x-circle"></i> Pre-Upload Checker: ' + errCount + ' errors — ต้องแก้ไขก่อนปิดงวด</div>');
      }
    }).withFailureHandler(function(e) {
      document.getElementById('loaderPeriodClose').classList.add('hidden');
      toast('❌ ' + e.message, 'er');
    }).runPreUploadCheck(period);
  } else if (itemKey === 'amortRun') {
    // Run amortization
    google.script.run.withSuccessHandler(function(r) {
      document.getElementById('loaderPeriodClose').classList.add('hidden');
      if (r.ok) {
        google.script.run.withSuccessHandler(function() {
          toast('✅ Amortization: ' + r.scheduleRows + ' rows — บันทึกแล้ว', 'ok');
          loadPeriodChecklist();
        }).markChecklistItem(period, 'amortRun');
        showResult('resultPeriodClose', '<div class="al al-ok"><i class="bi bi-check-circle"></i> ' + esc(r.message) + '</div>');
      } else {
        toast('❌ Amortization: ' + (r.error || 'Error'), 'er');
        showResult('resultPeriodClose', '<div class="al al-er"><i class="bi bi-x-circle"></i> ' + (r.error || 'Error') + '</div>');
      }
    }).withFailureHandler(function(e) {
      document.getElementById('loaderPeriodClose').classList.add('hidden');
      toast('❌ ' + e.message, 'er');
    }).runMonthEndAmortization(period);
  } else if (itemKey === 'sapExported') {
    // Export SAP JE
    google.script.run.withSuccessHandler(function(r) {
      document.getElementById('loaderPeriodClose').classList.add('hidden');
      if (r.ok) {
        google.script.run.withSuccessHandler(function() {
          toast('✅ SAP JE: ' + r.totalDocs + ' docs — บันทึกแล้ว', 'ok');
          loadPeriodChecklist();
        }).markChecklistItem(period, 'sapExported');
        showResult('resultPeriodClose', '<div class="al al-ok"><i class="bi bi-check-circle"></i> ' + esc(r.message) + '</div>');
      } else {
        toast('❌ SAP JE: ' + (r.error || 'Error'), 'er');
        showResult('resultPeriodClose', '<div class="al al-er"><i class="bi bi-x-circle"></i> ' + (r.error || 'Error') + '</div>');
      }
    }).withFailureHandler(function(e) {
      document.getElementById('loaderPeriodClose').classList.add('hidden');
      toast('❌ ' + e.message, 'er');
    }).exportSAPJE(period);
  } else if (itemKey === 'voidBatchComplete') {
    // Check void status and mark done
    google.script.run.withSuccessHandler(function(r) {
      document.getElementById('loaderPeriodClose').classList.add('hidden');
      if (r.ok && r.succeeded > 0) {
        google.script.run.withSuccessHandler(function() {
          toast('✅ Void Batch: ' + r.succeeded + ' docs — บันทึกแล้ว', 'ok');
          loadPeriodChecklist();
        }).markChecklistItem(period, 'voidBatchComplete');
        showResult('resultPeriodClose', '<div class="al al-ok"><i class="bi bi-check-circle"></i> Void Batch: ' + r.succeeded + ' สำเร็จ</div>');
      } else {
        toast('❌ ยังไม่มีรายการ Void Batch', 'er');
        showResult('resultPeriodClose', '<div class="al al-er"><i class="bi bi-x-circle"></i> ยังไม่มีรายการ Void — ไปที่หน้า Void เพื่อดำเนินการ Batch Void ก่อน</div>');
      }
    }).withFailureHandler(function(e) {
      document.getElementById('loaderPeriodClose').classList.add('hidden');
      toast('❌ ' + e.message, 'er');
    }).runCloseChecklist(period);
  }
}

function onApprovalSelectAll() {

}

function onApprovalCheckChange() {

  var allChecked = true;
  all.forEach(function(cb){if(!cb.checked) allChecked = false;});
  document.getElementById('approvalSelectAll').checked = allChecked;

function updateApprovalCount() {
  var selected = document.querySelectorAll('.approval-doc-cb:checked').length;

    el.innerHTML = '✅ เลือก ' + selected + ' รายการ';

    el.textContent = document.querySelectorAll('.approval-doc-cb').length + ' รายการ';

  var selected = [];

}

  document.getElementById('resultApproval').classList.remove('show');

function executeApprove(requestId) {
  if (!confirm('✅ อนุมัติ ' + requestId + '?\n\nระบบจะรัน Amortization อัตโนมัติ')) return;

  document.getElementById('loaderApproval').classList.remove('hidden');
  document.getElementById('resultApproval').classList.remove('show');

  google.script.run.withSuccessHandler(function(r) {
    document.getElementById('loaderApproval').classList.add('hidden');
    if (r.ok) {
      var amortHtml = '';
      if (r.amortResult && r.amortResult.ok) {
        amortHtml = '<div class="al al-ok" style="margin-top:8px"><i class="bi bi-check-circle"></i> Amortization: ' + r.amortResult.scheduleRows + ' rows, ฿' + fmt(r.amortResult.totalAmount) + '</div>';
      } else if (r.amortResult) {
        amortHtml = '<div class="al al-er" style="margin-top:8px"><i class="bi bi-x-circle"></i> Amortization: ' + (r.amortResult.error || 'Failed') + '</div>';
      }
      showResult('resultApproval', '<div class="al al-ok"><i class="bi bi-check-circle"></i> ✅ ' + esc(r.message) + '</div>' + amortHtml);
      toast('✅ ' + r.message, 'ok');
      loadPendingApprovals();
      updatePendingBadge();
      loadMyRequests();
    } else {
      toast('❌ ' + (r.error || 'Error'), 'er');
      showResult('resultApproval', '<div class="al al-er"><i class="bi bi-x-circle"></i> ' + (r.error || 'Error') + '</div>');
    }
  }).withFailureHandler(function(e) {
    document.getElementById('loaderApproval').classList.add('hidden');
    toast('❌ ' + e.message, 'er');
  }).approveRequest(requestId);
}

function executeReject(requestId) {
  var reason = prompt('ระบุเหตุผลในการปฏิเสธ ' + requestId + ':');
  if (reason === null) return;
  reason = reason.trim();

  document.getElementById('loaderApproval').classList.remove('hidden');
  document.getElementById('resultApproval').classList.remove('show');

  google.script.run.withSuccessHandler(function(r) {
    document.getElementById('loaderApproval').classList.add('hidden');
    if (r.ok) {
      showResult('resultApproval', '<div class="al al-ok"><i class="bi bi-check-circle"></i> ❌ ' + esc(r.message) + '</div>');
      toast('❌ ' + r.message, 'ok');
      loadPendingApprovals();
      updatePendingBadge();
    } else {
      toast('❌ ' + (r.error || 'Error'), 'er');
      showResult('resultApproval', '<div class="al al-er"><i class="bi bi-x-circle"></i> ' + (r.error || 'Error') + '</div>');
    }
  }).withFailureHandler(function(e) {
    document.getElementById('loaderApproval').classList.add('hidden');
    toast('❌ ' + e.message, 'er');
  }).rejectRequest(requestId, reason);
}

// ========== C4: BUDGET vs ACTUAL ==========

var _budgetRows = [];

function loadBudgetData() {
  var period = document.getElementById('budgetPeriod').value.trim();
  if (!period || !/^\d{4}-\d{2}$/.test(period)) {
    toast('กรุณากรอกงวดในรูปแบบ YYYY-MM', 'er');
    return;
  }
  document.getElementById('budgetStatus').textContent = '⏳ กำลังโหลด...';
  google.script.run.withSuccessHandler(function(r) {
    if (!r.ok) { document.getElementById('budgetStatus').textContent = '❌ ' + (r.error || ''); return; }
    _budgetRows = (r.items || []).map(function(it) {
      return { gl: it.gl, costCenter: it.costCenter, description: it.description, budgetAmount: it.budgetAmount, _selected: false };
    });
    renderBudgetTable();
    document.getElementById('budgetStatus').textContent = '✅ โหลด ' + _budgetRows.length + ' รายการ';
    toast('✅ โหลดงบประมาณงวด ' + period + ' (' + _budgetRows.length + ' รายการ)', 'ok');
  }).withFailureHandler(function(e) {
    document.getElementById('budgetStatus').textContent = '❌ ' + e.message;
  }).getBudgetData(period);
}

function renderBudgetTable() {
  var tb = document.getElementById('budgetBody');
  if (_budgetRows.length === 0) {
    tb.innerHTML = '<tr id="budgetEmptyRow"><td colspan="5" style="text-align:center;color:var(--mt);padding:20px">ไม่มีรายการ — กด Add Row เพื่อเพิ่ม</td></tr>';
    updateBudgetTotal();
    return;
  }
  tb.innerHTML = _budgetRows.map(function(row, i) {
    var selected = row._selected ? 'checked' : '';
    return '<tr>' +
      '<td style="text-align:center"><input type="checkbox" class="budget-row-cb" ' + selected + ' onchange="toggleBudgetRowSel(' + i + ')"></td>' +
      '<td><input class="fi" id="bg_gl_' + i + '" value="' + esc(row.gl) + '" style="width:100%;min-width:80px;font-family:JetBrains Mono,mono;font-size:10px;padding:4px 6px"></td>' +
      '<td><input class="fi" id="bg_cc_' + i + '" value="' + esc(row.costCenter) + '" style="width:100%;min-width:80px;font-size:10px;padding:4px 6px"></td>' +
      '<td><input class="fi" id="bg_desc_' + i + '" value="' + esc(row.description) + '" style="width:100%;min-width:120px;font-size:10px;padding:4px 6px"></td>' +
      '<td><input class="fi" id="bg_amt_' + i + '" type="number" step="0.01" min="0" value="' + (row.budgetAmount || '') + '" style="width:100%;min-width:100px;font-family:JetBrains Mono,mono;font-size:10px;padding:4px 6px;text-align:right" onchange="updateBudgetTotal()"></td>' +
      '</tr>';
  }).join('');
  document.getElementById('budgetItemCount').textContent = _budgetRows.length + ' items';
  updateBudgetTotal();
}

function updateBudgetTotal() {
  var total = 0;
  for (var i = 0; i < _budgetRows.length; i++) {
    var amtEl = document.getElementById('bg_amt_' + i);
    if (amtEl) total += Number(amtEl.value) || 0;
  }
  document.getElementById('budgetTotal').textContent = total.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function addBudgetRow() {
  _budgetRows.push({ gl: '', costCenter: '', description: '', budgetAmount: 0, _selected: false });
  renderBudgetTable();
  // Scroll to bottom
  var wrap = document.querySelector('#budgetTable').closest('.tw');
  if (wrap) wrap.scrollTop = wrap.scrollHeight;
}

function toggleBudgetRowSel(i) {
  _budgetRows[i]._selected = !_budgetRows[i]._selected;
}

function budgetSelectAllToggle() {
  var checked = document.getElementById('budgetSelectAll').checked;
  for (var i = 0; i < _budgetRows.length; i++) {
    _budgetRows[i]._selected = checked;
  }
  renderBudgetTable();
}

function deleteSelectedBudgetRows() {
  var before = _budgetRows.length;
  _budgetRows = _budgetRows.filter(function(r) { return !r._selected; });
  if (_budgetRows.length === before) { toast('กรุณาเลือกรายการที่จะลบ', 'er'); return; }
  renderBudgetTable();
  toast('✅ ลบ ' + (before - _budgetRows.length) + ' รายการ', 'ok');
}

function saveBudgetData() {
  var period = document.getElementById('budgetPeriod').value.trim();
  if (!period || !/^\d{4}-\d{2}$/.test(period)) {
    toast('กรุณากรอกงวดในรูปแบบ YYYY-MM', 'er');
    return;
  }
  // Read current values from inputs
  var items = [];
  for (var i = 0; i < _budgetRows.length; i++) {
    var glEl = document.getElementById('bg_gl_' + i);
    var ccEl = document.getElementById('bg_cc_' + i);
    var descEl = document.getElementById('bg_desc_' + i);
    var amtEl = document.getElementById('bg_amt_' + i);
    if (glEl && amtEl) {
      var gl = glEl.value.trim();
      var amt = Number(amtEl.value) || 0;
      if (gl && amt > 0) {
        items.push({
          gl: gl,
          costCenter: ccEl ? ccEl.value.trim() : '',
          description: descEl ? descEl.value.trim() : '',
          budgetAmount: amt
        });
      }
    }
  }
  
  if (items.length === 0) { toast('❌ ต้องมีรายการงบประมาณอย่างน้อย 1 รายการ', 'er'); return; }
  
  document.getElementById('budgetStatus').textContent = '⏳ กำลังบันทึก...';
  google.script.run.withSuccessHandler(function(r) {
    if (r.ok) {

  }).withFailureHandler(function(e) {

function loadBudgetVsActual() {
  var period = document.getElementById('budgetPeriod').value.trim();
  if (!period || !/^\d{4}-\d{2}$/.test(period)) {
    toast('กรุณากรอกงวดในรูปแบบ YYYY-MM', 'er');
    return;
  }
  
  document.getElementById('budgetStatus').textContent = '⏳ กำลังเปรียบเทียบ...';
  document.getElementById('resultBudgetVsActual').classList.remove('show');
  
  google.script.run.withSuccessHandler(function(r) {
    document.getElementById('budgetStatus').textContent = '✅ เปรียบเทียบเรียบร้อย';
    if (!r.ok) { toast('❌ ' + (r.error || ''), 'er'); return; }
    
    document.getElementById('bvaPeriod').textContent = r.period;
    document.getElementById('bvaBudget').textContent = '฿' + fmt(r.budget);
    document.getElementById('bvaActual').textContent = '฿' + fmt(r.actual);
    
    // Variance coloring
    var varEl = document.getElementById('bvaVariance');
    varEl.textContent = (r.variance >= 0 ? '+' : '') + '฿' + fmt(Math.abs(r.variance));
    varEl.style.color = r.variance <= 0 ? 'var(--gn)' : 'var(--rd)';
    document.getElementById('bvaVarianceCard').style.borderLeftColor = r.variance <= 0 ? 'var(--gn)' : 'var(--rd)';
    
    var pctEl = document.getElementById('bvaPct');
    pctEl.textContent = r.variancePct >= 999 ? '—' : r.variancePct.toFixed(2) + '%';
    pctEl.style.color = r.variancePct <= 100 ? 'var(--gn)' : 'var(--rd)';
    
    // Render table
    var tb = document.getElementById('bvaBody');
    if (r.items && r.items.length > 0) {
      tb.innerHTML = r.items.map(function(it) {
        var varColor = it.variance <= 0 ? 'var(--gn)' : 'var(--rd)';
        return '<tr>' +
          '<td style="font-family:JetBrains Mono,mono">' + esc(it.gl) + '</td>' +
          '<td style="font-family:JetBrains Mono,mono">' + esc(it.costCenter) + '</td>' +
          '<td>' + esc(it.description) + '</td>' +
          '<td class="num">฿' + fmt(it.budget) + '</td>' +
          '<td class="num">฿' + fmt(it.actual) + '</td>' +
          '<td class="num" style="color:' + varColor + '">' + (it.variance >= 0 ? '+' : '') + '฿' + fmt(it.variance) + '</td>' +
          '<td class="num" style="color:' + varColor + '">' + (it.pct >= 999 ? '—' : it.pct.toFixed(2) + '%') + '</td>' +
          '</tr>';
      }).join('');
    } else {
      tb.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--mt)">No items</td></tr>';
    }
    
    // Render chart
    renderBudgetVsActualChart(r);
    
    document.getElementById('resultBudgetVsActual').classList.add('show');
    toast('✅ Budget vs Actual for ' + r.period, 'ok');
  }).withFailureHandler(function(e) {
    document.getElementById('budgetStatus').textContent = '❌ ' + e.message;
  }).getBudgetVsActual(period);
}

function renderBudgetVsActualChart(r) {
  destroyCharts();
  if (!r.items || r.items.length === 0) return;
  
  var ctx = document.getElementById('bvaChart');
  if (!ctx) return;
  ctx = ctx.getContext('2d');
  
  var isLight = document.body.classList.contains('light');
  var tickColor = isLight ? '#88827a' : '#676460';
  var gridColor = isLight ? 'rgba(0,0,0,.06)' : 'rgba(255,255,255,.06)';
  
  var labels = r.items.map(function(it) { return it.gl; });
  var budgetData = r.items.map(function(it) { return it.budget; });
  var actualData = r.items.map(function(it) { return it.actual; });
  
  chartInstances.bva = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Budget',
          data: budgetData,
          backgroundColor: 'rgba(88,136,187,.6)',
          borderRadius: 3
        },
        {
          label: 'Actual',
          data: actualData,
          backgroundColor: 'rgba(201,169,110,.6)',
          borderRadius: 3
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { color: tickColor, font: { size: 10 }, boxWidth: 12, padding: 8 } }
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: tickColor, font: { size: 9 } } },
        y: { grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 9 }, callback: function(v) { return fmt(v); } } }
      }
    }
  });
}

var _glreconGlAccounts = [];
var _glreconBalances = [];

function loadGLRecon() {
  // Set default period to current month
  var now = new Date();
  var defaultPeriod = now.getFullYear() + '-' + (now.getMonth() < 9 ? '0' : '') + (now.getMonth() + 1);
  document.getElementById('glreconPeriod').value = defaultPeriod;

  // Load GL accounts from system
  loadGLAccountSummary();

  loadGLBalances();
  
  // Set default tab
  setGLReconTab('input');
}

function loadGLAccountSummary() {
  document.getElementById('glreconBalanceBody').innerHTML = 
    '<tr><td colspan="5" style="text-align:center;color:var(--mt);padding:20px">⏳ กำลังโหลด GL accounts...</td></tr>';
  
  google.script.run.withSuccessHandler(function(r) {
    if (!r.ok || !r.accounts) {
      document.getElementById('glreconBalanceBody').innerHTML = 
        '<tr><td colspan="5" style="text-align:center;color:var(--mt)">' + (r.error || 'Error') + '</td></tr>';
      return;
    }
    _glreconGlAccounts = r.accounts;
    renderGLBalanceTable();
  }).withFailureHandler(function(e) {
    document.getElementById('glreconBalanceBody').innerHTML = 
      '<tr><td colspan="5" style="text-align:center;color:var(--rd)">Error: ' + e.message + '</td></tr>';
  }).getGLSummary();
}

function loadGLBalances() {
  var period = document.getElementById('glreconPeriod').value.trim();
  if (!period) return;
  
  google.script.run.withSuccessHandler(function(r) {
    if (r.ok && r.balances) {
      _glreconBalances = r.balances.slice();
      renderGLBalanceTable();
    }
  }).withFailureHandler(function(e) {
    // silent
  }).getGLBalances(period);
}

function renderGLBalanceTable() {
  var tbody = document.getElementById('glreconBalanceBody');
  var empty = document.getElementById('glreconBalanceEmpty');
  
  // Build a lookup of existing balances by glCode
  var balanceMap = {};
  for (var i = 0; i < _glreconBalances.length; i++) {
    balanceMap[_glreconBalances[i].glCode] = _glreconBalances[i].balance;
  }
  
  // Start with system accounts, then add any custom GLs from saved balances
  var allGlCodes = {};
  var rows = [];
  
  // System accounts first
  for (var i = 0; i < _glreconGlAccounts.length; i++) {
    var acc = _glreconGlAccounts[i];
    allGlCodes[acc.glCode] = true;
    rows.push({
      glCode: acc.glCode,
      glName: acc.glName,
      systemAmount: acc.totalAmount,
      balance: balanceMap[acc.glCode] !== undefined ? balanceMap[acc.glCode] : 0,
      isSystem: true
    });
  }
  
  // Add any custom GLs from saved balances not in system
  for (var i = 0; i < _glreconBalances.length; i++) {
    if (!allGlCodes[_glreconBalances[i].glCode]) {
      rows.push({
        glCode: _glreconBalances[i].glCode,
        glName: _glreconBalances[i].glName || '(custom)',
        systemAmount: 0,
        balance: _glreconBalances[i].balance,
        isSystem: false
      });
    }
  }
  
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--mt);padding:20px">ไม่มี GL accounts ในระบบ</td></tr>';
    document.getElementById('glreconBalanceCount').textContent = '0 accounts';
    return;
  }
  
  var html = '';
  var totalSystem = 0;
  var totalBalance = 0;
  
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    totalSystem += r.systemAmount;
    totalBalance += r.balance;
    html += '<tr>' +
      '<td style="font-family:JetBrains Mono,mono;font-size:10px">' + esc(r.glCode) + '</td>' +
      '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;font-size:11px">' + esc(r.glName || '') + 
      (!r.isSystem ? ' <span style="color:var(--gold);font-size:9px">(custom)</span>' : '') + '</td>' +
      '<td class="num" style="font-size:11px">฿' + fmt(r.systemAmount) + '</td>' +
      '<td class="num"><input class="fi" type="number" step="0.01" style="max-width:140px;font-size:11px;padding:4px 8px;text-align:right;font-family:JetBrains Mono,mono" ' +
      'id="glb_' + esc(r.glCode) + '" value="' + r.balance + '" onchange="updateGLReconTotals()" onkeyup="updateGLReconTotals()"></td>' +
      '<td style="text-align:center">' +
      '<button class="btn btn-ghost btn-sm" onclick="removeGLRow(\\'' + esc(r.glCode) + '\\')" style="padding:2px 6px;font-size:10px;color:var(--rd)">✕</button></td></tr>';
  }
  
  tbody.innerHTML = html;
  document.getElementById('glreconBalanceCount').textContent = rows.length + ' accounts';
  document.getElementById('glreconSystemTotal').textContent = fmt(totalSystem);
  document.getElementById('glreconEnteredTotal').textContent = fmt(totalBalance);
}

function updateGLReconTotals() {
  var rows = document.querySelectorAll('#glreconBalanceBody tr');
  var total = 0;
  rows.forEach(function(row) {
    var inp = row.querySelector('input[type=number]');
    if (inp) total += parseFloat(inp.value) || 0;
  });
  document.getElementById('glreconEnteredTotal').textContent = fmt(total);
}

function addGLBalanceRow() {
  var tbody = document.getElementById('glreconBalanceBody');

  if (emptyMsg) {
    tbody.innerHTML = '';
  }

    '<td class="num" style="font-size:11px">฿0.00</td>' +
    '<td class="num"><input class="fi" type="number" step="0.01" style="max-width:140px;font-size:11px;padding:4px 8px;text-align:right;font-family:JetBrains Mono,mono" ' +
    'id="glb_' + esc(glCode) + '" value="0" onchange="updateGLReconTotals()" onkeyup="updateGLReconTotals()"></td>' +
    '<td style="text-align:center">' +
    '<button class="btn btn-ghost btn-sm" onclick="this.closest(\\'tr\\').remove();updateGLReconTotals()" style="padding:2px 6px;font-size:10px;color:var(--rd)">✕</button></td>';
  tbody.appendChild(tr);
  updateGLReconTotals();

function removeGLRow(glCode) {
  var inp = document.getElementById('glb_' + glCode);

    var tr = inp.closest('tr');
    if (tr) tr.remove();
  }
  updateGLReconTotals();
}

function saveGLBalances() {
  var period = document.getElementById('glreconPeriod').value.trim();
  if (!period || !/^\\d{4}-\\d{2}$/.test(period)) {
    toast('กรุณากรอกงวดในรูปแบบ YYYY-MM', 'er');
    return;
  }
  
  // Gather all GL balances from the table
  var balances = [];
  var rows = document.querySelectorAll('#glreconBalanceBody tr');
  rows.forEach(function(row) {
    var inputs = row.querySelectorAll('input[type=number]');
    if (inputs.length === 0) return;
    var inp = inputs[0];
    // Get GL code from the first td's input or text
    var glCodeTd = row.querySelector('td:first-child');
    if (!glCodeTd) return;
    var glCodeInput = glCodeTd.querySelector('input');
    var glCode = glCodeInput ? glCodeInput.value.trim() : glCodeTd.textContent.trim();
    if (!glCode) return;
    
    var glNameTd = row.querySelector('td:nth-child(2)');
    var glName = glNameTd ? glNameTd.textContent.replace(/\\(custom\\)/g, '').trim() : '';
    
    var balance = parseFloat(inp.value) || 0;
    balances.push({glCode: glCode, glName: glName, balance: balance});
  });
  
  if (balances.length === 0) {
    toast('ไม่มีข้อมูล GL Balance', 'er');
    return;
  }
  
  document.getElementById('loaderGLReconGlobal').classList.remove('hidden');
  
  google.script.run.withSuccessHandler(function(r) {
    document.getElementById('loaderGLReconGlobal').classList.add('hidden');
    if (r.ok) {
      toast('✅ ' + r.message, 'ok');
    } else {
      toast('❌ ' + (r.error || 'Error'), 'er');
    }
  }).withFailureHandler(function(e) {
    document.getElementById('loaderGLReconGlobal').classList.add('hidden');
    toast('❌ ' + e.message, 'er');
  }).saveGLBalance(period, balances);
}

function setGLReconTab(tab) {
  // Update tab buttons
  ['input', 'recon', 'history'].forEach(function(t) {
    var btn = document.getElementById('glreconTab' + t.charAt(0).toUpperCase() + t.slice(1));
    if (btn) btn.className = 'btn ' + (t === tab ? 'btn-pri' : 'btn-ghost');
  });
  
  document.getElementById('glreconInputContent').style.display = tab === 'input' ? 'block' : 'none';
  document.getElementById('glreconReconContent').style.display = tab === 'recon' ? 'block' : 'none';
  document.getElementById('glreconHistoryContent').style.display = tab === 'history' ? 'block' : 'none';
  
  if (tab === 'history') loadGLReconHistory();
  if (tab === 'recon') document.getElementById('resultGLRecon').classList.remove('show');
}

function runGLRecon() {
  var period = document.getElementById('glreconPeriod').value.trim();
  if (!period || !/^\\d{4}-\\d{2}$/.test(period)) {
    toast('กรุณากรอกงวดในรูปแบบ YYYY-MM', 'er');
    return;
  }
  
  document.getElementById('loaderGLRecon').classList.remove('hidden');
  document.getElementById('resultGLRecon').classList.remove('show');
  document.getElementById('glreconReconResults').style.display = 'none';
  
  google.script.run.withSuccessHandler(function(r) {
    document.getElementById('loaderGLRecon').classList.add('hidden');
    if (!r.ok) {
      document.getElementById('resultGLRecon').innerHTML = '<div class="al al-er"><i class="bi bi-x-circle"></i> ' + (r.error || 'Error') + '</div>';
      document.getElementById('resultGLRecon').classList.add('show');
      return;
    }
    
    // Summary KPIs
    document.getElementById('glreconGLBalanceTotal').textContent = '฿' + fmt(r.totalGLBalance);
    document.getElementById('glreconSystemTotalKpi').textContent = '฿' + fmt(r.totalSystemBalance);
    document.getElementById('glreconDifferenceTotal').textContent = '฿' + fmt(r.totalDifference);
    
    // Color code the diff card
    var diffCard = document.getElementById('glreconDiffCard');
    var diffVal = Math.abs(r.totalDifference);
    var glTotal = r.totalGLBalance || 1;
    var diffPct = diffVal / glTotal;
    if (diffVal < 0.01) {
      diffCard.className = 'kpi gn';
    } else if (diffPct < 0.01) {
      diffCard.className = 'kpi';
    } else if (diffPct < 0.05) {
      diffCard.className = 'kpi';
    } else {
      diffCard.className = 'kpi rd';
    }
    
    // Detail table
    var tb = document.getElementById('glreconReconBody');
    if (!r.items || r.items.length === 0) {
      tb.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--mt)">No items</td></tr>';
    } else {
      tb.innerHTML = r.items.map(function(it) {
        var diffAbs = Math.abs(it.difference);
        var color = 'var(--gn)';
        var icon = '✅';
        if (diffAbs > 0.01) {
          if (it.diffPercent <= 1) { color = 'var(--gold)'; icon = '⚠️'; }
          else { color = 'var(--rd)'; icon = '❌'; }
        }
        return '<tr>' +
          '<td style="font-family:JetBrains Mono,mono;font-size:10px">' + esc(it.glCode) + '</td>' +
          '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;font-size:11px">' + esc(it.glName || '') + '</td>' +
          '<td class="num" style="font-size:11px">฿' + fmt(it.glBalance) + '</td>' +
          '<td class="num" style="font-size:11px">฿' + fmt(it.systemTotal) + '</td>' +
          '<td class="num" style="font-size:11px;color:' + color + '">' + (it.difference >= 0 ? '+' : '') + '฿' + fmt(it.difference) + '</td>' +
          '<td class="num" style="font-size:11px;color:' + color + '">' + (it.diffPercent !== undefined ? it.diffPercent.toFixed(1) + '%' : '—') + '</td>' +
          '<td style="text-align:center;font-size:14px">' + icon + '</td></tr>';
      }).join('');
    }
    
    document.getElementById('glreconReconResults').style.display = 'block';
    toast('✅ Reconciliation completed for ' + period, 'ok');
    
  }).withFailureHandler(function(e) {
    document.getElementById('loaderGLRecon').classList.add('hidden');
    document.getElementById('resultGLRecon').innerHTML = '<div class="al al-er"><i class="bi bi-x-circle"></i> ' + e.message + '</div>';
    document.getElementById('resultGLRecon').classList.add('show');
    toast('❌ ' + e.message, 'er');
  }).runGLReconciliation(period);
}

function exportGLReconReport() {
  var period = document.getElementById('glreconPeriod').value.trim();
  if (!period) { toast('กรุณาระบุงวด', 'er'); return; }
  
  document.getElementById('loaderGLReconGlobal').classList.remove('hidden');
  
  google.script.run.withSuccessHandler(function(r) {
    document.getElementById('loaderGLReconGlobal').classList.add('hidden');
    if (!r.ok) {
      toast('❌ ' + (r.error || 'Error'), 'er');
      return;
    }
    
    // Show report in result box
    var el = document.getElementById('resultGLReconExport');
    el.innerHTML = '<div class="al al-ok"><i class="bi bi-check-circle"></i> Report generated</div>' +
      '<pre style="background:var(--bg);border:1px solid var(--bdr);border-radius:5px;padding:14px;margin-top:8px;font-family:JetBrains Mono,mono;font-size:10px;max-height:400px;overflow:auto;white-space:pre-wrap">' +
      esc(r.report) + '</pre>' +
      '<div class="btn-row" style="margin-top:8px">' +
      '<button class="btn btn-ghost btn-sm" onclick="copyGLReconReport()"><i class="bi bi-clipboard"></i> Copy to Clipboard</button>' +
      '</div>';
    el.classList.add('show');
    toast('✅ Report generated', 'ok');
  }).withFailureHandler(function(e) {
    document.getElementById('loaderGLReconGlobal').classList.add('hidden');
    toast('❌ ' + e.message, 'er');
  }).exportReconciliationReport(period);
}

function copyGLReconReport() {
  var pre = document.querySelector('#resultGLReconExport pre');
  if (!pre) return;
  var text = pre.textContent;
  navigator.clipboard.writeText(text).then(function() {
    toast('✅ Copied to clipboard', 'ok');
  }).catch(function() {
    toast('❌ Failed to copy', 'er');
  });
}

function loadGLReconHistory() {
  document.getElementById('loaderGLReconGlobal').classList.remove('hidden');
  
  google.script.run.withSuccessHandler(function(r) {
    document.getElementById('loaderGLReconGlobal').classList.add('hidden');
    if (!r.ok || !r.history) {
      toast('❌ ' + (r.error || 'Error'), 'er');
      return;
    }
    
    var tb = document.getElementById('glreconHistoryBody');
    if (r.history.length === 0) {
      tb.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--mt)">ไม่มีประวัติ</td></tr>';
      return;
    }
    
    tb.innerHTML = r.history.map(function(h) {
      var diffAbs = Math.abs(h.totalDifference);
      var statusIcon = h.status === 'PASS' ? '✅' : (h.status === 'WARN' ? '⚠️' : '❌');
      var statusColor = h.status === 'PASS' ? 'var(--gn)' : (h.status === 'WARN' ? 'var(--gold)' : 'var(--rd)');
      return '<tr>' +
        '<td style="font-family:JetBrains Mono,mono;font-size:10px">' + esc(h.id) + '</td>' +
        '<td style="font-family:JetBrains Mono,mono;font-size:10px">' + esc(h.period) + '</td>' +
        '<td style="font-size:10px">' + esc(h.ranAt.substring(0, 16).replace('T', ' ')) + '</td>' +
        '<td style="font-size:10px">' + esc(h.ranBy || '—') + '</td>' +
        '<td class="num" style="font-size:11px">฿' + fmt(h.totalGLBalance) + '</td>' +
        '<td class="num" style="font-size:11px">฿' + fmt(h.totalSystemBalance) + '</td>' +
        '<td class="num" style="font-size:11px;color:' + statusColor + '">' + (h.totalDifference >= 0 ? '+' : '') + '฿' + fmt(h.totalDifference) + '</td>' +
        '<td style="text-align:center;font-size:14px;color:' + statusColor + '">' + statusIcon + ' ' + esc(h.status) + '</td></tr>';
    }).join('');
    toast('✅ โหลดประวัติ ' + r.total + ' รายการ', 'ok');
  }).withFailureHandler(function(e) {
    document.getElementById('loaderGLReconGlobal').classList.add('hidden');
    toast('❌ ' + e.message, 'er');
  }).getReconciliationHistory(100, 0);
}
</script>
