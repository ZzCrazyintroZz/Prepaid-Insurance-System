<script>
// ========== DARK MODE ==========
function toggleDark() {
  document.body.classList.toggle('light');
  var icon = document.getElementById('darkIcon');
  icon.className = document.body.classList.contains('light') ? 'bi bi-sun' : 'bi bi-moon-stars';
  localStorage.setItem('pa_theme', document.body.classList.contains('light') ? 'light' : 'dark');
}
(function(){if(localStorage.getItem('pa_theme')==='light'){document.body.classList.add('light');
  document.getElementById('darkIcon').className='bi bi-sun';}})();

// ========== HELPERS ==========
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;')}
function fmt(n){if(n===undefined||n===null)return'—';return Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function tost(msg,type){var c=document.getElementById('toastContainer'),t=document.createElement('div');t.className='toast '+(type||'');t.textContent=msg;c.appendChild(t);setTimeout(function(){t.remove()},3000)}
function toast(msg,type){tost(msg,type)}
function showResult(id, html){var el=document.getElementById(id);el.innerHTML=html;el.classList.add('show')}
var chartInstances={};

// ========== NAVIGATION ==========
function go(p){
  // Convert page name to section id: first letter uppercase
  var sectionId = 'sec' + p.charAt(0).toUpperCase() + p.slice(1);
  var navId = 'nav-' + p;
  // Hide all sections
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')});
  // Show target section
  var secEl = document.getElementById(sectionId);
  if(secEl) secEl.classList.add('active');
  // Update sidebar nav
  document.querySelectorAll('.ni').forEach(function(n){n.classList.remove('on')});
  var navEl = document.getElementById(navId);
  if(navEl) navEl.classList.add('on');
  // Update bottom nav
  document.querySelectorAll('.bn-item').forEach(function(b){b.classList.remove('on')});
  var bnMap = {dashboard:0, amort:1, sap:2, sync:3, admin:4, settings:5};
  var bnIdx = bnMap[p];
  if(bnIdx !== undefined){
    var items = document.querySelectorAll('.bn-item');
    if(items[bnIdx]) items[bnIdx].classList.add('on');
  }
  // Close mobile nav
  if(window.innerWidth <= 768){
    var nav = document.querySelector('nav');
    if(nav) nav.classList.remove('open');
    var overlay = document.getElementById('navOverlay');
    if(overlay) overlay.classList.remove('show');
  }
  // Load page-specific data
  if(p==='dashboard') loadDashboard();
  if(p==='void') loadVoidDocs();
  if(p==='guide') loadGuide();
  if(p==='sync') loadSyncData();
  if(p==='admin') loadAdminConsole();
  if(p==='audit') loadAuditLog();
}
// Backward compatibility: switchTab calls go()
function switchTab(p){go(p);}

// ========== MOBILE NAV TOGGLE ==========
function toggleNav(){
  var nav = document.querySelector('nav');
  var overlay = document.getElementById('navOverlay');
  if(nav) nav.classList.toggle('open');
  if(overlay) overlay.classList.toggle('show');
}
function checkMobile(){
  var hamburger = document.getElementById('hamburger');
  if(!hamburger) return;
  if(window.innerWidth <= 768){
    hamburger.style.display = 'flex';
  } else {
    hamburger.style.display = 'none';
    var nav = document.querySelector('nav');
    if(nav) nav.classList.remove('open');
    var overlay = document.getElementById('navOverlay');
    if(overlay) overlay.classList.remove('show');
  }
}
window.addEventListener('resize', checkMobile);

// ========== LOAD DASHBOARD ==========
function loadDashboard(){
  google.script.run.withSuccessHandler(function(r){
    if(!r.ok){document.getElementById('dashSub').textContent='Error: '+(r.error||'');return}
    // Existing KPIs
    document.getElementById('dTotalItems').textContent=r.totalItems.toLocaleString();
    document.getElementById('dTotalAmt').textContent=fmt(r.totalAmortization);
    document.getElementById('dCurPeriod').textContent=r.currentPeriod;
    document.getElementById('dashSub').textContent=r.totalItems.toLocaleString()+' รายการ · '+r.currentPeriod;
    document.getElementById('statusTxt').textContent=r.totalItems+' rec';
    document.getElementById('statusDot').className='dot g';
    
    // New KPI Row 1
    document.getElementById('dActiveItems').textContent=r.activeItems!==undefined?r.activeItems.toLocaleString():'—';
    document.getElementById('dCompletedItems').textContent='Completed: '+(r.completedItems!==undefined?r.completedItems.toLocaleString():'—');
    document.getElementById('dTotalRemaining').textContent=r.totalRemaining!==undefined?'฿'+fmt(r.totalRemaining):'—';
    document.getElementById('dAvgDuration').textContent=r.avgDurationMonths!==undefined?r.avgDurationMonths.toFixed(1):'—';
    document.getElementById('dExpiringThisMonth').textContent=r.expiringThisMonth!==undefined?r.expiringThisMonth.toLocaleString():'—';
    if(r.momChange && r.momChange.changePercent !== undefined && r.momChange.changePercent !== null){
      var momV = r.momChange.changePercent;
      document.getElementById('dMomChange').textContent=(momV>0?'+':'')+momV.toFixed(1)+'%';
      document.getElementById('dMomChange').style.color=momV>=0?'var(--gn)':'var(--rd)';
      document.getElementById('dMomPeriod').textContent=r.momChange.period||'';
    } else {
      document.getElementById('dMomChange').textContent='—';
      document.getElementById('dMomPeriod').textContent='';
    }
    
    // New KPI Row 2 — Largest Item
    if(r.largestItem){
      document.getElementById('dLargestItem').textContent=(r.largestItem.docNo||'')+' — '+(r.largestItem.description||'').substring(0,40);
      document.getElementById('dLargestAmt').textContent='฿'+fmt(r.largestItem.amount);
    } else {
      document.getElementById('dLargestItem').textContent='—';
      document.getElementById('dLargestAmt').textContent='';
    }
    // Health Score
    var hs = r.healthScore !== undefined ? r.healthScore : 0;
    document.getElementById('dHealthScore').textContent=hs+'%';
    var bar = document.getElementById('dHealthBar');
    bar.style.width=hs+'%';
    bar.style.background=hs>=80?'var(--gn)':hs>=50?'var(--gold)':'var(--rd)';
    
    // Data Freshness (S-14)
    var freshnessEl = document.getElementById('dataFreshnessBody');
    var now = new Date();
    freshnessEl.innerHTML =
      '<div style="display:grid;grid-template-columns:auto 1fr;gap:6px 12px;font-size:12px">'+
      '<span style="color:var(--mt)">Last Checked:</span><span>'+now.toLocaleString('th-TH')+'</span>'+
      '<span style="color:var(--mt)">Data Source:</span><span>Input Sheet ('+(r.totalItems||0)+' records)</span>'+
      '<span style="color:var(--mt)">Refresh:</span><span>Auto (5-min cache)</span>'+
      '<span style="color:var(--mt)">Status:</span><span><span class="dot g" style="display:inline-block;vertical-align:middle;margin-right:4px"></span> Online</span>'+
      '</div>';
    
    // Render all charts
    renderCharts(r);
    // Phase A: drill-down dashboard
    setTimeout(function(){setupDashboardDrillDown(r);},50);
  }).withFailureHandler(function(e){
    document.getElementById('dashSub').textContent='Error: '+e.message;
    document.getElementById('statusTxt').textContent='Error';
    document.getElementById('statusDot').className='dot r';
  }).getDashboardData();
}

// ========== RENDER CHARTS ==========
function renderCharts(r){
  destroyCharts();
  var isLight=document.body.classList.contains('light');
  var gridColor=isLight?'rgba(0,0,0,.06)':'rgba(255,255,255,.06)';
  var tickColor=isLight?'#88827a':'#676460';
  var palette=['rgba(201,169,110,.7)','rgba(88,136,187,.7)','rgba(58,159,101,.7)','rgba(184,82,82,.7)','rgba(128,112,204,.7)',
    'rgba(201,169,110,.5)','rgba(88,136,187,.5)','rgba(58,159,101,.5)','rgba(184,82,82,.5)','rgba(128,112,204,.5)'];
  var paletteSolid=['#C9A96E','#5888BB','#3A9F65','#B85252','#8070CC','#C9A96E','#5888BB','#3A9F65','#B85252','#8070CC'];
  
  // ---- 1. Trend (existing) ----
  if(r.trend && r.trend.length>0){
    var ctx=document.getElementById('trendChart');
    if(ctx){
      ctx=ctx.getContext('2d');
      chartInstances.trend=new Chart(ctx,{
        type:'line',
        data:{
          labels:r.trend.map(function(t){return t.period}),
          datasets:[{
            label:'Amortization',
            data:r.trend.map(function(t){return t.amount}),
            borderColor:'#C9A96E',
            backgroundColor:'rgba(201,169,110,.08)',
            fill:true,tension:.3,pointRadius:3,pointHoverRadius:5
          }]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{
            x:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:10}}},
            y:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:10},callback:function(v){return fmt(v)}}}
          }
        }
      });
    }
  }
  
  // ---- 2. GL Breakdown (existing) ----
  if(r.glBreakdown && r.glBreakdown.length>0){
    var glCtx=document.getElementById('glChart');
    if(glCtx){
      glCtx=glCtx.getContext('2d');
      var glLabels=r.glBreakdown.slice(0,10).map(function(g){return g.gl});
      var glData=r.glBreakdown.slice(0,10).map(function(g){return g.amount});
      chartInstances.gl=new Chart(glCtx,{
        type:'bar',
        data:{
          labels:glLabels,
          datasets:[{
            label:'Amount',data:glData,
            backgroundColor:['rgba(201,169,110,.6)','rgba(88,136,187,.6)','rgba(58,159,101,.6)','rgba(184,82,82,.6)','rgba(128,112,204,.6)'],
            borderRadius:4
          }]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{
            x:{grid:{display:false},ticks:{color:tickColor,font:{size:10}}},
            y:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:10},callback:function(v){return fmt(v)}}}
          }
        }
      });
    }
  }
  
  // ---- 3. Accumulated Trend (S-10) ----
  if(r.accumulatedTrend && r.accumulatedTrend.length>0){
    var accCtx=document.getElementById('lineAccumTrend');
    if(accCtx){
      accCtx=accCtx.getContext('2d');
      chartInstances.lineAccumTrend=new Chart(accCtx,{
        type:'line',
        data:{
          labels:r.accumulatedTrend.map(function(t){return t.period}),
          datasets:[{
            label:'Accumulated',
            data:r.accumulatedTrend.map(function(t){return t.accumulated}),
            borderColor:'#5888BB',
            backgroundColor:'rgba(88,136,187,.08)',
            fill:true,tension:.3,pointRadius:2,pointHoverRadius:4
          }]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{
            x:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:10}}},
            y:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:10},callback:function(v){return fmt(v)}}}
          }
        }
      });
    }
  }
  
  // ---- 4. Stacked Bar by Cost Center (S-7) ----
  if(r.ccBreakdown && r.ccBreakdown.length>0){
    var ccCtx=document.getElementById('stackedBarCC');
    if(ccCtx){
      ccCtx=ccCtx.getContext('2d');
      // Group by period, stack by cost center
      var ccByPeriod = {};
      var ccNames = {};
      r.ccBreakdown.forEach(function(d){
        if(!ccByPeriod[d.period]) ccByPeriod[d.period]={};
        ccByPeriod[d.period][d.cc]=d.amount;
        ccNames[d.cc]=true;
      });
      var periodLabels = Object.keys(ccByPeriod).sort();
      var uniqueCCs = Object.keys(ccNames).sort();
      var colorIdx=0;
      var datasets = uniqueCCs.slice(0,8).map(function(cc){
        var c = paletteSolid[colorIdx % paletteSolid.length];
        colorIdx++;
        return {
          label: cc,
          data: periodLabels.map(function(per){ return ccByPeriod[per][cc] || 0; }),
          backgroundColor: c,
          borderColor: 'transparent'
        };
      });
      // If many CCs, group remaining as "Other"
      if(uniqueCCs.length>8){
        var otherData = periodLabels.map(function(per){
          var sum=0;
          for(var i=8;i<uniqueCCs.length;i++) sum += ccByPeriod[per][uniqueCCs[i]] || 0;
          return sum;
        });
        datasets.push({label:'Other',data:otherData,backgroundColor:'rgba(103,100,96,.4)',borderColor:'transparent'});
      }
      chartInstances.stackedBarCC=new Chart(ccCtx,{
        type:'bar',
        data:{labels:periodLabels,datasets:datasets},
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{
            x:{stacked:true,grid:{display:false},ticks:{color:tickColor,font:{size:9}}},
            y:{stacked:true,grid:{color:gridColor},ticks:{color:tickColor,font:{size:9},callback:function(v){return fmt(v)}}}
          }
        }
      });
    }
  }
  
  // ---- 5. Pie by Company (S-8) ----
  if(r.companyBreakdown && r.companyBreakdown.length>0){
    var pieCtx=document.getElementById('pieCompany');
    if(pieCtx){
      pieCtx=pieCtx.getContext('2d');
      var coLabels=r.companyBreakdown.slice(0,8).map(function(c){return c.company});
      var coData=r.companyBreakdown.slice(0,8).map(function(c){return c.amount});
      chartInstances.pieCompany=new Chart(pieCtx,{
        type:'pie',
        data:{
          labels:coLabels,
          datasets:[{
            data:coData,
            backgroundColor:['rgba(201,169,110,.7)','rgba(88,136,187,.7)','rgba(58,159,101,.7)','rgba(184,82,82,.7)','rgba(128,112,204,.7)','rgba(201,169,110,.4)','rgba(88,136,187,.4)','rgba(58,159,101,.4)'],
            borderColor:'transparent'
          }]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{position:'bottom',labels:{color:tickColor,font:{size:9},boxWidth:10,padding:8}}}
        }
      });
    }
  }
  
  // ---- 6. Active Items by Month (S-9) ----
  if(r.activeItemsByMonth && r.activeItemsByMonth.length>0){
    var abmCtx=document.getElementById('barActiveItems');
    if(abmCtx){
      abmCtx=abmCtx.getContext('2d');
      var abmLabels=r.activeItemsByMonth.map(function(a){return a.period});
      var abmData=r.activeItemsByMonth.map(function(a){return a.count});
      chartInstances.barActiveItems=new Chart(abmCtx,{
        type:'bar',
        data:{
          labels:abmLabels,
          datasets:[{
            label:'Active Items',data:abmData,
            backgroundColor:'rgba(58,159,101,.6)',
            borderRadius:3
          }]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{
            x:{grid:{display:false},ticks:{color:tickColor,font:{size:9}}},
            y:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:9},stepSize:1}}
          }
        }
      });
    }
  }
  
  // ---- 7. Top 10 IO (S-11) ----
  if(r.ioBreakdown && r.ioBreakdown.length>0){
    var ioCtx=document.getElementById('barIoTop10');
    if(ioCtx){
      ioCtx=ioCtx.getContext('2d');
      var ioLabels=r.ioBreakdown.slice(0,10).map(function(i){return i.io});
      var ioData=r.ioBreakdown.slice(0,10).map(function(i){return i.amount});
      chartInstances.barIoTop10=new Chart(ioCtx,{
        type:'bar',
        data:{
          labels:ioLabels,
          datasets:[{
            label:'Amount',data:ioData,
            backgroundColor:['rgba(201,169,110,.6)','rgba(88,136,187,.6)','rgba(58,159,101,.6)','rgba(184,82,82,.6)','rgba(128,112,204,.6)'],
            borderRadius:4
          }]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          indexAxis:'y',
          plugins:{legend:{display:false}},
          scales:{
            x:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:9},callback:function(v){return fmt(v)}}},
            y:{grid:{display:false},ticks:{color:tickColor,font:{size:9}}}
          }
        }
      });
    }
  }
  
  // ---- Tables ----
  // Expiring Soon (S-12)
  var expBody = document.getElementById('expiringSoonBody');
  if(r.expiringSoon && r.expiringSoon.length>0){
    expBody.innerHTML = r.expiringSoon.map(function(e){
      return '<tr><td style="font-family:JetBrains Mono,mono">'+esc(e.docNo)+'</td>'+
        '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis">'+esc((e.description||'').substring(0,35))+'</td>'+
        '<td>'+esc(e.endDate)+'</td>'+
        '<td class="num">฿'+fmt(e.amount)+'</td>'+
        '<td class="num">฿'+fmt(e.remaining)+'</td></tr>';
    }).join('');
  } else {
    expBody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--mt)">No data</td></tr>';
  }
  
  // Data Quality (S-13)
  var dq = r.dataQuality || {};
  var dqEl = document.getElementById('dataQualityBody');
  dqEl.innerHTML =
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:8px">'+
    '<div style="background:var(--card2);border:1px solid var(--bdr);border-radius:5px;padding:10px;text-align:center">'+
    '<div style="font-size:16px;font-weight:500;color:var(--rd)">'+(dq.missingIO||0)+'</div><div style="font-size:10px;color:var(--mt)">Missing IO</div></div>'+
    '<div style="background:var(--card2);border:1px solid var(--bdr);border-radius:5px;padding:10px;text-align:center">'+
    '<div style="font-size:16px;font-weight:500;color:var(--rd)">'+(dq.missingGL||0)+'</div><div style="font-size:10px;color:var(--mt)">Missing GL</div></div>'+
    '<div style="background:var(--card2);border:1px solid var(--bdr);border-radius:5px;padding:10px;text-align:center">'+
    '<div style="font-size:16px;font-weight:500;color:var(--gold)">'+(dq.invalidDates||0)+'</div><div style="font-size:10px;color:var(--mt)">Invalid Dates</div></div>'+
    '<div style="background:var(--card2);border:1px solid var(--bdr);border-radius:5px;padding:10px;text-align:center">'+
    '<div style="font-size:16px;font-weight:500;color:var(--gold)">'+(dq.zeroAmounts||0)+'</div><div style="font-size:10px;color:var(--mt)">Zero Amounts</div></div>'+
    '</div>'+
    '<div style="font-size:10px;color:var(--mt);text-align:right">Valid: '+(r.totalItems||0)+' items checked</div>';
}

function destroyCharts(){
  for(var k in chartInstances){if(chartInstances[k]){chartInstances[k].destroy();delete chartInstances[k]}}
}

// ========== RUN AMORTIZATION ==========
function runAmort(){
  var period=document.getElementById('amortPeriod').value.trim();
  if(period&&!/^\d{4}-\d{2}$/.test(period)){toast('รูปแบบ YYYY-MM หรือว่าง','er');return}
  document.getElementById('loaderAmort').classList.remove('hidden');
  document.getElementById('resultAmort').classList.remove('show');
  google.script.run.withSuccessHandler(function(r){
    document.getElementById('loaderAmort').classList.add('hidden');
    var el=document.getElementById('resultAmort');el.classList.add('show');
    if(r.ok){
      var html='<div class="al al-ok"><i class="bi bi-check-circle"></i> '+r.message+'</div>'+
        '<div class="kpi-grid" style="margin-top:10px">'+
        '<div class="kpi"><div class="kv">'+r.activeItems.toLocaleString()+'</div><div class="kl">Active Items</div></div>'+
        '<div class="kpi bl"><div class="kv">'+r.scheduleRows.toLocaleString()+'</div><div class="kl">Schedule Rows</div></div>'+
        '<div class="kpi gn"><div class="kv">฿'+fmt(r.totalAmount)+'</div><div class="kl">Total Amort</div></div></div>';
      if(r.sample&&r.sample.length>0){
        html+='<div class="tw" style="max-height:300px;overflow-y:auto"><table class="tb"><thead><tr>'+
          '<th>Doc</th><th>รายการ</th><th>Period</th><th>GL</th><th class="num">Amount</th><th class="num">Accum</th><th class="num">Remain</th>'+
          '</tr></thead><tbody>'+r.sample.map(function(s){
            return '<tr><td style="font-family:JetBrains Mono,mono">'+esc(s.docNo)+'</td>'+
              '<td style="max-width:150px;overflow:hidden;text-overflow:ellipsis">'+esc((s.description||'').substring(0,30))+'</td>'+
              '<td>'+esc(s.period)+'</td>'+
              '<td style="font-family:JetBrains Mono,mono">'+esc(s.glPrepaid||'')+'</td>'+
              '<td class="num">'+fmt(s.amortAmount)+'</td>'+
              '<td class="num">'+fmt(s.accumulated)+'</td>'+
              '<td class="num">'+fmt(s.remaining)+'</td></tr>';
          }).join('')+'</tbody></table></div>';
      }
      el.innerHTML=html;
      if(r.sample) populateSchedule(r.sample);
      toast('✅ '+r.message,'ok');
    }else{
      el.innerHTML='<div class="al al-er"><i class="bi bi-x-circle"></i> '+(r.error||'Error')+'</div>';
    }
  }).withFailureHandler(function(e){
    document.getElementById('loaderAmort').classList.add('hidden');
    showResult('resultAmort','<div class="al al-er"><i class="bi bi-x-circle"></i> '+e.message+'</div>');
  }).runMonthEndAmortization(period||null);
}

function populateSchedule(sample){
  var tb=document.getElementById('schedBody');
  if(!sample||!sample.length){tb.innerHTML='<tr><td colspan="9" style="text-align:center;color:var(--mt)">No data</td></tr>';return}
  tb.innerHTML=sample.map(function(s){
    return '<tr><td style="font-family:JetBrains Mono,mono">'+esc(s.docNo)+'</td>'+
      '<td>'+esc((s.description||'').substring(0,25))+'</td>'+
      '<td>'+esc(s.period)+'</td>'+
      '<td>'+esc(s.io||'')+'</td>'+
      '<td style="font-family:JetBrains Mono,mono">'+esc(s.glPrepaid||'')+'</td>'+
      '<td class="num">'+s.daysInMonth+'</td>'+
      '<td class="num">'+fmt(s.amortAmount)+'</td>'+
      '<td class="num">'+fmt(s.accumulated)+'</td>'+
      '<td class="num">'+fmt(s.remaining)+'</td></tr>';
  }).join('');
}

// ========== SAP JE ==========
function previewSAPJE(){
  var period=document.getElementById('sapPeriod').value.trim();
  if(period&&!/^\d{4}-\d{2}$/.test(period)){toast('รูปแบบ YYYY-MM หรือว่าง','er');return}
  document.getElementById('loaderSAP').classList.remove('hidden');
  document.getElementById('resultSAP').classList.remove('show');
  google.script.run.withSuccessHandler(function(r){
    document.getElementById('loaderSAP').classList.add('hidden');
    if(!r.ok){showResult('resultSAP','<div class="al al-er">'+r.error+'</div>');return}
    var tb=document.getElementById('sapBody');
    if(!r.sample||r.sample.length===0){tb.innerHTML='<tr><td colspan="8" style="color:var(--mt)">No data</td></tr>';return}
    var rowsHtml='';
    for(var d=0;d<r.sample.length;d++){
      var doc=r.sample[d];
      for(var l=0;l<doc.lines.length;l++){
        var line=doc.lines[l];
        rowsHtml+='<tr>'+
          '<td style="font-family:JetBrains Mono,mono">DOC#'+doc.doc+'</td>'+

// ========== PRE-UPLOAD CHECKER ==========
function runChecker(){
  document.getElementById('loaderChecker').classList.remove('hidden');
  document.getElementById('checkerResult').style.display='none';
  google.script.run.withSuccessHandler(function(r){
    document.getElementById('loaderChecker').classList.add('hidden');
    if(!r.ok){toast('❌ '+r.error,'er');return}
    document.getElementById('checkerResult').style.display='block';
    document.getElementById('cTotalItems').textContent=r.totalItems.toLocaleString();
    document.getElementById('cPassed').textContent=(r.totalItems - r.errorCount).toLocaleString();
    document.getElementById('cErrors').textContent=r.errorCount.toLocaleString();
    document.getElementById('cWarnings').textContent=r.warningCount.toLocaleString();
    var badge='';
    if(r.status==='PASS')badge='<span class="al al-ok"><i class="bi bi-check-circle"></i> ✅ PASS — ข้อมูลพร้อม Export</span>';
    else if(r.status==='WARN')badge='<span class="al" style="background:rgba(201,169,110,.07);border-color:rgba(201,169,110,.18);color:var(--gold)"><i class="bi bi-exclamation-triangle"></i> ⚠️ PASS WITH WARNINGS — ควรตรวจสอบก่อน Export</span>';
    else badge='<span class="al al-er"><i class="bi bi-x-circle"></i> ❌ FAIL — แก้ไข Errors ก่อน Export</span>';
    document.getElementById('cStatusBadge').innerHTML=badge;
    if(r.errors&&r.errors.length>0){
      document.getElementById('checkerErrorCard').style.display='block';
      document.getElementById('cErrorBody').innerHTML=r.errors.map(function(e){
        return '<tr><td style="font-family:JetBrains Mono,mono">'+e.row+'</td><td>'+esc(e.field||'')+'</td><td style="max-width:400px;overflow:hidden;text-overflow:ellipsis">'+esc(e.message||'')+'</td></tr>';
      }).join('');
    } else {
      document.getElementById('checkerErrorCard').style.display='none';
    }
    if(r.warnings&&r.warnings.length>0){
      document.getElementById('checkerWarnCard').style.display='block';
      document.getElementById('cWarnBody').innerHTML=r.warnings.map(function(w){
        return '<tr><td style="font-family:JetBrains Mono,mono">'+w.row+'</td><td>'+esc(w.field||'')+'</td><td style="max-width:400px;overflow:hidden;text-overflow:ellipsis">'+esc(w.message||'')+'</td></tr>';
      }).join('');
    } else {
      document.getElementById('checkerWarnCard').style.display='none';
    }
    var ac=r.amortCheck||{};
    document.getElementById('cAmortCheck').innerHTML='สุ่มตรวจ <strong>'+ac.checked+'</strong> รายการ · พบ <strong>'+ac.mismatched+'</strong> รายการที่มียอดคงเหลือไม่ตรง';
    toast('✅ Check completed: '+r.errorCount+' errors, '+r.warningCount+' warnings','ok');
  }).withFailureHandler(function(e){
    document.getElementById('loaderChecker').classList.add('hidden');
    toast('❌ '+e.message,'er');
  }).runPreUploadCheck(null);
}

// --- A4: SORTABLE COLUMNS ---
var _sortState = {};
document.getElementById('ct').addEventListener('click', function(e) {
  var th = e.target.closest('.tb th');
  if (!th) return;
  var table = th.closest('.tb');
  if (!table) return;
  var ths = table.querySelectorAll('thead th');
  var idx = Array.prototype.indexOf.call(ths, th);
  if (idx < 0) return;

  var tid = table.id || (table.id = 'tb_' + Math.random().toString(36).substr(2,5));
  var dir = 'asc';
  if (_sortState[tid] && _sortState[tid].col === idx) dir = _sortState[tid].dir === 'asc' ? 'desc' : 'asc';
  _sortState[tid] = {col: idx, dir: dir};

  ths.forEach(function(h, i) {
    var txt = h.textContent.replace(/[↑↓]/g, '').trim();
    h.innerHTML = txt + (i === idx ? (dir === 'asc' ? ' ↑' : ' ↓') : '');
  });

  var tbody = table.querySelector('tbody');
  if (!tbody) return;
  var rows = Array.from(tbody.querySelectorAll('tr'));
  var dataRows = rows.filter(function(r) { return !r.querySelector('td[colspan]'); });
  var others = rows.filter(function(r) { return r.querySelector('td[colspan]'); });
  if (dataRows.length < 2) return;

  var sample = (dataRows[0].querySelectorAll('td')[idx] || {}).textContent || '';
  var isNum = sample.replace(/[฿,$,\s]/g, '').length > 0 && !isNaN(parseFloat(sample.replace(/[฿,$,\s]/g, '')));

  dataRows.sort(function(a, b) {
    var av = (a.querySelectorAll('td')[idx] || {}).textContent || '';
    var bv = (b.querySelectorAll('td')[idx] || {}).textContent || '';
    if (isNum) {
      av = parseFloat(av.replace(/[฿,$,\s]/g, '')) || 0;
      bv = parseFloat(bv.replace(/[฿,$,\s]/g, '')) || 0;
    } else {
      av = av.toLowerCase(); bv = bv.toLowerCase();
    }
    return av < bv ? (dir === 'asc' ? -1 : 1) : av > bv ? (dir === 'asc' ? 1 : -1) : 0;
  });

  dataRows.forEach(function(r) { tbody.appendChild(r); });
  others.forEach(function(r) { tbody.appendChild(r); });
});

// --- A5: CSV / PDF EXPORT ---
function exportTableCSV(tableId, filename) {
  var table = document.getElementById(tableId);
  if (!table) { toast('Table not found', 'er'); return; }
  var rows = [];
  var hRow = table.querySelector('thead tr');
  if (hRow) {
    rows.push(Array.from(hRow.querySelectorAll('th')).map(function(th) {
      return '"' + th.textContent.trim().replace(/[↑↓]/g, '').replace(/"/g, '""') + '"';
    }).join(','));
  }
  var hasData = false;
  Array.from(table.querySelectorAll('tbody tr')).forEach(function(tr) {
    var cells = tr.querySelectorAll('td');
    if (!cells.length || (cells.length === 1 && cells[0].colSpan > 1)) return;
    hasData = true;
    rows.push(Array.from(cells).map(function(td) {
      return '"' + td.textContent.trim().replace(/"/g, '""') + '"';
    }).join(','));
  });
  if (!hasData) { toast('No data to export', 'er'); return; }
  var csv = '\ufeff' + rows.join('\n');
  var blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('✅ Downloaded ' + filename + '.csv', 'ok');
}

// --- A6: KEYBOARD SHORTCUTS ---
document.addEventListener('keydown', function(e) {
  var ctrl = e.ctrlKey || e.metaKey;
  if (ctrl && e.key === 'r') {
    e.preventDefault();
    var runBtn = document.querySelector('#secAmort .btn-gn');
    if (runBtn) { runBtn.click(); toast('▶️ Running Amortization...', ''); }
    return;
  }
  if (ctrl && e.key === 'e') {
    e.preventDefault();
    if (document.getElementById('secSap').classList.contains('active')) {
      var exportBtn = document.querySelector('#secSap .btn-gn');
      if (exportBtn) exportBtn.click();
    } else if (document.getElementById('secSchedule').classList.contains('active')) {
      var expWide = document.querySelector('#secSchedule .btn-gn');
      if (expWide) expWide.click();
    }
    return;
  }
  if (ctrl && e.key === 's') {
    if (document.getElementById('secSettings').classList.contains('active')) {
      e.preventDefault();
      var saveBtn = document.querySelector('#secSettings .btn-pri');
      if (saveBtn) saveBtn.click();
    }
    return;
  }
  if ((ctrl && e.key === 'f') || (e.key === '/' && !ctrl && !e.altKey && !e.metaKey)) {
    e.preventDefault();
    toast('🔍 Search: Ctrl+F / — coming soon', '');
    return;
  }
});
