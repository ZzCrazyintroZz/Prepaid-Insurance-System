<script>
// ========== DARK MODE ==========
function toggleDark() {
  document.body.classList.toggle('light');
  var icon = document.getElementById('darkIcon');
  icon.className = document.body.classList.contains('light') ? 'bi bi-sun' : 'bi bi-moon-stars';
  localStorage.setItem('pa_theme', document.body.classList.contains('light') ? 'light' : 'dark');
}
(function(){if(localStorage.getItem('pa_theme')==='light'){document.body.classList.add('light');
  document.getElementById('darkIcon').className='bi bi-sun';}})();

// ========== HELPERS ==========
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;')}
function fmt(n){if(n===undefined||n===null)return'—';return Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function tost(msg,type){var c=document.getElementById('toastContainer'),t=document.createElement('div');t.className='toast '+(type||'');t.textContent=msg;c.appendChild(t);setTimeout(function(){t.remove()},3000)}
function toast(msg,type){tost(msg,type)}
function showResult(id, html){var el=document.getElementById(id);el.innerHTML=html;el.classList.add('show')}
var chartInstances={};

// ========== PAGINATION ==========
// Reusable pagination state
var _pagState = {
  amort: { page: 0, pageSize: 50, total: 0 },
  sap: { page: 0, pageSize: 50, total: 0 },
  void: { page: 0, pageSize: 50, total: 0 },
  checker: { page: 0, pageSize: 50, total: 0 }
};

function renderPagination(section, totalItems) {
  var state = _pagState[section];
  if (!state) return '';
  state.total = totalItems || 0;
  var totalPages = Math.max(1, Math.ceil(state.total / state.pageSize));
  var page = Math.min(state.page, totalPages - 1);
  state.page = page;
  
  var start = page * state.pageSize + 1;
  var end = Math.min((page + 1) * state.pageSize, state.total);
  var hasPrev = page > 0;
  var hasNext = page < totalPages - 1;
  
  return '<div class="pagination" id="pag_' + section + '">' +
    '<button class="btn btn-ghost btn-sm" onclick="pagPrev(\'' + section + '\')" ' + (!hasPrev ? 'disabled' : '') + '>◀</button>' +
    '<span class="pag-info">หน้า ' + (page + 1) + ' จาก ' + totalPages + '</span>' +
    '<button class="btn btn-ghost btn-sm" onclick="pagNext(\'' + section + '\')" ' + (!hasNext ? 'disabled' : '') + '>▶</button>' +
    '<span class="pag-range">แสดง ' + start.toLocaleString() + '–' + end.toLocaleString() + ' จาก ' + state.total.toLocaleString() + ' รายการ</span>' +
    '</div>';
}

function pagPrev(section) {
  var state = _pagState[section];
  if (!state || state.page <= 0) return;
  state.page--;
  pagRefresh(section);
}

function pagNext(section) {
  var state = _pagState[section];
  if (!state) return;
  var totalPages = Math.ceil(state.total / state.pageSize);
  if (state.page >= totalPages - 1) return;
  state.page++;
  pagRefresh(section);
}

function pagGoTo(section, page) {
  var state = _pagState[section];
  if (!state) return;
  state.page = Math.max(0, Math.min(page, Math.ceil(state.total / state.pageSize) - 1));
  pagRefresh(section);
}

function pagRefresh(section) {
  // Dispatch a custom event that the section handlers can listen to
  var evt = new CustomEvent('paginate', { detail: { section: section } });
  document.dispatchEvent(evt);
}

// ========== NAVIGATION ==========
function go(p){
  // Convert page name to section id: first letter uppercase
  var sectionId = 'sec' + p.charAt(0).toUpperCase() + p.slice(1);
  var navId = 'nav-' + p;
  // Hide all sections
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')});
  // Show target section
  var secEl = document.getElementById(sectionId);
  if(secEl) secEl.classList.add('active');
  // Update sidebar nav
  document.querySelectorAll('.ni').forEach(function(n){n.classList.remove('on')});
  var navEl = document.getElementById(navId);
  if(navEl) navEl.classList.add('on');
  // Update bottom nav
  document.querySelectorAll('.bn-item').forEach(function(b){b.classList.remove('on')});
  var bnMap = {dashboard:0, amort:1, sap:2, sync:3, import:4, admin:5, budget:6, settings:7};
  var bnIdx = bnMap[p];
  if(bnIdx !== undefined){
    var items = document.querySelectorAll('.bn-item');
    if(items[bnIdx]) items[bnIdx].classList.add('on');
  }
  // Close mobile nav
  if(window.innerWidth <= 768){
    var nav = document.querySelector('nav');
    if(nav) nav.classList.remove('open');
    var overlay = document.getElementById('navOverlay');
    if(overlay) overlay.classList.remove('show');
  }
  // Load page-specific data
  if(p==='dashboard') loadDashboard();
  if(p==='void') loadVoidDocs();
  if(p==='guide') loadGuide();
  if(p==='sync') loadSyncData();
  if(p==='admin') loadAdminConsole();
  if(p==='audit') loadAuditLog();
  if(p==='crud') loadCrudData();
  if(p==='periodclose') loadPeriodClose();
  if(p==='approvals') loadApprovals();
  if(p==='budget') loadBudgetData();
  if(p==='import') loadImportPage();
  if(p==='voidexpense') loadVoidExpense();
  if(p==='glrecon') loadGLRecon();
  if(p==='settings') loadSettings();
  if(p==='amort') loadAmort();
  if(p==='schedule') loadSchedule();
  if(p==='sap') loadSAP();
  if(p==='checker') loadChecker();
}
function switchTab(p){go(p);}

// ========== MOBILE NAV TOGGLE ==========
function toggleNav(){
  var nav = document.querySelector('nav');
  var overlay = document.getElementById('navOverlay');
  if(nav) nav.classList.toggle('open');
  if(overlay) overlay.classList.toggle('show');
}
function checkMobile(){
  var hamburger = document.getElementById('hamburger');
  if(!hamburger) return;
  if(window.innerWidth <= 768){
    hamburger.style.display = 'flex';
  } else {
    hamburger.style.display = 'none';
    var nav = document.querySelector('nav');
    if(nav) nav.classList.remove('open');
    var overlay = document.getElementById('navOverlay');
    if(overlay) overlay.classList.remove('show');
  }
}

// ========== LOAD DASHBOARD ==========
function loadDashboard(){
  google.script.run.withSuccessHandler(function(r){
    if(!r.ok){document.getElementById('dashSub').textContent='Error: '+(r.error||'');return}
    // Existing KPIs
    document.getElementById('dTotalItems').textContent=r.totalItems.toLocaleString();
    document.getElementById('dTotalAmt').textContent=fmt(r.totalAmortization);
    document.getElementById('dCurPeriod').textContent=r.currentPeriod;
    document.getElementById('dashSub').textContent=r.totalItems.toLocaleString()+' รายการ · '+r.currentPeriod;
    document.getElementById('statusTxt').textContent=r.totalItems+' rec';
    document.getElementById('statusDot').className='dot g';
    
    // New KPI Row 1
    document.getElementById('dActiveItems').textContent=r.activeItems!==undefined?r.activeItems.toLocaleString():'—';
    document.getElementById('dCompletedItems').textContent='Completed: '+(r.completedItems!==undefined?r.completedItems.toLocaleString():'—');
    document.getElementById('dTotalRemaining').textContent=r.totalRemaining!==undefined?'฿'+fmt(r.totalRemaining):'—';
    document.getElementById('dAvgDuration').textContent=r.avgDurationMonths!==undefined?r.avgDurationMonths.toFixed(1):'—';
    document.getElementById('dExpiringThisMonth').textContent=r.expiringThisMonth!==undefined?r.expiringThisMonth.toLocaleString():'—';
    if(r.momChange && r.momChange.changePercent !== undefined && r.momChange.changePercent !== null){
      var momV = r.momChange.changePercent;
      document.getElementById('dMomChange').textContent=(momV>0?'+':'')+momV.toFixed(1)+'%';
      document.getElementById('dMomChange').style.color=momV>=0?'var(--gn)':'var(--rd)';
      document.getElementById('dMomPeriod').textContent=r.momChange.period||'';
    } else {
      document.getElementById('dMomChange').textContent='—';
      document.getElementById('dMomPeriod').textContent='';
    }
    
    // New KPI Row 2 — Largest Item
    if(r.largestItem){
      document.getElementById('dLargestItem').textContent=(r.largestItem.docNo||'')+' — '+(r.largestItem.description||'').substring(0,40);
      document.getElementById('dLargestAmt').textContent='฿'+fmt(r.largestItem.amount);
    } else {
      document.getElementById('dLargestItem').textContent='—';
      document.getElementById('dLargestAmt').textContent='';
    }
    // Health Score
    var hs = r.healthScore !== undefined ? r.healthScore : 0;
    document.getElementById('dHealthScore').textContent=hs+'%';
    var bar = document.getElementById('dHealthBar');
    bar.style.width=hs+'%';
    bar.style.background=hs>=80?'var(--gn)':hs>=50?'var(--gold)':'var(--rd)';
    
    // Data Freshness (S-14)
    var freshnessEl = document.getElementById('dataFreshnessBody');
    var now = new Date();
    freshnessEl.innerHTML =
      '<div style="display:grid;grid-template-columns:auto 1fr;gap:6px 12px;font-size:12px">'+
      '<span style="color:var(--mt)">Last Checked:</span><span>'+now.toLocaleString('th-TH')+'</span>'+
      '<span style="color:var(--mt)">Data Source:</span><span>Input Sheet ('+(r.totalItems||0)+' records)</span>'+
      '<span style="color:var(--mt)">Refresh:</span><span>Auto (5-min cache)</span>'+
      '<span style="color:var(--mt)">Status:</span><span><span class="dot g" style="display:inline-block;vertical-align:middle;margin-right:4px"></span> Online</span>'+
      '</div>';
    
    // Render all charts
    renderCharts(r);
    // Phase A: drill-down dashboard
    setTimeout(function(){setupDashboardDrillDown(r);},50);
    // B5: Load Running Balance data
    setTimeout(function(){loadRunningBalance(r);},200);
  }).withFailureHandler(function(e){
    document.getElementById('dashSub').textContent='Error: '+e.message;
    document.getElementById('statusTxt').textContent='Error';
    document.getElementById('statusDot').className='dot r';
  }).getDashboardData();
}

// ========== RENDER CHARTS ==========
function renderCharts(r){
  destroyCharts();
  var isLight=document.body.classList.contains('light');
  var gridColor=isLight?'rgba(0,0,0,.06)':'rgba(255,255,255,.06)';
  var tickColor=isLight?'#88827a':'#676460';
  var palette=['rgba(201,169,110,.7)','rgba(88,136,187,.7)','rgba(58,159,101,.7)','rgba(184,82,82,.7)','rgba(128,112,204,.7)',
    'rgba(201,169,110,.5)','rgba(88,136,187,.5)','rgba(58,159,101,.5)','rgba(184,82,82,.5)','rgba(128,112,204,.5)'];
  var paletteSolid=['#C9A96E','#5888BB','#3A9F65','#B85252','#8070CC','#C9A96E','#5888BB','#3A9F65','#B85252','#8070CC'];
  
  // ---- 1. Trend (existing) ----
  if(r.trend && r.trend.length>0){
    var ctx=document.getElementById('trendChart');
    if(ctx){
      ctx=ctx.getContext('2d');
      chartInstances.trend=new Chart(ctx,{
        type:'line',
        data:{
          labels:r.trend.map(function(t){return t.period}),
          datasets:[{
            label:'Amortization',
            data:r.trend.map(function(t){return t.amount}),
            borderColor:'#C9A96E',
            backgroundColor:'rgba(201,169,110,.08)',
            fill:true,tension:.3,pointRadius:3,pointHoverRadius:5
          }]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{
            x:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:10}}},
            y:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:10},callback:function(v){return fmt(v)}}}
          }
        }
      });
    }
  }
  
  // ---- 2. GL Breakdown (existing) ----
  if(r.glBreakdown && r.glBreakdown.length>0){
    var glCtx=document.getElementById('glChart');
    if(glCtx){
      glCtx=glCtx.getContext('2d');
      var glLabels=r.glBreakdown.slice(0,10).map(function(g){return g.gl});
      var glData=r.glBreakdown.slice(0,10).map(function(g){return g.amount});
      chartInstances.gl=new Chart(glCtx,{
        type:'bar',
        data:{
          labels:glLabels,
          datasets:[{
            label:'Amount',data:glData,
            backgroundColor:['rgba(201,169,110,.6)','rgba(88,136,187,.6)','rgba(58,159,101,.6)','rgba(184,82,82,.6)','rgba(128,112,204,.6)'],
            borderRadius:4
          }]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{
            x:{grid:{display:false},ticks:{color:tickColor,font:{size:10}}},
            y:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:10},callback:function(v){return fmt(v)}}}
          }
        }
      });
    }
  }
  
  // ---- 3. Accumulated Trend (S-10) ----
  if(r.accumulatedTrend && r.accumulatedTrend.length>0){
    var accCtx=document.getElementById('lineAccumTrend');
    if(accCtx){
      accCtx=accCtx.getContext('2d');
      chartInstances.lineAccumTrend=new Chart(accCtx,{
        type:'line',
        data:{
          labels:r.accumulatedTrend.map(function(t){return t.period}),
          datasets:[{
            label:'Accumulated',
            data:r.accumulatedTrend.map(function(t){return t.accumulated}),
            borderColor:'#5888BB',
            backgroundColor:'rgba(88,136,187,.08)',
            fill:true,tension:.3,pointRadius:2,pointHoverRadius:4
          }]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{
            x:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:10}}},
            y:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:10},callback:function(v){return fmt(v)}}}
          }
        }
      });
    }
  }
  
  // ---- 4. Stacked Bar by Cost Center (S-7) ----
  if(r.ccBreakdown && r.ccBreakdown.length>0){
    var ccCtx=document.getElementById('stackedBarCC');
    if(ccCtx){
      ccCtx=ccCtx.getContext('2d');
      // Group by period, stack by cost center
      var ccByPeriod = {};
      var ccNames = {};
      r.ccBreakdown.forEach(function(d){
        if(!ccByPeriod[d.period]) ccByPeriod[d.period]={};
        ccByPeriod[d.period][d.cc]=d.amount;
        ccNames[d.cc]=true;
      });
      var periodLabels = Object.keys(ccByPeriod).sort();
      var uniqueCCs = Object.keys(ccNames).sort();
      var colorIdx=0;
      var datasets = uniqueCCs.slice(0,8).map(function(cc){
        var c = paletteSolid[colorIdx % paletteSolid.length];
        colorIdx++;
        return {
          label: cc,
          data: periodLabels.map(function(per){ return ccByPeriod[per][cc] || 0; }),
          backgroundColor: c,
          borderColor: 'transparent'
        };
      });
      // If many CCs, group remaining as "Other"
      if(uniqueCCs.length>8){
        var otherData = periodLabels.map(function(per){
          var sum=0;
          for(var i=8;i<uniqueCCs.length;i++) sum += ccByPeriod[per][uniqueCCs[i]] || 0;
          return sum;
        });
        datasets.push({label:'Other',data:otherData,backgroundColor:'rgba(103,100,96,.4)',borderColor:'transparent'});
      }
      chartInstances.stackedBarCC=new Chart(ccCtx,{
        type:'bar',
        data:{labels:periodLabels,datasets:datasets},
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{
            x:{stacked:true,grid:{display:false},ticks:{color:tickColor,font:{size:9}}},
            y:{stacked:true,grid:{color:gridColor},ticks:{color:tickColor,font:{size:9},callback:function(v){return fmt(v)}}}
          }
        }
      });
    }
  }
  
  // ---- 5. Pie by Company (S-8) ----
  if(r.companyBreakdown && r.companyBreakdown.length>0){
    var pieCtx=document.getElementById('pieCompany');
    if(pieCtx){
      pieCtx=pieCtx.getContext('2d');
      var coLabels=r.companyBreakdown.slice(0,8).map(function(c){return c.company});
      var coData=r.companyBreakdown.slice(0,8).map(function(c){return c.amount});
      chartInstances.pieCompany=new Chart(pieCtx,{
        type:'pie',
        data:{
          labels:coLabels,
          datasets:[{
            data:coData,
            backgroundColor:['rgba(201,169,110,.7)','rgba(88,136,187,.7)','rgba(58,159,101,.7)','rgba(184,82,82,.7)','rgba(128,112,204,.7)','rgba(201,169,110,.4)','rgba(88,136,187,.4)','rgba(58,159,101,.4)'],
            borderColor:'transparent'
          }]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{position:'bottom',labels:{color:tickColor,font:{size:9},boxWidth:10,padding:8}}}
        }
      });
    }
  }
  
  // ---- 6. Active Items by Month (S-9) ----
  if(r.activeItemsByMonth && r.activeItemsByMonth.length>0){
    var abmCtx=document.getElementById('barActiveItems');
    if(abmCtx){
      abmCtx=abmCtx.getContext('2d');
      var abmLabels=r.activeItemsByMonth.map(function(a){return a.period});
      var abmData=r.activeItemsByMonth.map(function(a){return a.count});
      chartInstances.barActiveItems=new Chart(abmCtx,{
        type:'bar',
        data:{
          labels:abmLabels,
          datasets:[{
            label:'Active Items',data:abmData,
            backgroundColor:'rgba(58,159,101,.6)',
            borderRadius:3
          }]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{
            x:{grid:{display:false},ticks:{color:tickColor,font:{size:9}}},
            y:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:9},stepSize:1}}
          }
        }
      });
    }
  }
  
  // ---- 7. Top 10 IO (S-11) ----
  if(r.ioBreakdown && r.ioBreakdown.length>0){
    var ioCtx=document.getElementById('barIoTop10');
    if(ioCtx){
      ioCtx=ioCtx.getContext('2d');
      var ioLabels=r.ioBreakdown.slice(0,10).map(function(i){return i.io});
      var ioData=r.ioBreakdown.slice(0,10).map(function(i){return i.amount});
      chartInstances.barIoTop10=new Chart(ioCtx,{
        type:'bar',
        data:{
          labels:ioLabels,
          datasets:[{
            label:'Amount',data:ioData,
            backgroundColor:['rgba(201,169,110,.6)','rgba(88,136,187,.6)','rgba(58,159,101,.6)','rgba(184,82,82,.6)','rgba(128,112,204,.6)'],
            borderRadius:4
          }]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          indexAxis:'y',
          plugins:{legend:{display:false}},
          scales:{
            x:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:9},callback:function(v){return fmt(v)}}},
            y:{grid:{display:false},ticks:{color:tickColor,font:{size:9}}}
          }
        }
      });
    }
  }
  
  // ---- Tables ----
  // Expiring Soon (S-12)
  var expBody = document.getElementById('expiringSoonBody');
  if(r.expiringSoon && r.expiringSoon.length>0){
    expBody.innerHTML = r.expiringSoon.map(function(e){
      return '<tr><td style="font-family:JetBrains Mono,mono">'+esc(e.docNo)+'</td>'+
   '<td style="font-family:JetBrains Mono,mono">'+esc(e.docNo2||'')+'</td>'+
   '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis">'+esc((e.description||'').substring(0,35))+'</td>'+
   '<td>'+esc(e.endDate)+'</td>'+
   '<td class="num">฿'+fmt(e.amount)+'</td>'+
   '<td class="num">฿'+fmt(e.remaining)+'</td></tr>';
 }).join('');
 } else {
 expBody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--mt)">No data</td></tr>';
  }
  
  // Data Quality (S-13)
  var dq = r.dataQuality || {};
  var dqEl = document.getElementById('dataQualityBody');
  dqEl.innerHTML =
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:8px">'+
    '<div style="background:var(--card2);border:1px solid var(--bdr);border-radius:5px;padding:10px;text-align:center">'+
    '<div style="font-size:16px;font-weight:500;color:var(--rd)">'+(dq.missingIO||0)+'</div><div style="font-size:10px;color:var(--mt)">Missing IO</div></div>'+
    '<div style="background:var(--card2);border:1px solid var(--bdr);border-radius:5px;padding:10px;text-align:center">'+
    '<div style="font-size:16px;font-weight:500;color:var(--rd)">'+(dq.missingGL||0)+'</div><div style="font-size:10px;color:var(--mt)">Missing GL</div></div>'+
    '<div style="background:var(--card2);border:1px solid var(--bdr);border-radius:5px;padding:10px;text-align:center">'+
    '<div style="font-size:16px;font-weight:500;color:var(--gold)">'+(dq.invalidDates||0)+'</div><div style="font-size:10px;color:var(--mt)">Invalid Dates</div></div>'+
    '<div style="background:var(--card2);border:1px solid var(--bdr);border-radius:5px;padding:10px;text-align:center">'+
    '<div style="font-size:16px;font-weight:500;color:var(--gold)">'+(dq.zeroAmounts||0)+'</div><div style="font-size:10px;color:var(--mt)">Zero Amounts</div></div>'+
    '</div>'+
    '<div style="font-size:10px;color:var(--mt);text-align:right">Valid: '+(r.totalItems||0)+' items checked</div>';
}

function destroyCharts(){
  for(var k in chartInstances){if(chartInstances[k]){chartInstances[k].destroy();delete chartInstances[k]}}
}

// ========== RUN AMORTIZATION ==========
function toggleMultiPeriod() {
  var chk = document.getElementById('multiPeriodChk');
  var range = document.getElementById('multiPeriodRange');
  if (chk && range) {
    range.style.display = chk.checked ? 'flex' : 'none';
  }
}

function generatePeriodList_(start, end) {
  // Generate array of YYYY-MM periods from start to end inclusive
  var partsS = start.split('-'), partsE = end.split('-');
  var sy = parseInt(partsS[0]), sm = parseInt(partsS[1]) - 1;
  var ey = parseInt(partsE[0]), em = parseInt(partsE[1]) - 1;
  var list = [];
  var cur = new Date(sy, sm, 1);
  var endDate = new Date(ey, em, 1);
  while (cur <= endDate) {
    var y = cur.getFullYear();
    var m = cur.getMonth() + 1;
    list.push(y + '-' + (m < 10 ? '0' : '') + m);
    cur.setMonth(cur.getMonth() + 1);
  }
  return list;
}

function runAmort(){
  var multiChecked = document.getElementById('multiPeriodChk') && document.getElementById('multiPeriodChk').checked;
  var periodArg = null;

  if (multiChecked) {
    var startVal = document.getElementById('mpStart').value.trim();
    var endVal = document.getElementById('mpEnd').value.trim();
    if (!startVal || !endVal) { toast('กรุณากรอกงวด開始 และ งวดสิ้นสุด','er'); return; }
    if (!/^\d{4}-\d{2}$/.test(startVal) || !/^\d{4}-\d{2}$/.test(endVal)) { toast('รูปแบบ YYYY-MM','er'); return; }
    if (startVal > endVal) { toast('งวดเริ่มต้นต้อง ≤ งวดสิ้นสุด','er'); return; }
    periodArg = generatePeriodList_(startVal, endVal);
  } else {
    var period = document.getElementById('amortPeriod').value.trim();
    if(period&&!/^\d{4}-\d{2}$/.test(period)){toast('รูปแบบ YYYY-MM หรือว่าง','er');return}
    periodArg = period || null;
  }

  document.getElementById('loaderAmort').classList.remove('hidden');
  document.getElementById('resultAmort').classList.remove('show');
  google.script.run.withSuccessHandler(function(r){
    document.getElementById('loaderAmort').classList.add('hidden');
    var el=document.getElementById('resultAmort');el.classList.add('show');
    if(r.ok){
      var html='<div class="al al-ok"><i class="bi bi-check-circle"></i> '+r.message+'</div>'+
        '<div class="kpi-grid" style="margin-top:10px">'+
        '<div class="kpi"><div class="kv">'+r.activeItems.toLocaleString()+'</div><div class="kl">Active Items</div></div>'+
        '<div class="kpi bl"><div class="kv">'+r.scheduleRows.toLocaleString()+'</div><div class="kl">Schedule Rows</div></div>'+
        '<div class="kpi gn"><div class="kv">฿'+fmt(r.totalAmount)+'</div><div class="kl">Total Amort</div></div></div>';

      // Per-period breakdown for multi-period runs
      if (r.isMultiPeriod && r.perPeriod && r.perPeriod.length > 0) {
        html += '<div class="card" style="padding:12px;margin-top:8px"><h3 style="margin-bottom:8px">📊 Per-Period Results</h3>' +
          '<table class="tb" style="font-size:11px"><thead><tr>' +
          '<th>Period</th><th class="num">Active Items</th><th class="num">Schedule Rows</th><th class="num">Total Amount</th>' +
          '</tr></thead><tbody>' +
          r.perPeriod.map(function(pp){
            return '<tr>' +
              '<td style="font-family:JetBrains Mono,mono">'+esc(pp.period)+'</td>' +
              '<td class="num">'+pp.activeItems.toLocaleString()+'</td>' +
              '<td class="num">'+pp.scheduleRows.toLocaleString()+'</td>' +
              '<td class="num">฿'+fmt(pp.totalAmount)+'</td></tr>';
          }).join('') +
          '</tbody></table></div>';
      }

      if(r.sample&&r.sample.length>0){
        // Pagination: slice sample based on page
        var pagState = _pagState['amort'];
        var sampleAll = r.sample;
        var totalRows = r.scheduleRows || sampleAll.length;
        pagState.total = totalRows;
        var page = pagState.page;
        var ps = pagState.pageSize;
        var pagedSample = sampleAll.slice(page * ps, (page + 1) * ps);
        
        html+=renderPagination('amort', totalRows);
        html+='<div class="tw" style="max-height:300px;overflow-y:auto"><table class="tb" id="amortPagTable"><thead><tr>'+
          '<th>Doc</th><th>Doc No 2</th><th>รายการ</th><th>Period</th><th>GL</th><th class="num">Amount</th><th class="num">Accum</th><th class="num">Remain</th>'+
          '</tr></thead><tbody>'+pagedSample.map(function(s){
            return '<tr><td style="font-family:JetBrains Mono,mono">'+esc(s.docNo)+'</td>'+
              '<td style="font-family:JetBrains Mono,mono">'+esc(s.docNo2||'')+'</td>'+
              '<td style="max-width:150px;overflow:hidden;text-overflow:ellipsis">'+esc((s.description||'').substring(0,30))+'</td>'+
              '<td>'+esc(s.period)+'</td>'+
              '<td style="font-family:JetBrains Mono,mono">'+esc(s.glPrepaid||'')+'</td>'+
              '<td class="num">'+fmt(s.amortAmount)+'</td>'+
              '<td class="num">'+fmt(s.accumulated)+'</td>'+
              '<td class="num">'+fmt(s.remaining)+'</td></tr>';
          }).join('')+'</tbody></table></div>';
      }
      el.innerHTML=html;
      if(r.sample) populateSchedule(r.sample);
      toast('✅ '+(multiChecked?'Multi-period run complete':'Run complete'),'ok');
    }else{
      el.innerHTML='<div class="al al-er"><i class="bi bi-x-circle"></i> '+(r.error||'Error')+'</div>';
    }
  }).withFailureHandler(function(e){
    document.getElementById('loaderAmort').classList.add('hidden');
    showResult('resultAmort','<div class="al al-er"><i class="bi bi-x-circle"></i> '+e.message+'</div>');
  }).runMonthEndAmortization(periodArg);
}

function previewBulkSAP() {

  for (var i = 0; i < selected.length; i++) {

    document.getElementById('bulkPreviewDocs_'+selected[i]).textContent = '';
    document.getElementById('bulkPreviewLines_'+selected[i]).textContent = '';
    document.getElementById('bulkPreviewAmount_'+selected[i]).textContent = '';
  }
  document.getElementById('resultBulkSAP').classList.remove('show');

  var idx = 0;

    if (idx >= selected.length) {
      toast('✅ Preview complete','ok');
      return;
    }
    var period = selected[idx];
    google.script.run.withSuccessHandler(function(r){
      var p = r.period || period;

        document.getElementById('bulkPreview_'+p).textContent = '✅';

        document.getElementById('bulkPreviewLines_'+p).textContent = r.totalLines || 0;

        document.getElementById('bulkPreview_'+p).textContent = '❌';

        document.getElementById('bulkPreviewLines_'+p).textContent = '—';
        document.getElementById('bulkPreviewAmount_'+p).textContent = r.error || 'Error';

    if(!r.ok){document.getElementById('guideContent').innerHTML='<div class="al al-er">'+(r.error||'Error')+'</div>';return}
    var html='';
    html+='<div class="card"><h3><i class="bi bi-info-circle"></i> เกี่ยวกับระบบ</h3>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px">'+
      '<div><strong>ชื่อระบบ:</strong> '+esc(r.system.name)+'</div>'+
      '<div><strong>เวอร์ชัน:</strong> '+esc(r.system.version)+'</div>'+
      '<div><strong>Runtime:</strong> '+esc(r.system.runtime)+'</div>'+
      '</div></div>';
    html+='<div class="card"><h3><i class="bi bi-database"></i> แหล่งข้อมูล (Data Sources)</h3>';
    for(var d=0;d<r.dataSources.length;d++){
      var ds=r.dataSources[d];
      html+='<div style="margin-bottom:12px"><strong>'+esc(ds.name)+'</strong> — ID: <code style="font-family:JetBrains Mono,mono;background:var(--bg);padding:1px 5px;border-radius:3px">'+esc(ds.id)+'</code>';
      if(ds.sheet) html+=' · Sheet: <code style="font-family:JetBrains Mono,mono">'+esc(ds.sheet)+'</code>';
      if(ds.totalRecords) html+=' · '+ds.totalRecords.toLocaleString()+' records';
      if(ds.desc) html+='<br><span style="color:var(--mt)">'+esc(ds.desc)+'</span>';
      html+='</div>';
      if(ds.columns){
        html+='<table class="tb"><thead><tr><th>Col</th><th>Field</th><th>Description</th></tr></thead><tbody>';
        for(var c=0;c<ds.columns.length;c++){
          html+='<tr><td style="font-family:JetBrains Mono,mono">'+esc(ds.columns[c].col)+'</td>'+
            '<td>'+esc(ds.columns[c].name)+'</td><td>'+esc(ds.columns[c].desc)+'</td></tr>';
        }
        html+='</tbody></table>';
      }
    }
    html+='</div>';
    html+='<div class="card"><h3><i class="bi bi-grid"></i> เมนูการใช้งาน (Tabs)</h3>';
    for(var t=0;t<r.tabs.length;t++){
      var tab=r.tabs[t];
      html+='<div style="margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--bdr)">'+
        '<div style="font-size:14px;font-weight:500;margin-bottom:4px">'+esc(tab.icon||'')+' '+esc(tab.name)+'</div>'+
        '<div style="font-size:11px;color:var(--mt);margin-bottom:6px">'+esc(tab.desc)+'</div>'+
        '<div style="font-size:11px"><strong>วิธีใช้:</strong> '+esc(tab.howto)+'</div>';
      if(tab.formula) html+='<div style="font-size:11px;color:var(--gold);margin-top:2px"><strong>สูตร:</strong> '+esc(tab.formula)+'</div>';
      if(tab.dataSource) html+='<div style="font-size:11px;color:var(--bl);margin-top:2px"><strong>ข้อมูลจาก:</strong> '+esc(tab.dataSource)+'</div>';
      if(tab.note) html+='<div style="font-size:11px;color:var(--mt);margin-top:2px"><strong>หมายเหตุ:</strong> '+esc(tab.note)+'</div>';
      if(tab.checks){
        html+='<div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:4px">';
        for(var ch=0;ch<tab.checks.length;ch++) html+='<span style="font-size:10px;padding:2px 8px;background:rgba(58,159,101,.08);border:1px solid rgba(58,159,101,.18);border-radius:12px">✅ '+esc(tab.checks[ch])+'</span>';
        html+='</div>';
      }
      if(tab.types){
        html+='<div style="margin-top:4px;font-size:11px"><strong>ประเภท:</strong></div><ul style="margin:2px 0 0 16px;font-size:11px">';
        for(var ty=0;ty<tab.types.length;ty++) html+='<li>'+esc(tab.types[ty])+'</li>';
        html+='</ul>';
      }
      if(tab.output) html+='<div style="font-size:11px;color:var(--gn);margin-top:2px"><strong>Output:</strong> '+esc(tab.output)+'</div>';
      html+='</div>';
    }
    html+='</div>';
    html+='<div class="card"><h3><i class="bi bi-gear"></i> Technical Notes</h3><ul style="margin:0;padding-left:16px;font-size:11px;line-height:1.8">';
    for(var n=0;n<r.techNotes.length;n++) html+='<li>'+esc(r.techNotes[n])+'</li>';
    html+='</ul></div>';
    document.getElementById('guideContent').innerHTML=html;
  }).withFailureHandler(function(e){
    document.getElementById('guideContent').innerHTML='<div class="al al-er">'+e.message+'</div>';
  }).getUserGuideData();
}

// ========== PRE-UPLOAD CHECKER ==========
function runChecker(){
  document.getElementById('loaderChecker').classList.remove('hidden');
  document.getElementById('checkerResult').style.display='none';
  google.script.run.withSuccessHandler(function(r){
    document.getElementById('loaderChecker').classList.add('hidden');
    if(!r.ok){toast('❌ '+r.error,'er');return}
    document.getElementById('checkerResult').style.display='block';
    document.getElementById('cTotalItems').textContent=r.totalItems.toLocaleString();
    document.getElementById('cPassed').textContent=(r.totalItems - r.errorCount).toLocaleString();
    document.getElementById('cErrors').textContent=r.errorCount.toLocaleString();
    document.getElementById('cWarnings').textContent=r.warningCount.toLocaleString();
    var badge='';
    if(r.status==='PASS')badge='<span class="al al-ok"><i class="bi bi-check-circle"></i> ✅ PASS — ข้อมูลพร้อม Export</span>';
    else if(r.status==='WARN')badge='<span class="al" style="background:rgba(201,169,110,.07);border-color:rgba(201,169,110,.18);color:var(--gold)"><i class="bi bi-exclamation-triangle"></i> ⚠️ PASS WITH WARNINGS — ควรตรวจสอบก่อน Export</span>';
    else badge='<span class="al al-er"><i class="bi bi-x-circle"></i> ❌ FAIL — แก้ไข Errors ก่อน Export</span>';
    document.getElementById('cStatusBadge').innerHTML=badge;
    if(r.errors&&r.errors.length>0){
      document.getElementById('checkerErrorCard').style.display='block';
      document.getElementById('cErrorBody').innerHTML=r.errors.map(function(e){
        return '<tr><td style="font-family:JetBrains Mono,mono">'+e.row+'</td><td>'+esc(e.field||'')+'</td><td style="max-width:400px;overflow:hidden;text-overflow:ellipsis">'+esc(e.message||'')+'</td></tr>';
      }).join('');
    } else {
      document.getElementById('checkerErrorCard').style.display='none';
    }
    if(r.warnings&&r.warnings.length>0){
      document.getElementById('checkerWarnCard').style.display='block';
      document.getElementById('cWarnBody').innerHTML=r.warnings.map(function(w){
        return '<tr><td style="font-family:JetBrains Mono,mono">'+w.row+'</td><td>'+esc(w.field||'')+'</td><td style="max-width:400px;overflow:hidden;text-overflow:ellipsis">'+esc(w.message||'')+'</td></tr>';
      }).join('');
    } else {
      document.getElementById('checkerWarnCard').style.display='none';
    }
    var ac=r.amortCheck||{};
    document.getElementById('cAmortCheck').innerHTML='สุ่มตรวจ <strong>'+ac.checked+'</strong> รายการ · พบ <strong>'+ac.mismatched+'</strong> รายการที่มียอดคงเหลือไม่ตรง';
    toast('✅ Check completed: '+r.errorCount+' errors, '+r.warningCount+' warnings','ok');
  }).withFailureHandler(function(e){
    document.getElementById('loaderChecker').classList.add('hidden');
    toast('❌ '+e.message,'er');
  }).runPreUploadCheck(null);
}

// ========== BATCH VOID ==========
var _batchVoidDocs = [];

function onBatchVoidTypeChange(){
  var type=document.getElementById('batchVoidType').value;
  document.getElementById('batchVoidLossGlRow').classList.toggle('hidden',type!=='loss');
}

function loadBatchVoidDocs(){
  document.getElementById('loaderBatchVoid').classList.remove('hidden');
  document.getElementById('batchVoidBody').innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--mt)">⏳ กำลังโหลด...</td></tr>';
  document.getElementById('batchVoidResultCard').style.display='none';
  document.getElementById('resultBatchVoid').classList.remove('show');
  // Pagination
  var pagState = _pagState['void'];
  var skip = pagState.page * pagState.pageSize;
  var limit = pagState.pageSize;
  google.script.run.withSuccessHandler(function(r){
    document.getElementById('loaderBatchVoid').classList.add('hidden');
    if(!r.ok||!r.list){document.getElementById('batchVoidBody').innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--mt)">ไม่สามารถโหลดรายการ: '+(r.error||'')+'</td></tr>';return}
    _batchVoidDocs=r.list;
    var tb=document.getElementById('batchVoidBody');
    if(r.list.length===0){
      tb.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--mt)">ไม่มีเอกสาร</td></tr>';
      document.getElementById('batchVoidCount').textContent='0 รายการ';
      return;
    }
    // Add pagination bar
    var pagHtml = renderPagination('void', r.total || r.list.length);
    document.getElementById('batchVoidPagWrap').innerHTML = pagHtml;
    tb.innerHTML=r.list.map(function(d,i){
      return '<tr>'+
        '<td style="text-align:center"><input type="checkbox" class="batch-void-cb" value="'+esc(d.docNo)+'" onchange="onBatchVoidCheckChange()"></td>'+
        '<td style="font-family:JetBrains Mono,mono">'+esc(d.docNo)+'</td>'+
        '<td style="font-family:JetBrains Mono,mono">'+esc(d.docNo2||'')+'</td>'+
        '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis">'+esc((d.description||'').substring(0,40))+'</td>'+
        '<td>'+esc(d.plate||'')+'</td>'+
        '<td class="num">—</td>'+
        '</tr>';
    }).join('');
    document.getElementById('batchVoidCount').textContent=r.list.length+' รายการ';
    document.getElementById('batchVoidSelectAll').checked=false;
    // Set default date
    var today=new Date().toISOString().slice(0,10);
    document.getElementById('batchVoidDate').value=today;
    toast('✅ โหลด '+r.list.length+' รายการ','ok');
  }).withFailureHandler(function(e){
    document.getElementById('loaderBatchVoid').classList.add('hidden');
    document.getElementById('batchVoidBody').innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--mt)">Error: '+e.message+'</td></tr>';
  }).getDocList(skip, limit);
}

function onBatchVoidSelectAll(){
  var checked=document.getElementById('batchVoidSelectAll').checked;
  document.querySelectorAll('.batch-void-cb').forEach(function(cb){cb.checked=checked;});
  updateBatchVoidCount();
}

function onBatchVoidCheckChange(){
  updateBatchVoidCount();
  // Uncheck select-all if any unchecked
  var all=document.querySelectorAll('.batch-void-cb');
  var allChecked=true;
  all.forEach(function(cb){if(!cb.checked)allChecked=false;});
  document.getElementById('batchVoidSelectAll').checked=allChecked;
}

function updateBatchVoidCount(){
  var selected=document.querySelectorAll('.batch-void-cb:checked').length;
  var el=document.getElementById('batchVoidCount');
  if(selected>0){
    el.textContent='✅ เลือก '+selected+' รายการ';
    el.style.color='var(--gn)';
  }else{
    el.textContent=document.querySelectorAll('.batch-void-cb').length+' รายการ';
    el.style.color='var(--mt)';
  }
}

function getSelectedBatchVoidDocs(){
  var selected=[];
  document.querySelectorAll('.batch-void-cb:checked').forEach(function(cb){
    selected.push(cb.value);
  });
  return selected;
}

function batchVoidExecute(){
  var selected=getSelectedBatchVoidDocs();
  if(selected.length===0){toast('กรุณาเลือกเอกสารอย่างน้อย 1 รายการ','er');return}
  var type=document.getElementById('batchVoidType').value;
  var voidDate=document.getElementById('batchVoidDate').value;
  var lossGL=document.getElementById('batchVoidLossGL').value.trim()||'51990010';

  if(!confirm('⚠️ ยืนยัน Batch Void จำนวน '+selected.length+' เอกสาร แบบ '+(type==='refund'?'REFUND':'LOSS')+'?\n\n'+
    'รายการที่จะดำเนินการ:\n'+selected.join('\n')+
    '\n\nวันที่: '+(voidDate||'วันนี้')+
    (type==='loss'?'\nLoss GL: '+lossGL:'')+
    '\n\nดำเนินการต่อ?'))return;

  document.getElementById('loaderBatchVoidExec').classList.remove('hidden');
  document.getElementById('resultBatchVoid').classList.remove('show');
  document.getElementById('batchVoidResultCard').style.display='none';

  google.script.run.withSuccessHandler(function(r){
    document.getElementById('loaderBatchVoidExec').classList.add('hidden');
    if(!r.ok){
      showResult('resultBatchVoid','<div class="al al-er"><i class="bi bi-x-circle"></i> '+(r.error||'Error')+'</div>');
      return;
    }
    // Summary
    var summaryHtml='<div class="kpi-grid">'+
      '<div class="kpi gn"><div class="kv">'+r.succeeded+' / '+r.total+'</div><div class="kl">สำเร็จ / ทั้งหมด</div></div>'+
      '<div class="kpi'+(r.failed>0?' rd':'')+'"><div class="kv">'+r.failed+'</div><div class="kl">ล้มเหลว</div></div>'+
      '</div>'+
      '<div class="al '+(r.failed>0?'al-er':'al-ok')+'"><i class="bi '+(r.failed>0?'bi-exclamation-triangle':'bi-check-circle')+'"></i> '+r.message+'</div>';
    document.getElementById('batchVoidSummary').innerHTML=summaryHtml;

    // Results table
    var tb=document.getElementById('batchVoidResultsBody');
    tb.innerHTML=r.results.map(function(res,i){
      var statusIcon=res.ok?'✅':'❌';
      var statusText=res.ok?'สำเร็จ':'ล้มเหลว';
      var detail=res.ok?esc(res.message||''):esc(res.error||'');
      var amount=res.ok?fmt(res.amount):'—';
      var jeRef=res.ok?esc(res.jeRef||''):'—';
      return '<tr>'+

function calculateNewSchedule() {

  var updates = {
    startDate: document.getElementById('modStartDate').value,
    endDate: document.getElementById('modEndDate').value,

  if(!updates.startDate||!updates.endDate){toast('กรุณากรอกวันที่เริ่มต้นและสิ้นสุด','er');return}

function renderModifyComparison(oldData, newData) {
  // Summary KPIs
  document.getElementById('modCompareOldAmount').textContent = fmt(oldData.amount);
  document.getElementById('modCompareNewAmount').textContent = fmt(newData.amount);
  document.getElementById('modCompareOldStart').textContent = oldData.startDate;
  document.getElementById('modCompareNewStart').textContent = newData.startDate;
  document.getElementById('modCompareOldEnd').textContent = oldData.endDate;
  document.getElementById('modCompareNewEnd').textContent = newData.endDate;
  document.getElementById('modCompareOldRows').textContent = oldData.scheduleRows;
  document.getElementById('modCompareNewRows').textContent = newData.scheduleRows;
  document.getElementById('modCompareOldRemaining').textContent = fmt(oldData.lastRemaining);
  document.getElementById('modCompareNewRemaining').textContent = fmt(newData.lastRemaining);
  // Old schedule table
  var oldBody = document.getElementById('modOldScheduleBody');
  if(oldData.schedule&&oldData.schedule.length>0){
    oldBody.innerHTML = oldData.schedule.map(function(s){
      return '<tr><td>'+esc(s.period)+'</td><td class="num">'+s.daysInMonth+'</td><td class="num">฿'+fmt(s.amortAmount)+'</td><td class="num">฿'+fmt(s.accumulated)+'</td><td class="num">฿'+fmt(s.remaining)+'</td></tr>';
    }).join('');
  } else {
    oldBody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--mt)">No schedule data</td></tr>';
  }
  // New schedule table
  var newBody = document.getElementById('modNewScheduleBody');

    newBody.innerHTML = newData.schedule.map(function(s){
      return '<tr><td>'+esc(s.period)+'</td><td class="num">'+s.daysInMonth+'</td><td class="num">฿'+fmt(s.amortAmount)+'</td><td class="num">฿'+fmt(s.accumulated)+'</td><td class="num">฿'+fmt(s.remaining)+'</td></tr>';

  } else {
    newBody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--mt)">No schedule data</td></tr>';
  }

}

function renderImportPreview(data, csvText) {
  var html = '';
  
  // Summary
  html += '<div class="kpi-grid" style="margin-bottom:12px;grid-template-columns:repeat(auto-fit,minmax(120px,1fr))">';
  html += '<div class="kpi gn"><div class="kv" style="font-size:14px">' + data.totalRows + '</div><div class="kl">Total Rows</div></div>';
  html += '<div class="kpi"><div class="kv" style="font-size:14px">' + data.headers.length + '</div><div class="kl">Columns</div></div>';
  html += '<div class="kpi bl"><div class="kv" style="font-size:12px">' + (data.delimiter || ',') + '</div><div class="kl">Delimiter</div></div>';
  html += '</div>';
  
  // Warnings
  if (data.warnings && data.warnings.length > 0) {
    html += '<div class="al al-er" style="margin-bottom:10px">';
    html += '<i class="bi bi-exclamation-triangle"></i><div>';
    for (var w = 0; w < data.warnings.length; w++) {
      html += '<div>' + esc(data.warnings[w]) + '</div>';
    }
    html += '</div></div>';
  }
  
  // Column Mapping
  html += '<h3 style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.10em;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:8px">';
  html += '<i class="bi bi-diagram-3"></i> Column Mapping';
  html += '</h3>';
  
  html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px;font-size:11px">';
  html += '<div style="color:var(--mt);font-weight:500">CSV Header</div>';
  html += '<div style="color:var(--mt);font-weight:500">→ System Field</div>';
  html += '<div style="color:var(--mt);font-weight:500">Actions</div>';
  
  // Build map of system fields to columns for dropdown
  var mappedFieldIds = {};
  for (var f in data.mappedColumns) {
    mappedFieldIds[f] = true;
  }
  
  var systemFields = data.systemFields || [];
  
  for (var i = 0; i < data.headers.length; i++) {
    var hdr = data.headers[i];
    var fieldId = null;
    for (var f2 in data.mappedColumns) {
      if (data.mappedColumns[f2].col === i) {
        fieldId = f2;
        break;
      }
    }
    
    html += '<div style="font-family:JetBrains Mono,mono;color:var(--tx)">' + esc(hdr) + '</div>';
    
    // Dropdown for field selection
    html += '<div><select class="sel" id="mapCol_' + i + '" style="width:100%;font-size:10px;padding:4px 6px" onchange="onMappingChange()">';
    html += '<option value="">— skip —</option>';
    for (var s = 0; s < systemFields.length; s++) {
      var sf = systemFields[s];
      var selected = (fieldId === sf) ? ' selected' : '';
      html += '<option value="' + sf + '"' + selected + '>' + sf + '</option>';
    }
    html += '</select></div>';
    
    // Field indicator
    html += '<div style="font-size:10px;color:' + (fieldId ? 'var(--gn)' : 'var(--mt)') + '">';
    html += fieldId ? '✅ ' + fieldId : '—';
    html += '</div>';
  }
  html += '</div>';
  
  // Preview Table
  html += '<h3 style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.10em;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:8px">';
  html += '<i class="bi bi-table"></i> Preview (first ' + data.previewRows.length + ' of ' + data.totalRows + ' rows)';
  html += '</h3>';
  
  html += '<div class="tw" style="max-height:300px;overflow:auto;margin-bottom:12px">';
  html += '<table class="tb" style="font-size:10px">';
  html += '<thead><tr>';
  for (var h = 0; h < data.headers.length; h++) {
    html += '<th>' + esc(data.headers[h]) + '</th>';
  }
  html += '</tr></thead><tbody>';
  
  // We need to re-fetch the raw CSV rows... but we only have previewRows (mapped)
  // Let's use the CSV text directly for preview
  var csvLines = csvText.split(/\r?\n/).filter(function(l) { return l.trim() !== ''; });
  var maxPreview = Math.min(csvLines.length - 1, 10);
  for (var pr = 1; pr <= maxPreview; pr++) {
    // Just show raw line truncated
    var rawLine = csvLines[pr] || '';
    // Truncate long lines
    if (rawLine.length > 200) rawLine = rawLine.substring(0, 200) + '...';
    html += '<tr><td colspan="' + data.headers.length + '" style="font-family:JetBrains Mono,mono;font-size:9px;color:var(--mt);max-width:600px;overflow:hidden;text-overflow:ellipsis">';
    html += esc(rawLine);
    html += '</td></tr>';
  }
  html += '</tbody></table>';
  html += '</div>';
  
  // Import button
  html += '<div class="btn-row">';
  html += '<button class="btn btn-gn" id="importConfirmBtn" onclick="confirmImport()"><i class="bi bi-upload"></i> Import ' + data.totalRows + ' Rows</button>';
  html += '<span style="font-size:11px;color:var(--mt)">Review mapping above before importing</span>';
  html += '</div>';
  
  // Store csvText for later use
  _importCsvText = csvText;
  _importHeaders = data.headers.slice();
  
  var el = document.getElementById('importPreviewContent');
  el.innerHTML = html;
  document.getElementById('importPreviewResult').classList.add('show');
}

function onMappingChange() {
  // This is called when the user changes a mapping dropdown
  // We just update the visual, no server call needed
}

var _importCsvText = null;
var _importHeaders = null;

function confirmImport() {
  if (!_importCsvText) { toast('❌ No CSV data to import', 'er'); return; }
  
  // Build column mapping from dropdowns: {fieldId: "Header Name"}
  var columnMapping = {};
  var selects = document.querySelectorAll('#importPreviewContent select[id^="mapCol_"]');
  for (var s = 0; s < selects.length; s++) {
    var sel = selects[s];
    var fieldId = sel.value;
    if (fieldId) {
      // Get the header from the label text before the select
      var colIndex = parseInt(sel.id.replace('mapCol_', ''), 10);
      if (_importHeaders && _importHeaders[colIndex] !== undefined) {
        columnMapping[fieldId] = _importHeaders[colIndex];
      }
    }
  }
  
  document.getElementById('loaderImport').classList.remove('hidden');
  
  google.script.run.withSuccessHandler(function(r) {
    document.getElementById('loaderImport').classList.add('hidden');
    _importCsvText = null;
    
    if (!r.ok) {
      toast('❌ Import failed: ' + (r.error || ''), 'er');
      return;
    }
    
    // Show success result
    var resultHtml = '<div class="al al-ok" style="margin-bottom:10px"><i class="bi bi-check-circle"></i> ';
    resultHtml += '<div><strong>' + r.imported + ' records imported</strong>';
    if (r.skipped > 0) resultHtml += ' — ' + r.skipped + ' skipped';
    resultHtml += '</div></div>';
    
    if (r.errors && r.errors.length > 0) {
      resultHtml += '<div class="tw" style="max-height:200px;overflow:auto"><table class="tb"><thead><tr><th>Row</th><th>Reason</th></tr></thead><tbody>';
      for (var e = 0; e < r.errors.length; e++) {
        resultHtml += '<tr><td style="font-family:JetBrains Mono,mono">' + r.errors[e].row + '</td><td>' + esc(r.errors[e].reason) + '</td></tr>';
      }
      resultHtml += '</tbody></table></div>';
    }
    
    resultHtml += '<div class="btn-row" style="margin-top:8px">';
    resultHtml += '<button class="btn btn-pri btn-sm" onclick="location.reload()"><i class="bi bi-arrow-repeat"></i> Refresh Page</button>';
    resultHtml += '</div>';
    
    document.getElementById('importPreviewContent').innerHTML = resultHtml;
    
    toast('✅ Imported ' + r.imported + ' records' + (r.skipped > 0 ? ', ' + r.skipped + ' skipped' : ''), 'ok');
    
    // Refresh sync data counts if on sync tab
    loadSyncData();
    
  }).withFailureHandler(function(e) {
    document.getElementById('loaderImport').classList.add('hidden');
    toast('❌ ' + e.message, 'er');
  }).confirmImport(_importCsvText, columnMapping);
}

var _searchQ='';
var _colF={};   // {tableId:{colIdx:value}}
var _srchTimer=null;

function initA3(){
  var ct=document.getElementById('ct');

  // Build search bar
  var sb=document.createElement('div');

  clr.innerHTML='✕ Clear filters';
  clr.onclick=clearAllFiltersA3;
  sb.appendChild(clr);
  ct.insertBefore(sb,ct.firstChild);
  // Debounced search
  inp.addEventListener('input',function(){
    clearTimeout(_srchTimer);
    var v=this.value;
    _srchTimer=setTimeout(function(){_searchQ=v.trim();applyA3Filters();},300);
  });
  // MutationObserver picks up dynamically loaded tables
  var obs=new MutationObserver(function(){addFilterIconsA3();if(_searchQ||Object.keys(_colF).length>0)applyA3Filters();});
  obs.observe(ct,{childList:true,subtree:true});
  // Initial run after a beat
  setTimeout(function(){addFilterIconsA3();applyA3Filters();},300);

function addFilterIconsA3(){
  document.querySelectorAll('.tb thead tr').forEach(function(tr){
    Array.from(tr.children).forEach(function(th,idx){
      if(th.querySelector('.col-filter-icon'))return;
      if(getComputedStyle(th).position==='static')th.style.position='relative';
      var ic=document.createElement('span');
      ic.className='col-filter-icon';
      ic.textContent='▾';
      ic.addEventListener('click',function(e){
        e.stopPropagation();e.preventDefault();toggleColFilterA3(th,idx);
      });
      th.appendChild(ic);
    });
  });
}

function toggleColFilterA3(th,idx){
  // Close sibling dropdowns
  document.querySelectorAll('.col-filter-dropdown.show').forEach(function(d){
    if(d.closest('th')!==th)d.classList.remove('show');
  });
  var dd=th.querySelector('.col-filter-dropdown');
  if(dd){dd.classList.toggle('show');return;}
  var table=th.closest('.tb');
  if(!table)return;
  var tbody=table.querySelector('tbody');
  if(!tbody)return;
  // Gather unique values
  var vals=new Set();
  tbody.querySelectorAll('tr').forEach(function(tr){
    var tds=tr.querySelectorAll('td');
    if(tds.length<=idx||tr.querySelector('td[colspan]'))return;
    vals.add(tds[idx].textContent.trim()||'(empty)');
  });
  var sorted=Array.from(vals).sort();
  dd=document.createElement('div');
  dd.className='col-filter-dropdown';
  // All option
  var allOpt=document.createElement('div');
  allOpt.className='fopt fopt-all';
  allOpt.textContent='— All —';
  allOpt.addEventListener('click',function(){clearColFilterA3(th,idx);dd.classList.remove('show');});
  dd.appendChild(allOpt);
  // Value options
  sorted.forEach(function(v){
    var opt=document.createElement('div');
    opt.className='fopt';
    opt.textContent=v;
    opt.addEventListener('click',function(){setColFilterA3(th,idx,v);dd.classList.remove('show');});
    dd.appendChild(opt);
  });
  th.appendChild(dd);
  dd.classList.add('show');
}

function setColFilterA3(th,idx,val){
  var table=th.closest('.tb');
  if(!table)return;
  var tid=table.id||(table.id='tb_'+(+new Date()).toString(36));
  if(!_colF[tid])_colF[tid]={};
  _colF[tid][idx]=val;
  var ic=th.querySelector('.col-filter-icon');
  if(ic)ic.classList.add('active');
  var dd=th.querySelector('.col-filter-dropdown');
  if(dd)dd.classList.remove('show');
  applyA3Filters();
}

function clearColFilterA3(th,idx){
  var table=th.closest('.tb');
  if(!table)return;
  var tid=table.id||'';
  if(_colF[tid]){delete _colF[tid][idx];if(Object.keys(_colF[tid]).length===0)delete _colF[tid];}
  var ic=th.querySelector('.col-filter-icon');
  if(ic)ic.classList.remove('active');
  applyA3Filters();
}

function clearAllFiltersA3(){
  _searchQ='';_colF={};
  var inp=document.getElementById('globalSearchInput');
  if(inp)inp.value='';
  document.querySelectorAll('.col-filter-icon.active').forEach(function(ic){ic.classList.remove('active');});
  document.querySelectorAll('.col-filter-dropdown').forEach(function(d){d.remove();});
  applyA3Filters();
}

function applyA3Filters(){
  var hasF=_searchQ||Object.keys(_colF).length>0;
  var total=0,vis=0;
  // Remove all existing highlights first
  document.querySelectorAll('.cf-highlight').forEach(function(m){
    var p=m.parentNode;var tn=document.createTextNode(m.textContent);
    p.replaceChild(tn,m);p.normalize();
  });
  // Process each .tb table
  document.querySelectorAll('.tb').forEach(function(table){
    var tbody=table.querySelector('tbody');
    if(!tbody)return;
    var tid=table.id||'';
    var filters=_colF[tid]||{};
    var rows=tbody.querySelectorAll('tr');
    var hasVisibleData=false;
    rows.forEach(function(row){
      var cc=row.querySelector('td[colspan]');
      if(cc){row.style.display='none';return;}
      total++;
      var match=true;
      // Text search across the whole row
      if(_searchQ){
        if(row.textContent.toLowerCase().indexOf(_searchQ.toLowerCase())===-1)match=false;
      }
      // Column-level filters
      if(match&&Object.keys(filters).length>0){
        var cells=row.querySelectorAll('td');
        for(var ci in filters){
          var cell=cells[parseInt(ci)];
          if(!cell||cell.textContent.trim()!==filters[ci]){match=false;break;}
        }
      }
      if(match){
        row.style.display='';
        vis++;hasVisibleData=true;
        // Highlight matching text in visible row cells
        if(_searchQ)highlightRowA3(row,_searchQ);
      }else{
        row.style.display='none';
      }
    });
    // Show "no data" row only when filtering hides everything
    rows.forEach(function(row){
      var cc=row.querySelector('td[colspan]');
      if(cc)row.style.display=hasVisibleData||!hasF?'none':'';
    });
  });
  // Badge
  var badge=document.getElementById('filterCountBadge');
  if(badge){
    if(hasF&&total>0){
      badge.textContent=vis.toLocaleString()+' of '+total.toLocaleString()+' items';
      badge.className='filter-count-badge show';
    }else{
      badge.textContent='';badge.className='filter-count-badge';
    }
  }
  // Clear button
  var clr=document.getElementById('clearFiltersBtn');
  if(clr)clr.className='clear-filters-btn'+(hasF?' show':'');
}

function highlightRowA3(row,query){
  if(!query)return;
  var lq=query.toLowerCase();
  var cells=row.querySelectorAll('td');
  cells.forEach(function(cell){
    if(cell.textContent.toLowerCase().indexOf(lq)===-1)return;
    // Walk text nodes
    var tw=document.createTreeWalker(cell,NodeFilter.SHOW_TEXT,null,false);
    var nodes=[];
    while(tw.nextNode())nodes.push(tw.currentNode);
    nodes.forEach(function(tn){
      var txt=tn.textContent;
      var ltxt=txt.toLowerCase();
      var idx=ltxt.indexOf(lq);
      if(idx===-1)return;
      var parts=[];
      var last=0;
      while(idx!==-1){
        if(idx>last)parts.push(document.createTextNode(txt.slice(last,idx)));
        var m=document.createElement('span');m.className='cf-highlight';m.textContent=txt.slice(idx,idx+query.length);
        parts.push(m);
        last=idx+query.length;
        idx=ltxt.indexOf(lq,last);
      }
      if(last<txt.length)parts.push(document.createTextNode(txt.slice(last)));
      var frag=document.createDocumentFragment();
      parts.forEach(function(p){frag.appendChild(p);});
      tn.parentNode.replaceChild(frag,tn);
    });
  });
}

    var cells=tr.querySelectorAll('td');

  });

var _sortState = {};
document.getElementById('ct').addEventListener('click', function(e) {
  var th = e.target.closest('.tb th');
  if (!th) return;
  var table = th.closest('.tb');
  if (!table) return;
  var ths = table.querySelectorAll('thead th');
  var idx = Array.prototype.indexOf.call(ths, th);
  if (idx < 0) return;

  var tid = table.id || (table.id = 'tb_' + Math.random().toString(36).substr(2,5));
  var dir = 'asc';
  if (_sortState[tid] && _sortState[tid].col === idx) dir = _sortState[tid].dir === 'asc' ? 'desc' : 'asc';
  _sortState[tid] = {col: idx, dir: dir};

  ths.forEach(function(h, i) {
    var txt = h.textContent.replace(/[↑↓]/g, '').trim();
    h.innerHTML = txt + (i === idx ? (dir === 'asc' ? ' ↑' : ' ↓') : '');
  });

  var tbody = table.querySelector('tbody');
  if (!tbody) return;
  var rows = Array.from(tbody.querySelectorAll('tr'));
  var dataRows = rows.filter(function(r) { return !r.querySelector('td[colspan]'); });
  var others = rows.filter(function(r) { return r.querySelector('td[colspan]'); });
  if (dataRows.length < 2) return;

  var sample = (dataRows[0].querySelectorAll('td')[idx] || {}).textContent || '';
  var isNum = sample.replace(/[฿,$,\s]/g, '').length > 0 && !isNaN(parseFloat(sample.replace(/[฿,$,\s]/g, '')));

  dataRows.sort(function(a, b) {
    var av = (a.querySelectorAll('td')[idx] || {}).textContent || '';
    var bv = (b.querySelectorAll('td')[idx] || {}).textContent || '';
    if (isNum) {
      av = parseFloat(av.replace(/[฿,$,\s]/g, '')) || 0;
      bv = parseFloat(bv.replace(/[฿,$,\s]/g, '')) || 0;
    } else {
      av = av.toLowerCase(); bv = bv.toLowerCase();
    }
    return av < bv ? (dir === 'asc' ? -1 : 1) : av > bv ? (dir === 'asc' ? 1 : -1) : 0;
  });

  dataRows.forEach(function(r) { tbody.appendChild(r); });
  others.forEach(function(r) { tbody.appendChild(r); });
});

  var csv = '\ufeff' + rows.join('\n');
  var blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('✅ Downloaded ' + filename + '.csv', 'ok');
}

document.addEventListener('keydown', function(e) {
  var ctrl = e.ctrlKey || e.metaKey;
  if (ctrl && e.key === 'r') {
    e.preventDefault();
    var runBtn = document.querySelector('#secAmort .btn-gn');
    if (runBtn) { runBtn.click(); toast('▶️ Running Amortization...', ''); }
    return;
  }
  if (ctrl && e.key === 'e') {
    e.preventDefault();
    if (document.getElementById('secSap').classList.contains('active')) {
      var exportBtn = document.querySelector('#secSap .btn-gn');
      if (exportBtn) exportBtn.click();
    } else if (document.getElementById('secSchedule').classList.contains('active')) {
      var expWide = document.querySelector('#secSchedule .btn-gn');
      if (expWide) expWide.click();
    }
    return;
  }
  if (ctrl && e.key === 's') {
    if (document.getElementById('secSettings').classList.contains('active')) {
      e.preventDefault();
      var saveBtn = document.querySelector('#secSettings .btn-pri');
      if (saveBtn) saveBtn.click();
    }
    return;
  }
  if ((ctrl && e.key === 'f') || (e.key === '/' && !ctrl && !e.altKey && !e.metaKey)) {
    e.preventDefault();
    var si = document.getElementById('globalSearchInput');
    if (si) { si.focus(); si.select(); }
    return;
  }
});

var _rbDocs = [];          // Full doc list from getDocList()
var _rbData = {};          // {docNo: detail} accumulator
var _rbRunning = false;

function toggleRunningBalance() {
  var body = document.getElementById('runningBalanceBody');
  var toggle = document.getElementById('rbToggle');
  if (!body) return;
  var isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  if (toggle) toggle.textContent = isOpen ? '▶' : '▼';
  // If opening and table is empty, trigger load
  if (!isOpen && !_rbRunning && _rbDocs.length === 0) {
    loadRunningBalance(null);
  }
}

function loadRunningBalance(dashData) {
  _rbRunning = true;
  document.getElementById('rbProgress').textContent = '⏳ Loading document list...';
  google.script.run.withSuccessHandler(function(r) {
    if (!r.ok || !r.list || r.list.length === 0) {
      document.getElementById('rbProgress').textContent = 'No documents found.';
      _rbRunning = false;
      return;
    }
    _rbDocs = r.list;
    document.getElementById('rbProgress').textContent =
      'Loaded ' + r.list.length + ' docs. Fetching details...';
    document.getElementById('rbDocCount').textContent =
      r.list.length + ' documents';
    document.getElementById('rbDocCount').style.display = 'inline';
    // Start processing items sequentially
    _rbData = {};
    processRbItem(0);
  }).withFailureHandler(function(e) {
    document.getElementById('rbProgress').textContent = 'Error: ' + e.message;
    _rbRunning = false;
  }).getDocList();
}

function processRbItem(idx) {
  if (idx >= _rbDocs.length) {
    // Done
    document.getElementById('rbProgress').textContent =
      '✅ Loaded ' + _rbDocs.length + ' documents';
    _rbRunning = false;
    updateRbAvgConsumed();
    return;
  }
  var doc = _rbDocs[idx];
  document.getElementById('rbLoaderText').textContent =
    '⏳ Loading ' + (idx + 1) + ' of ' + _rbDocs.length + ': ' + doc.docNo + '...';
  google.script.run.withSuccessHandler(function(detail) {
    if (detail && detail.ok) {
      _rbData[detail.docNo] = detail;
      renderRbRow(detail);
    }
    // Progress indicator
    var pct = Math.round((idx + 1) / _rbDocs.length * 100);
    document.getElementById('rbProgress').textContent =
      'Loaded ' + (idx + 1) + ' of ' + _rbDocs.length + ' (' + pct + '%)';
    // Next item
    setTimeout(function() { processRbItem(idx + 1); }, 10);
  }).withFailureHandler(function(e) {
    // Skip failed item, continue
    console.warn('Failed to load', doc.docNo, e);
    setTimeout(function() { processRbItem(idx + 1); }, 10);
  }).getDocDetail(doc.docNo);
}

function renderRbRow(detail) {
  var tbody = document.getElementById('runningBalanceTbody');
  if (!tbody) return;
  // Remove loading row if present
  var lr = document.getElementById('rbLoadingRow');
  if (lr) lr.remove();

  var amount = detail.amount || 0;
  var amortized = detail.amortized || 0;
  var remaining = detail.remaining || 0;
  var pctConsumed = amount > 0 ? (amortized / amount * 100) : 0;

  var tr = document.createElement('tr');
  tr.style.cursor = 'pointer';
  tr.setAttribute('data-docno', detail.docNo);
  tr.addEventListener('click', function() {
    showRbDocDetail(detail.docNo);
  });

  var startEnd = detail.startDate + ' – ' + detail.endDate;
  // Shorten dates to show month/year
  if (startEnd.length > 30) {
    var s = (detail.startDate || '').substring(0, 7);
    var e = (detail.endDate || '').substring(0, 7);
    startEnd = s + ' – ' + e;
  }

  tr.innerHTML =
    '<td style="font-family:JetBrains Mono,mono;font-size:11px">' + esc(detail.docNo) + '</td>' +
    '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis">' + esc((detail.description || '').substring(0, 40)) + '</td>' +
    '<td style="font-size:10px;white-space:nowrap">' + esc(startEnd) + '</td>' +
    '<td class="num">฿' + fmt(amount) + '</td>' +
    '<td class="num">฿' + fmt(amortized) + '</td>' +
    '<td class="num">฿' + fmt(remaining) + '</td>' +
    '<td class="num">' + pctConsumed.toFixed(1) + '%</td>';

  tbody.appendChild(tr);
}

function updateRbAvgConsumed() {
  var el = document.getElementById('dAvgConsumed');
  if (!el) return;
  var keys = Object.keys(_rbData);
  if (keys.length === 0) { el.textContent = '—'; return; }
  var totalPct = 0, count = 0;
  keys.forEach(function(k) {
    var d = _rbData[k];
    if (d && d.amount > 0) {
      totalPct += (d.amortized / d.amount * 100);
      count++;
    }
  });
  el.textContent = count > 0 ? totalPct.toFixed(1) + '%' : '—';
}

function showRbDocDetail(docNo) {
  if (!docNo) return;
  // If we already have the detail in _rbData, use it; otherwise fetch
  var detail = _rbData[docNo];
  if (detail) {
    showRbDetailPanel(detail);
  } else {
    document.getElementById('rbProgress').textContent =
      '⏳ Fetching ' + docNo + '...';
    google.script.run.withSuccessHandler(function(r) {
      if (r && r.ok) {
        _rbData[r.docNo] = r;
        showRbDetailPanel(r);

        toast('❌ ' + (r ? r.error : 'Failed to load detail'), 'er');

    }).withFailureHandler(function(e) {
      toast('❌ ' + e.message, 'er');
    }).getDocDetail(docNo);
  }
}

var _crudRecords = [];

function loadCrudData() {
  document.getElementById('loaderCrud').classList.remove('hidden');
  document.getElementById('crudBody').innerHTML = '<tr><td colspan="12" style="text-align:center;color:var(--mt)">⏳ Loading...</td></tr>';
  google.script.run.withSuccessHandler(function(r){
    document.getElementById('loaderCrud').classList.add('hidden');

      document.getElementById('crudBody').innerHTML = '<tr><td colspan="12" style="text-align:center;color:var(--rd)">Error: '+(r.error||'')+'</td></tr>';
      return;
    }
    _crudRecords = r.records || [];
    _crudPage = 1;
    document.getElementById('crudRecordCount').textContent = _crudRecords.length + ' records';
    crudRenderTable();
  }).withFailureHandler(function(e){
    document.getElementById('loaderCrud').classList.add('hidden');
    document.getElementById('crudBody').innerHTML = '<tr><td colspan="12" style="text-align:center;color:var(--rd)">Error: '+e.message+'</td></tr>';
    toast('❌ '+e.message,'er');
  }).getCrudRecords();
}

function crudRenderTable() {
  var searchVal = (document.getElementById('crudSearch').value || '').toLowerCase().trim();
  var statusFilter = document.getElementById('crudStatusFilter').value;
  
  // Filter
  var filtered = _crudRecords.filter(function(r){
    if(searchVal){
      var txt = (r.docNo + ' ' + r.description + ' ' + r.io + ' ' + r.glPrepaid + ' ' + r.plate).toLowerCase();
      if(txt.indexOf(searchVal) === -1) return false;
    }
    if(statusFilter && r.status !== statusFilter) return false;
    return true;
  });
  
  document.getElementById('crudFilterCount').textContent = 'Showing ' + filtered.length + ' of ' + _crudRecords.length;
  
  // Paginate
  var totalPages = Math.max(1, Math.ceil(filtered.length / _crudPageSize));
  if(_crudPage > totalPages) _crudPage = totalPages;
  var start = (_crudPage - 1) * _crudPageSize;
  var pageItems = filtered.slice(start, start + _crudPageSize);
  
  // Update pagination controls
  document.getElementById('crudPageInfo').textContent = filtered.length + ' items';
  document.getElementById('crudPageNum').textContent = _crudPage + ' / ' + totalPages;
  document.getElementById('crudPrevBtn').disabled = _crudPage <= 1;
  document.getElementById('crudNextBtn').disabled = _crudPage >= totalPages;
  
  if(pageItems.length === 0){
    document.getElementById('crudBody').innerHTML = '<tr><td colspan="12" style="text-align:center;color:var(--mt)">No records found</td></tr>';
    return;
  }
  
  var html = '';
  for(var i = 0; i < pageItems.length; i++){
    var r = pageItems[i];
    var statusColor = r.status === 'Active' ? 'var(--gn)' : (r.status === 'Expired' ? 'var(--mt)' : 'var(--bl)');
    html += '<tr>' +
      '<td style="font-family:JetBrains Mono,mono;font-size:10px">' + esc(r.docNo) + '</td>' +
      '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis">' + esc((r.description||'').substring(0,35)) + '</td>' +
      '<td style="font-family:JetBrains Mono,mono;font-size:10px">' + esc(r.io) + '</td>' +
      '<td style="font-family:JetBrains Mono,mono;font-size:10px">' + esc(r.glPrepaid) + '</td>' +
      '<td style="font-size:10px">' + esc(r.startDate) + '</td>' +
      '<td style="font-size:10px">' + esc(r.endDate) + '</td>' +
      '<td class="num">฿' + fmt(r.amount) + '</td>' +
      '<td class="num">฿' + fmt(r.amortized) + '</td>' +
      '<td class="num">฿' + fmt(r.remaining) + '</td>' +
      '<td class="num">' + r.consumed + '%</td>' +
      '<td><span style="color:' + statusColor + ';font-size:10px;font-weight:500">' + esc(r.status || '—') + '</span></td>' +
      '<td style="white-space:nowrap">' +
        '<button class="btn btn-ghost btn-sm" onclick="crudShowEditModal(\'' + r.docNo.replace(/'/g,"\\'") + '\')" title="Edit" style="padding:2px 6px;font-size:10px">✏️</button> ' +
        '<button class="btn btn-ghost btn-sm" onclick="crudShowDeleteModal(\'' + r.docNo.replace(/'/g,"\\'") + '\')" title="Delete" style="padding:2px 6px;font-size:10px;color:var(--rd)">🗑️</button>' +
      '</td></tr>';
  }
  document.getElementById('crudBody').innerHTML = html;
}

function crudSave() {
  // Gather data
  var data = {
    company: document.getElementById('crudCompany').value.trim(),
    postingDate: document.getElementById('crudPostingDate').value,
    docDate: document.getElementById('crudDocDate').value,
    description: document.getElementById('crudDescription').value.trim(),
    plate: document.getElementById('crudPlate').value.trim(),
    io: document.getElementById('crudIo').value.trim(),
    glPrepaid: document.getElementById('crudGlPrepaid').value.trim(),
    costCenter: document.getElementById('crudCostCenter').value.trim(),
    startDate: document.getElementById('crudStartDate').value,
    endDate: document.getElementById('crudEndDate').value,
    amount: parseFloat(document.getElementById('crudAmount').value) || 0
  };
  
  // Client-side validation
  var required = [
    {field: 'description', label: 'Description'},
    {field: 'io', label: 'IO'},
    {field: 'glPrepaid', label: 'GL Prepaid'},
    {field: 'costCenter', label: 'Cost Center'},
    {field: 'startDate', label: 'Start Date'},
    {field: 'endDate', label: 'End Date'}
  ];
  for(var i = 0; i < required.length; i++){
    if(!data[required[i].field]){
      document.getElementById('crudModalError').textContent = '⚠️ กรุณากรอก ' + required[i].label;
      document.getElementById('crudModalError').style.display = 'block';
      return;
    }
  }
  if(data.amount <= 0){
    document.getElementById('crudModalError').textContent = '⚠️ จำนวนเงินต้องมากกว่า 0';
    document.getElementById('crudModalError').style.display = 'block';
    return;
  }
  if(data.startDate > data.endDate){
    document.getElementById('crudModalError').textContent = '⚠️ วันที่เริ่มต้นต้อง ≤ วันที่สิ้นสุด';
    document.getElementById('crudModalError').style.display = 'block';
    return;
  }
  
  document.getElementById('crudModalError').style.display = 'none';
  document.getElementById('loaderCrudSave').classList.remove('hidden');
  document.getElementById('crudSaveBtn').disabled = true;
  
  if(_crudEditing){
    // Update existing record
    google.script.run.withSuccessHandler(function(r){
      document.getElementById('loaderCrudSave').classList.add('hidden');
      document.getElementById('crudSaveBtn').disabled = false;
      if(r.ok){
        toast('✅ ' + r.message, 'ok');
        crudCloseModal();
        loadCrudData();
      } else {
        document.getElementById('crudModalError').textContent = '⚠️ ' + (r.error || 'Update failed');
        document.getElementById('crudModalError').style.display = 'block';
        toast('❌ ' + (r.error || 'Update failed'), 'er');
      }
    }).withFailureHandler(function(e){
      document.getElementById('loaderCrudSave').classList.add('hidden');
      document.getElementById('crudSaveBtn').disabled = false;
      document.getElementById('crudModalError').textContent = '⚠️ ' + e.message;
      document.getElementById('crudModalError').style.display = 'block';
      toast('❌ ' + e.message, 'er');
    }).updatePrepaidRecord(_crudEditing, data);
  } else {
    // Add new record
    google.script.run.withSuccessHandler(function(r){
      document.getElementById('loaderCrudSave').classList.add('hidden');
      document.getElementById('crudSaveBtn').disabled = false;
      if(r.ok){
        toast('✅ ' + r.message, 'ok');
        crudCloseModal();
        loadCrudData();
      } else {
        document.getElementById('crudModalError').textContent = '⚠️ ' + (r.error || 'Save failed');
        document.getElementById('crudModalError').style.display = 'block';
        toast('❌ ' + (r.error || 'Save failed'), 'er');
      }
    }).withFailureHandler(function(e){
      document.getElementById('loaderCrudSave').classList.add('hidden');
      document.getElementById('crudSaveBtn').disabled = false;
      document.getElementById('crudModalError').textContent = '⚠️ ' + e.message;
      document.getElementById('crudModalError').style.display = 'block';
      toast('❌ ' + e.message, 'er');
    }).addPrepaidRecord(data);
  }
}
