// ========== PERFORMANCE: BATCH API WRAPPER ==========
/**
 * Batch call multiple backend functions in a single round-trip
 * @param {string[]} fns - Array of function names to call
 * @param {Function} callback - Success callback with results object {results: {fnName: result}}
 * @param {Function} [errorCallback] - Optional error callback
 */
function batchCall(fns, callback, errorCallback) {
  if (!fns || !Array.isArray(fns) || fns.length === 0) {
    if (errorCallback) errorCallback({message: 'fns must be a non-empty array'});
    return;
  }
  google.script.run
    .withSuccessHandler(function(response) {
      if (response.ok) {
        callback(response.results, response.errors);
      } else {
        if (errorCallback) errorCallback(response.error);
      }
    })
    .withFailureHandler(function(e) {
      if (errorCallback) errorCallback(e.message);
    })
    .batchGet(fns);
}

/**
 * Warm up all caches - call from CI/CD or manually
 * @param {Function} callback - Success callback with warmup result
 * @param {Function} [errorCallback] - Optional error callback
 */
function warmupCall(callback, errorCallback) {
  google.script.run
    .withSuccessHandler(function(response) {
      if (response.ok) {
        callback(response);
      } else {
        if (errorCallback) errorCallback(response.error);
      }
    })
    .withFailureHandler(function(e) {
      if (errorCallback) errorCallback(e.message);
    })
    .warmup();
}

// ========== PERFORMANCE UTILITIES ==========
// Debounce function - delays execution until after wait ms of no calls
function debounce(fn, wait) {
  var timer = null;
  return function() {
    var ctx = this, args = arguments;
    clearTimeout(timer);
    timer = setTimeout(function() { fn.apply(ctx, args); }, wait);
  };
}

// Throttle function - limits execution to once per wait ms
function throttle(fn, wait) {
  var last = 0;
  return function() {
    var now = Date.now();
    if (now - last >= wait) {
      last = now;
      fn.apply(this, arguments);
    }
  };
}

// Passive scroll listener helper
function addPassiveScrollListener(element, handler) {
  element.addEventListener('scroll', handler, { passive: true });
}

// ========== VIRTUAL SCROLL MODULE ==========
var VirtualScroll = (function() {
  function VirtualScroll(container, options) {
    this.container = container;
    this.rowHeight = options.rowHeight || 35;
    this.buffer = options.buffer || 10;
    this.renderRow = options.renderRow;
    this.data = [];
    this.visibleStart = 0;
    this.visibleEnd = 0;
    this.scrollTop = 0;
    this.containerHeight = 0;
    this.totalHeight = 0;
    
    this.spacerTop = document.createElement('div');
    this.spacerTop.style.height = '0px';
    this.spacerBottom = document.createElement('div');
    this.spacerBottom.style.height = '0px';
    
    this.tbody = container.querySelector('tbody');
    if (!this.tbody) {
      this.tbody = document.createElement('tbody');
      container.appendChild(this.tbody);
    }
    
    this.tbody.parentNode.insertBefore(this.spacerTop, this.tbody);
    this.tbody.parentNode.appendChild(this.spacerBottom);
    
    this._onScroll = this._onScroll.bind(this);
    addPassiveScrollListener(container.closest('.tw') || container, this._onScroll);
    window.addEventListener('resize', throttle(this._onResize.bind(this), 150));
  }
  
  VirtualScroll.prototype.setData = function(data) {
    this.data = data || [];
    this.totalHeight = this.data.length * this.rowHeight;
    this._updateSpacers();
    this._renderVisible();
  };
  
  VirtualScroll.prototype._onScroll = function(e) {
    var scrollContainer = e.target;
    this.scrollTop = scrollContainer.scrollTop;
    this.containerHeight = scrollContainer.clientHeight;
    this._renderVisible();
  };
  
  VirtualScroll.prototype._onResize = function() {
    var scrollContainer = this.container.closest('.tw') || this.container;
    this.containerHeight = scrollContainer.clientHeight;
    this._renderVisible();
  };
  
  VirtualScroll.prototype._renderVisible = function() {
    var start = Math.max(0, Math.floor(this.scrollTop / this.rowHeight) - this.buffer);
    var end = Math.min(this.data.length, Math.ceil((this.scrollTop + this.containerHeight) / this.rowHeight) + this.buffer);
    
    if (start === this.visibleStart && end === this.visibleEnd) return;
    
    this.visibleStart = start;
    this.visibleEnd = end;
    
    this._updateSpacers();
    
    var html = '';
    for (var i = start; i < end; i++) {
      html += this.renderRow(this.data[i], i);
    }
    this.tbody.innerHTML = html;
  };
  
  VirtualScroll.prototype._updateSpacers = function() {
    this.spacerTop.style.height = (this.visibleStart * this.rowHeight) + 'px';
    this.spacerBottom.style.height = ((this.data.length - this.visibleEnd) * this.rowHeight) + 'px';
  };
  
  VirtualScroll.prototype.destroy = function() {
    var scrollContainer = this.container.closest('.tw') || this.container;
    scrollContainer.removeEventListener('scroll', this._onScroll);
    window.removeEventListener('resize', this._onResize);
    if (this.spacerTop.parentNode) this.spacerTop.parentNode.removeChild(this.spacerTop);
    if (this.spacerBottom.parentNode) this.spacerBottom.parentNode.removeChild(this.spacerBottom);
  };
  
  return VirtualScroll;

// ========== VIRTUAL SCROLL INITIALIZATION HELPERS ==========
function initVirtualScroll(tbodyId, data, renderRow, options) {
  var tbody = document.getElementById(tbodyId);
  if (!tbody) return null;
  var container = tbody.closest('.tw');
  if (!container) return null;
  
  // Check if already initialized
  if (container._virtualScroll) {
    container._virtualScroll.setData(data);
    return container._virtualScroll;
  }
  
  var vs = new VirtualScroll(container, Object.assign({
    rowHeight: 35,
    buffer: 10,
    renderRow: renderRow
  }, options));
  
  vs.setData(data);
  container._virtualScroll = vs;
  return vs;
}

function destroyVirtualScroll(tbodyId) {
  var tbody = document.getElementById(tbodyId);
  if (!tbody) return;
  var container = tbody.closest('.tw');
  if (container && container._virtualScroll) {
    container._virtualScroll.destroy();
    container._virtualScroll = null;
  }
}

})();

// ========== CHART.JS OPTIMIZATIONS ==========
var ChartManager = (function() {
  var instances = {};
  var visibilityObservers = {};
  var chartConfigs = {};
  var decimationPluginLoaded = false;
  
  // Load decimation plugin for large datasets
  function loadDecimationPlugin() {
    if (decimationPluginLoaded || typeof Chart === 'undefined') return;
    try {
      // Chart.js decimation plugin inline (minimal version)
      var DecimationPlugin = {
        id: 'decimation',
        beforeDatasetsUpdate: function(chart) {
          var meta = chart.getDatasetMeta(0);
          if (!meta.data || meta.data.length < 500) return;
          var decimation = chart.options.plugins?.decimation;
          if (!decimation || decimation.enabled === false) return;
          
          var threshold = decimation.threshold || 500;
          var algorithm = decimation.algorithm || 'lttb';
          
          if (meta.data.length > threshold) {
            // Simple LTTB decimation
            var data = chart.data.datasets[0].data;
            var labels = chart.data.labels;
            var sampled = lttbDecimate(data, labels, threshold);
            chart.data.datasets[0].data = sampled.data;
            chart.data.labels = sampled.labels;
            meta._decimated = true;
            meta._originalData = data;
            meta._originalLabels = labels;
          }
        },
        afterRender: function(chart) {
          var meta = chart.getDatasetMeta(0);
          if (meta._decimated) {
            chart.data.datasets[0].data = meta._originalData;
            chart.data.labels = meta._originalLabels;
            meta._decimated = false;
          }
        }
      };
      
      function lttbDecimate(data, labels, threshold) {
        if (data.length <= threshold) return { data: data, labels: labels };
        var sampled = [];
        var sampledLabels = [];
        var every = (data.length - 2) / (threshold - 2);
        var a = 0;
        sampled.push(data[0]);
        sampledLabels.push(labels[0]);
        
        for (var i = 1; i < threshold - 1; i++) {
          var avgStart = Math.floor(every * (i - 1)) + 1;
          var avgEnd = Math.floor(every * i) + 1;
          var avgX = 0, avgY = 0;
          for (var j = avgStart; j < avgEnd && j < data.length; j++) {
            avgX += j;
            avgY += data[j];
          }
          avgX /= (avgEnd - avgStart);
          avgY /= (avgEnd - avgStart);
          
          var rangeStart = Math.floor(every * i) + 1;
          var rangeEnd = Math.floor(every * (i + 1)) + 1;
          var maxArea = -1, maxIdx = rangeStart;
          for (var k = rangeStart; k < rangeEnd && k < data.length; k++) {
            var area = Math.abs((avgX - 0) * (data[k] - data[0]) - (avgX - k) * (avgY - data[0]));
            if (area > maxArea) {
              maxArea = area;
              maxIdx = k;
            }
          }
          sampled.push(data[maxIdx]);
          sampledLabels.push(labels[maxIdx]);
        }
        sampled.push(data[data.length - 1]);
        sampledLabels.push(labels[labels.length - 1]);
        return { data: sampled, labels: sampledLabels };
      }
      
      Chart.register(DecimationPlugin);
      decimationPluginLoaded = true;
    } catch (e) {
      console.warn('Decimation plugin failed to load:', e);
    }
  }
  
  function registerChart(id, config) {
    chartConfigs[id] = config;
  }
  
  function initChart(id, force) {
    if (instances[id] && !force) return instances[id];
    
    var config = chartConfigs[id];
    if (!config) return null;
    
    var canvas = document.getElementById(id);
    if (!canvas) return null;
    
    // Apply default optimizations
    var optimizedConfig = Object.assign({}, config);
    optimizedConfig.options = Object.assign({}, config.options);
    optimizedConfig.options.animation = Object.assign({
      duration: 100, // Reduced from 300ms
      easing: 'easeOutQuart'
    }, config.options?.animation);
    optimizedConfig.options.responsive = true;
    optimizedConfig.options.maintainAspectRatio = false;
    
    // Add decimation for large datasets
    if (config.data?.datasets?.[0]?.data?.length > 300) {
      optimizedConfig.options.plugins = Object.assign({}, config.options?.plugins);
      optimizedConfig.options.plugins.decimation = {
        enabled: true,
        algorithm: 'lttb',
        threshold: 300
      };
    }
    
    loadDecimationPlugin();
    
    var ctx = canvas.getContext('2d');
    instances[id] = new Chart(ctx, optimizedConfig);
    return instances[id];
  }
  
  function destroyChart(id) {
    if (instances[id]) {
      instances[id].destroy();
      delete instances[id];
    }
  }
  
  function destroyAllCharts() {
    for (var id in instances) {
      destroyChart(id);
    }
  }
  
  function getChart(id) {
    return instances[id];
  }
  
  function setupLazyInit(sectionId, chartIds) {
    var section = document.getElementById(sectionId);
    if (!section) return;
    
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          chartIds.forEach(function(id) {
            initChart(id);
          });
          observer.unobserve(section);
        }
      });
    }, { rootMargin: '100px', threshold: 0.01 });
    
    observer.observe(section);
    visibilityObservers[sectionId] = observer;
  }
  
  function setupSectionVisibility(sectionId, chartIds) {
    var section = document.getElementById(sectionId);
    if (!section) return;
    
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (!entry.isIntersecting) {
          chartIds.forEach(function(id) {
            destroyChart(id);
          });
        } else {
          chartIds.forEach(function(id) {
            initChart(id);
          });
        }
      });
    }, { rootMargin: '50px', threshold: 0.01 });
    
    observer.observe(section);
    visibilityObservers[sectionId] = observer;
  }
  
  function cleanupSection(sectionId) {
    if (visibilityObservers[sectionId]) {
      visibilityObservers[sectionId].disconnect();
      delete visibilityObservers[sectionId];
    }
  }
  
  // Expose API
  return {
    registerChart: registerChart,
    initChart: initChart,
    destroyChart: destroyChart,
    destroyAllCharts: destroyAllCharts,
    getChart: getChart,
    setupLazyInit: setupLazyInit,
    setupSectionVisibility: setupSectionVisibility,
    cleanupSection: cleanupSection,
    instances: instances
  };
})();

// ========== SEARCH/FILTER DEBOUNCE ==========
function createDebouncedSearch(inputId, callback, delay) {
  var input = document.getElementById(inputId);
  if (!input) return;
  
  var debounced = debounce(function() {
    callback(input.value.trim());
  }, delay || 300);
  
  input.addEventListener('input', debounced);
  return debounced;
}

function createThrottledResize(callback, delay) {
  return throttle(callback, delay || 150);
}

// ========== TABLE VIRTUALIZATION HELPERS ==========
function virtualizeTable(tbodyId, data, renderRow, options) {
  var tbody = document.getElementById(tbodyId);
  if (!tbody) return null;
  
  var container = tbody.closest('.tw');
  if (!container) return null;
  
  var vs = new VirtualScroll(container, {
    rowHeight: options?.rowHeight || 35,
    buffer: options?.buffer || 10,
    renderRow: renderRow
  });
  
  vs.setData(data);
  return vs;
}

function debounceFilter(inputId, tableSelector, delay) {
  var timer = null;
  var input = document.getElementById(inputId);
  if (!input) return;
  
  input.addEventListener('input', function() {
    clearTimeout(timer);
    timer = setTimeout(function() {
      var query = input.value.toLowerCase().trim();
      document.querySelectorAll(tableSelector + ' tbody tr').forEach(function(row) {
        if (row.querySelector('td[colspan]')) return;
        var match = !query || row.textContent.toLowerCase().indexOf(query) !== -1;
        row.style.display = match ? '' : 'none';
      });
    }, delay || 300);
  });
}

// ========== PAGINATION ==========
// Reusable pagination state
var _pagState = {
  amort: { page: 0, pageSize: 50, total: 0 },
  sap: { page: 0, pageSize: 50, total: 0 },
  void: { page: 0, pageSize: 50, total: 0 },
  checker: { page: 0, pageSize: 50, total: 0 }
};

function renderPagination(section, totalItems) {
  var state = _pagState[section];
  if (!state) return '';
  state.total = totalItems || 0;
  var totalPages = Math.max(1, Math.ceil(state.total / state.pageSize));
  var page = Math.min(state.page, totalPages - 1);
  state.page = page;
  
  var start = page * state.pageSize + 1;
  var end = Math.min((page + 1) * state.pageSize, state.total);
  var hasPrev = page > 0;
  var hasNext = page < totalPages - 1;
  
  return '<div class="pagination" id="pag_' + section + '">' +
    '<button class="btn btn-ghost btn-sm" onclick="pagPrev(\'' + section + '\')" ' + (!hasPrev ? 'disabled' : '') + '>◀</button>' +
    '<span class="pag-info">หน้า ' + (page + 1) + ' จาก ' + totalPages + '</span>' +
    '<button class="btn btn-ghost btn-sm" onclick="pagNext(\'' + section + '\')" ' + (!hasNext ? 'disabled' : '') + '>▶</button>' +
    '<span class="pag-range">แสดง ' + start.toLocaleString() + '–' + end.toLocaleString() + ' จาก ' + state.total.toLocaleString() + ' รายการ</span>' +
    '</div>';
}

function pagPrev(section) {
  var state = _pagState[section];
  if (!state || state.page <= 0) return;
  state.page--;
  pagRefresh(section);
}

function pagNext(section) {
  var state = _pagState[section];
  if (!state) return;
  var totalPages = Math.ceil(state.total / state.pageSize);
  if (state.page >= totalPages - 1) return;
  state.page++;
  pagRefresh(section);
}

function pagGoTo(section, page) {
  var state = _pagState[section];
  if (!state) return;
  state.page = Math.max(0, Math.min(page, Math.ceil(state.total / state.pageSize) - 1));
  pagRefresh(section);
}

function pagRefresh(section) {
  // Dispatch a custom event that the section handlers can listen to
  var evt = new CustomEvent('paginate', { detail: { section: section } });
  document.dispatchEvent(evt);
}

// ========== LAZY SECTION LOADER + CLIENT-SIDE CACHE ==========
/**
 * PA Cache Module - Client-side caching with localStorage + in-memory
 * Cache key pattern: pa_cache_{type}_{key} with TTL
 * Auto-invalidates on save operations
 * Fallback to backend if cache miss/expired
 */
var PACache = (function() {
  var memoryCache = {};
  var DEFAULT_TTL = 5 * 60 * 1000; // 5 minutes
  
  // TTL configs per data type
  var TTL_CONFIG = {
    settings: 30 * 60 * 1000,      // 30 min
    userGuide: 60 * 60 * 1000,     // 1 hour
    columnMaps: 24 * 60 * 60 * 1000, // 24 hours
    glAccounts: 30 * 60 * 1000,    // 30 min
    dashboard: 2 * 60 * 1000,      // 2 min
    docList: 5 * 60 * 1000,        // 5 min
    default: DEFAULT_TTL
  };
  
  function makeKey(type, key) {
    return 'pa_cache_' + type + '_' + (key || 'default');
  }
  
  function getTTL(type) {
    return TTL_CONFIG[type] || TTL_CONFIG.default;
  }
  
  function isExpired(entry) {
    return Date.now() > entry.timestamp + entry.ttl;
  }
  
  function getFromMemory(key) {
    var entry = memoryCache[key];
    if (entry && !isExpired(entry)) {
      return entry.data;
    }
    if (entry) {
      delete memoryCache[key];
    }
    return null;
  }
  
  function setInMemory(key, data, ttl) {
    memoryCache[key] = {
      data: data,
      timestamp: Date.now(),
      ttl: ttl || DEFAULT_TTL
    };
  }
  
  function getFromLocalStorage(key) {
    try {
      var stored = localStorage.getItem(key);
      if (!stored) return null;
      var entry = JSON.parse(stored);
      if (isExpired(entry)) {
        localStorage.removeItem(key);
        return null;
      }
      return entry.data;
    } catch (e) {
      return null;
    }
  }
  
  function setInLocalStorage(key, data, ttl) {
    try {
      var entry = {
        data: data,
        timestamp: Date.now(),
        ttl: ttl || DEFAULT_TTL
      };
      localStorage.setItem(key, JSON.stringify(entry));
    } catch (e) {
      // localStorage full or unavailable
    }
  }
  
  function removeFromLocalStorage(key) {
    try { localStorage.removeItem(key); } catch (e) {}
  }
  
  // Public API
  return {
    // Get cached data (memory first, then localStorage)
    get: function(type, key) {
      var cacheKey = makeKey(type, key);
      var data = getFromMemory(cacheKey);
      if (data !== null) return data;
      data = getFromLocalStorage(cacheKey);
      if (data !== null) {
        // Promote to memory cache
        setInMemory(cacheKey, data, getTTL(type));
      }
      return data;
    },
    
    // Set data in both memory and localStorage
    set: function(type, key, data) {
      var cacheKey = makeKey(type, key);
      var ttl = getTTL(type);
      setInMemory(cacheKey, data, ttl);
      setInLocalStorage(cacheKey, data, ttl);
    },
    
    // Invalidate specific cache entry
    invalidate: function(type, key) {
      var cacheKey = makeKey(type, key);
      delete memoryCache[cacheKey];
      removeFromLocalStorage(cacheKey);
    },
    
    // Invalidate all caches of a type (e.g., all settings)
    invalidateType: function(type) {
      var prefix = 'pa_cache_' + type + '_';
      // Clear from memory
      Object.keys(memoryCache).forEach(function(key) {
        if (key.indexOf(prefix) === 0) delete memoryCache[key];
      });
      // Clear from localStorage
      try {
        var keysToRemove = [];
        for (var i = 0; i < localStorage.length; i++) {
          var k = localStorage.key(i);
          if (k && k.indexOf(prefix) === 0) keysToRemove.push(k);
        }
        keysToRemove.forEach(function(k) { localStorage.removeItem(k); });
      } catch (e) {}
    },
    
    // Invalidate all caches (on logout or major data change)
    invalidateAll: function() {
      memoryCache = {};
      try {
        var keysToRemove = [];
        for (var i = 0; i < localStorage.length; i++) {
          var k = localStorage.key(i);
          if (k && k.indexOf('pa_cache_') === 0) keysToRemove.push(k);
        }
        keysToRemove.forEach(function(k) { localStorage.removeItem(k); });
      } catch (e) {}
    },
    
    // Clear expired entries
    cleanup: function() {
      var now = Date.now();
      // Memory
      Object.keys(memoryCache).forEach(function(key) {
        if (isExpired(memoryCache[key])) delete memoryCache[key];
      });
      // localStorage
      try {
        var keysToRemove = [];
        for (var i = 0; i < localStorage.length; i++) {
          var k = localStorage.key(i);
          if (k && k.indexOf('pa_cache_') === 0) {
            var entry = JSON.parse(localStorage.getItem(k) || '{}');
            if (entry.timestamp && now > entry.timestamp + (entry.ttl || DEFAULT_TTL)) {
              keysToRemove.push(k);
            }
          }
        }
        keysToRemove.forEach(function(k) { localStorage.removeItem(k); });
      } catch (e) {}
    }
  };
})();

/**

    import: 'loadImportPage',
    admin: 'loadAdminConsole',
    audit: 'loadAuditLog',
    crud: 'loadCrudData'
  };
  
  function loadSection(sectionName) {
    if (loadedSections[sectionName]) {
      return Promise.resolve();
    }
    
    // Return existing promise if already loading
    if (loadingPromises[sectionName]) {
      return loadingPromises[sectionName];
    }
    
    // Check content cache first — SYNC for fast tab switch
    var cached = sectionContentCache[sectionName];
    if (cached) {
      injectSection(sectionName, cached);
      loadedSections[sectionName] = true;
      delete loadingPromises[sectionName];
      callInitFunction(sectionName);
      return Promise.resolve();
    }
    
    var promise = new Promise(function(resolve, reject) {
      // Since we're embedding templates in JS, just resolve immediately
      var template = sectionTemplates[sectionName];
      if (!template) {
        reject(new Error('No template for section: ' + sectionName));
        return;
      }
      
      // Cache the template for future fast switches
      sectionContentCache[sectionName] = template;
      
      injectSection(sectionName, template);
      loadedSections[sectionName] = true;
      delete loadingPromises[sectionName];
      callInitFunction(sectionName);
      resolve();
    });
    
    loadingPromises[sectionName] = promise;
    return promise;
  }
  
  function injectSection(sectionName, html) {
    var sectionEl = document.getElementById('sec' + sectionName.charAt(0).toUpperCase() + sectionName.slice(1));
    if (sectionEl) {
      sectionEl.innerHTML = html;
    }
  }
  
  function callInitFunction(sectionName) {
    var fnName = sectionInitFunctions[sectionName];
    if (fnName && typeof window[fnName] === 'function') {
      // Defer to next tick to ensure DOM is ready
      setTimeout(function() { window[fnName](); }, 0);
    }
  }
  
  // Preload critical data in parallel with UI render
  function preloadCriticalData() {
    // Pre-fetch dashboard data
    if (typeof loadDashboard === 'function') {
      setTimeout(loadDashboard, 0);
    }
    
    // Preload user guide content (large static text)
    PACache.set('userGuide', 'default', { preloaded: true, timestamp: Date.now() });
    
    // Preload settings
    if (typeof loadSettings === 'function') {
      // Settings loaded on demand when visiting settings page
    }
  }
  
  // Public API
  return {
    loadSection: loadSection,
    preloadCriticalData: preloadCriticalData,
    isLoaded: function(sectionName) { return !!loadedSections[sectionName]; }
  };

// ========== NAVIGATION ==========
// DOM reference cache for fast tab switch
var _domCache = {
  sections: null,
  navItems: null,
  bnItems: null,
  nav: null,
  overlay: null
};
function _refreshDomCache() {
  _domCache.sections = document.querySelectorAll('.section');
  _domCache.navItems = document.querySelectorAll('.ni');
  _domCache.bnItems = document.querySelectorAll('.bn-item');
  _domCache.nav = document.querySelector('nav');
  _domCache.overlay = document.getElementById('navOverlay');
}

function go(p){
  var sectionId = 'sec' + p.charAt(0).toUpperCase() + p.slice(1);
  var navId = 'nav-' + p;
  
  // Refresh DOM cache periodically (every 10th call)
  if (!_domCache.sections || Math.random() < 0.01) _refreshDomCache();
  
  var doSwitch = function() {
    // Hide all sections — use cached references
    for (var i = 0; i < _domCache.sections.length; i++) {
      _domCache.sections[i].classList.remove('active');
    }
    // Show target section
    var secEl = document.getElementById(sectionId);
    if (secEl) secEl.classList.add('active');
    
    // Update sidebar nav — use cached references
    for (var i = 0; i < _domCache.navItems.length; i++) {
      _domCache.navItems[i].classList.remove('on');
    }
    var navEl = document.getElementById(navId);
    if (navEl) navEl.classList.add('on');
    
    // Update bottom nav — use cached references
    for (var i = 0; i < _domCache.bnItems.length; i++) {
      _domCache.bnItems[i].classList.remove('on');
    }
    var bnMap = {dashboard:0, amort:1, sap:2, sync:3, import:4, admin:5, budget:6, settings:7};
    var bnIdx = bnMap[p];
    if (bnIdx !== undefined && _domCache.bnItems[bnIdx]) {
      _domCache.bnItems[bnIdx].classList.add('on');
    }
    
    // Close mobile nav
    if (window.innerWidth <= 768) {
      if (_domCache.nav) _domCache.nav.classList.remove('open');
      if (_domCache.overlay) _domCache.overlay.classList.remove('show');
    }
  };
  
  // Lazy load section if needed
  if (p !== 'dashboard' && typeof LazySectionLoader !== 'undefined' && !LazySectionLoader.isLoaded(p)) {
    LazySectionLoader.loadSection(p).then(doSwitch);
  } else {
    doSwitch();
  }
}
function switchTab(p){go(p);}

  // Setup lazy initialization for dashboard section

function toggleMultiPeriod() {
  var chk = document.getElementById('multiPeriodChk');
  var range = document.getElementById('multiPeriodRange');
  if (chk && range) {
    range.style.display = chk.checked ? 'flex' : 'none';
  }
}

function generatePeriodList_(start, end) {
  // Generate array of YYYY-MM periods from start to end inclusive
  var partsS = start.split('-'), partsE = end.split('-');
  var sy = parseInt(partsS[0]), sm = parseInt(partsS[1]) - 1;
  var ey = parseInt(partsE[0]), em = parseInt(partsE[1]) - 1;
  var list = [];
  var cur = new Date(sy, sm, 1);
  var endDate = new Date(ey, em, 1);
  while (cur <= endDate) {
    var y = cur.getFullYear();
    var m = cur.getMonth() + 1;
    list.push(y + '-' + (m < 10 ? '0' : '') + m);
    cur.setMonth(cur.getMonth() + 1);
  }
  return list;
}

function runAmort(){
  var multiChecked = document.getElementById('multiPeriodChk') && document.getElementById('multiPeriodChk').checked;
  var periodArg = null;

  if (multiChecked) {
    var startVal = document.getElementById('mpStart').value.trim();
    var endVal = document.getElementById('mpEnd').value.trim();
    if (!startVal || !endVal) { toast('กรุณากรอกงวด開始 และ งวดสิ้นสุด','er'); return; }
    if (!/^\d{4}-\d{2}$/.test(startVal) || !/^\d{4}-\d{2}$/.test(endVal)) { toast('รูปแบบ YYYY-MM','er'); return; }
    if (startVal > endVal) { toast('งวดเริ่มต้นต้อง ≤ งวดสิ้นสุด','er'); return; }
    periodArg = generatePeriodList_(startVal, endVal);
  } else {
    var period = document.getElementById('amortPeriod').value.trim();
    if(period&&!/^\d{4}-\d{2}$/.test(period)){toast('รูปแบบ YYYY-MM หรือว่าง','er');return}
    periodArg = period || null;
  }

  document.getElementById('loaderAmort').classList.remove('hidden');
  document.getElementById('resultAmort').classList.remove('show');
  google.script.run.withSuccessHandler(function(r){
    document.getElementById('loaderAmort').classList.add('hidden');
    var el=document.getElementById('resultAmort');el.classList.add('show');
    if(r.ok){
      var html='<div class="al al-ok"><i class="bi bi-check-circle"></i> '+r.message+'</div>'+
        '<div class="kpi-grid" style="margin-top:10px">'+
        '<div class="kpi"><div class="kv">'+r.activeItems.toLocaleString()+'</div><div class="kl">Active Items</div></div>'+
        '<div class="kpi bl"><div class="kv">'+r.scheduleRows.toLocaleString()+'</div><div class="kl">Schedule Rows</div></div>'+
        '<div class="kpi gn"><div class="kv">฿'+fmt(r.totalAmount)+'</div><div class="kl">Total Amort</div></div></div>';

      // Per-period breakdown for multi-period runs
      if (r.isMultiPeriod && r.perPeriod && r.perPeriod.length > 0) {
        html += '<div class="card" style="padding:12px;margin-top:8px"><h3 style="margin-bottom:8px">📊 Per-Period Results</h3>' +
          '<table class="tb" style="font-size:11px"><thead><tr>' +
          '<th>Period</th><th class="num">Active Items</th><th class="num">Schedule Rows</th><th class="num">Total Amount</th>' +
          '</tr></thead><tbody>' +
          r.perPeriod.map(function(pp){
            return '<tr>' +
              '<td style="font-family:JetBrains Mono,mono">'+esc(pp.period)+'</td>' +
              '<td class="num">'+pp.activeItems.toLocaleString()+'</td>' +
              '<td class="num">'+pp.scheduleRows.toLocaleString()+'</td>' +
              '<td class="num">฿'+fmt(pp.totalAmount)+'</td></tr>';
          }).join('') +
          '</tbody></table></div>';
      }

      if(r.sample&&r.sample.length>0){
        // Pagination: slice sample based on page
        var pagState = _pagState['amort'];
        var sampleAll = r.sample;
        var totalRows = r.scheduleRows || sampleAll.length;
        pagState.total = totalRows;
        var page = pagState.page;
        var ps = pagState.pageSize;
        var pagedSample = sampleAll.slice(page * ps, (page + 1) * ps);
        
        html+=renderPagination('amort', totalRows);
        html+='<div class="tw" style="max-height:300px;overflow-y:auto"><table class="tb" id="amortPagTable"><thead><tr>'+
          '<th>Doc</th><th>Doc No 2</th><th>รายการ</th><th>Period</th><th>GL</th><th class="num">Amount</th><th class="num">Accum</th><th class="num">Remain</th>'+
          '</tr></thead><tbody>'+pagedSample.map(function(s){
            return '<tr><td style="font-family:JetBrains Mono,mono">'+esc(s.docNo)+'</td>'+
              '<td style="font-family:JetBrains Mono,mono">'+esc(s.docNo2||'')+'</td>'+
              '<td style="max-width:150px;overflow:hidden;text-overflow:ellipsis">'+esc((s.description||'').substring(0,30))+'</td>'+
              '<td>'+esc(s.period)+'</td>'+
              '<td style="font-family:JetBrains Mono,mono">'+esc(s.glPrepaid||'')+'</td>'+
              '<td class="num">'+fmt(s.amortAmount)+'</td>'+
              '<td class="num">'+fmt(s.accumulated)+'</td>'+
              '<td class="num">'+fmt(s.remaining)+'</td></tr>';
          }).join('')+'</tbody></table></div>';
      }
      el.innerHTML=html;
      if(r.sample) populateSchedule(r.sample);
      toast('✅ '+(multiChecked?'Multi-period run complete':'Run complete'),'ok');
    }else{
      el.innerHTML='<div class="al al-er"><i class="bi bi-x-circle"></i> '+(r.error||'Error')+'</div>';
    }
  }).withFailureHandler(function(e){
    document.getElementById('loaderAmort').classList.add('hidden');
    showResult('resultAmort','<div class="al al-er"><i class="bi bi-x-circle"></i> '+e.message+'</div>');
  }).runMonthEndAmortization(periodArg);
}

// ========== BULK SAP JE EXPORT ==========
var _bulkPeriods = [];

function toggleBulkSAP() {
  var el = document.getElementById('bulkSapSection');
  var btn = document.getElementById('bulkSapToggle');
  if (el.style.display === 'none') {
    el.style.display = 'block';
    btn.innerHTML = '<i class="bi bi-dash-circle"></i> Hide Bulk Export';
    loadBulkSAPPeriods();
  } else {
    el.style.display = 'none';
    btn.innerHTML = '<i class="bi bi-plus-circle"></i> Bulk Export';
  }
}

function loadBulkSAPPeriods() {
  document.getElementById('loaderBulkSAP').classList.remove('hidden');
  document.getElementById('bulkSapBody').innerHTML = '';
  google.script.run.withSuccessHandler(function(periods){
    document.getElementById('loaderBulkSAP').classList.add('hidden');
    if (!periods || periods.length === 0) {
      document.getElementById('bulkSapBody').innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--mt)">No periods available</td></tr>';
      return;
    }
    _bulkPeriods = periods;
    var html = '';
    for (var i = 0; i < periods.length; i++) {
      html += '<tr>' +
        '<td style="text-align:center"><input type="checkbox" class="bulk-sap-cb" value="'+esc(periods[i])+'" onchange="onBulkSAPCheckChange()"></td>' +
        '<td style="font-family:JetBrains Mono,mono">'+esc(periods[i])+'</td>' +
        '<td class="num" id="bulkPreview_'+periods[i]+'">—</td>' +
        '<td class="num" id="bulkPreviewDocs_'+periods[i]+'">—</td>' +
        '<td class="num" id="bulkPreviewLines_'+periods[i]+'">—</td>' +
        '<td class="num" id="bulkPreviewAmount_'+periods[i]+'">—</td>' +
        '</tr>';
    }
    document.getElementById('bulkSapBody').innerHTML = html;
    document.getElementById('bulkSapCount').textContent = periods.length+' periods';
    toast('✅ โหลด '+periods.length+' งวด','ok');
  }).withFailureHandler(function(e){
    document.getElementById('loaderBulkSAP').classList.add('hidden');
    document.getElementById('bulkSapBody').innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--mt)">Error: '+e.message+'</td></tr>';
    toast('❌ '+e.message,'er');
  }).getAvailablePeriods();
}

function onBulkSAPSelectAll() {
  var checked = document.getElementById('bulkSapSelectAll').checked;
  document.querySelectorAll('.bulk-sap-cb').forEach(function(cb){cb.checked = checked;});
  updateBulkSAPCount();
}

function onBulkSAPClearAll() {
  document.querySelectorAll('.bulk-sap-cb').forEach(function(cb){cb.checked = false;});
  document.getElementById('bulkSapSelectAll').checked = false;
  updateBulkSAPCount();
}

function onBulkSAPCheckChange() {
  updateBulkSAPCount();
  var all = document.querySelectorAll('.bulk-sap-cb');
  var allChecked = true;
  all.forEach(function(cb){if(!cb.checked) allChecked = false;});
  document.getElementById('bulkSapSelectAll').checked = allChecked;
}

function updateBulkSAPCount() {
  var selected = document.querySelectorAll('.bulk-sap-cb:checked').length;
  var el = document.getElementById('bulkSapSelectedCount');
  if (selected > 0) {
    el.textContent = '✅ เลือก '+selected+' งวด';
    el.style.color = 'var(--gn)';
  } else {
    el.textContent = '0 งวด';
    el.style.color = 'var(--mt)';
  }
}

function getSelectedBulkSAPPeriods() {
  var selected = [];
  document.querySelectorAll('.bulk-sap-cb:checked').forEach(function(cb){
    selected.push(cb.value);
  });
  return selected;
}

function previewBulkSAP() {
  var selected = getSelectedBulkSAPPeriods();
  if (selected.length === 0) { toast('กรุณาเลือกอย่างน้อย 1 งวด','er'); return; }
  
  // Show loader on each selected row
  for (var i = 0; i < selected.length; i++) {
    document.getElementById('bulkPreview_'+selected[i]).textContent = '⏳';
    document.getElementById('bulkPreviewDocs_'+selected[i]).textContent = '';
    document.getElementById('bulkPreviewLines_'+selected[i]).textContent = '';
    document.getElementById('bulkPreviewAmount_'+selected[i]).textContent = '';
  }
  document.getElementById('resultBulkSAP').classList.remove('show');
  
  // Get preview for each period sequentially
  var idx = 0;
  function previewNext() {
    if (idx >= selected.length) {
      toast('✅ Preview complete','ok');
      return;
    }
    var period = selected[idx];
    google.script.run.withSuccessHandler(function(r){
      var p = r.period || period;
      if (r.ok) {
        document.getElementById('bulkPreview_'+p).textContent = '✅';
        document.getElementById('bulkPreviewDocs_'+p).textContent = r.totalDocs || 0;
        document.getElementById('bulkPreviewLines_'+p).textContent = r.totalLines || 0;
        document.getElementById('bulkPreviewAmount_'+p).textContent = '฿'+fmt(r.totalDebit);
      } else {
        document.getElementById('bulkPreview_'+p).textContent = '❌';
        document.getElementById('bulkPreviewDocs_'+p).textContent = '—';
        document.getElementById('bulkPreviewLines_'+p).textContent = '—';
        document.getElementById('bulkPreviewAmount_'+p).textContent = r.error || 'Error';
      }
      idx++;
      previewNext();
    }).withFailureHandler(function(e){
      document.getElementById('bulkPreview_'+period).textContent = '❌';
      document.getElementById('bulkPreviewDocs_'+period).textContent = '—';
      document.getElementById('bulkPreviewLines_'+period).textContent = '—';
      document.getElementById('bulkPreviewAmount_'+period).textContent = e.message;
      idx++;
      previewNext();
    }).getSAPJEPreview(period);
  }
  previewNext();
}

function exportBulkSAP() {
  var selected = getSelectedBulkSAPPeriods();
  if (selected.length === 0) { toast('กรุณาเลือกอย่างน้อย 1 งวด','er'); return; }
  if (!confirm('สร้าง SAP JE สำหรับ '+selected.length+' งวด? (แต่ละงวดจะแยก Sheet)' +
    '\n\nงวดที่เลือก:\n'+selected.join('\n'))) return;
  
  document.getElementById('loaderBulkSAPExec').classList.remove('hidden');
  document.getElementById('resultBulkSAP').classList.remove('show');
  document.getElementById('bulkSapResultCard').style.display = 'none';
  
  google.script.run.withSuccessHandler(function(r){
    document.getElementById('loaderBulkSAPExec').classList.add('hidden');
    if (!r.ok && r.succeeded === 0) {
      showResult('resultBulkSAP','<div class="al al-er"><i class="bi bi-x-circle"></i> '+(r.error||'All periods failed')+'</div>');
      return;
    }
    
    // Summary KPIs
    var summaryHtml = '<div class="kpi-grid" style="margin-bottom:10px">' +
      '<div class="kpi gn"><div class="kv">'+r.succeeded+' / '+r.perPeriod.length+'</div><div class="kl">สำเร็จ / ทั้งหมด</div></div>' +
      '<div class="kpi'+(r.failed>0?' rd':'')+'"><div class="kv">'+r.failed+'</div><div class="kl">ล้มเหลว</div></div>' +
      '<div class="kpi"><div class="kv">'+r.totalDocs+'</div><div class="kl">Total Documents</div></div>' +
      '<div class="kpi bl"><div class="kv">'+r.totalLines.toLocaleString()+'</div><div class="kl">Total Lines</div></div>' +
      '<div class="kpi gn"><div class="kv">฿'+fmt(r.totalDebit)+'</div><div class="kl">Dr = Cr</div></div>' +
      '</div>' +
      '<div class="al '+(r.failed>0?'al-er':'al-ok')+'"><i class="bi '+(r.failed>0?'bi-exclamation-triangle':'bi-check-circle')+'"></i> '+r.message+'</div>';
    document.getElementById('bulkSapSummary').innerHTML = summaryHtml;
    
    // Per-period results table
    var tb = document.getElementById('bulkSapResultsBody');
    tb.innerHTML = r.perPeriod.map(function(res){
      var statusIcon = res.ok ? '✅' : '❌';
      var statusText = res.ok ? 'สำเร็จ' : 'ล้มเหลว';
      var linksHtml = '';
      if (res.ok && res.sheetUrl) {
        linksHtml = '<div style="display:flex;gap:4px;flex-wrap:wrap">' +
          '<a href="'+res.sheetUrl+'" target="_blank" class="btn btn-ghost btn-sm" style="font-size:9px;padding:2px 6px"><i class="bi bi-file-spreadsheet"></i> Sheet</a>' +
          (res.xlsxUrl ? '<a href="'+res.xlsxUrl+'" target="_blank" class="btn btn-ghost btn-sm" style="font-size:9px;padding:2px 6px"><i class="bi bi-download"></i> .xlsx</a>' : '') +
          '</div>';
      }
      return '<tr>' +
        '<td style="font-family:JetBrains Mono,mono">'+esc(res.period)+'</td>' +
        '<td>'+statusIcon+' '+statusText+'</td>' +
        '<td class="num">'+res.docs+'</td>' +
        '<td class="num">'+res.lines.toLocaleString()+'</td>' +
        '<td class="num">฿'+fmt(res.debit)+'</td>' +
        '<td>'+(linksHtml || (res.error ? esc(res.error).substring(0,40) : '—'))+'</td>' +
        '</tr>';
    }).join('');
    document.getElementById('bulkSapResultCard').style.display = 'block';
    showResult('resultBulkSAP','<div class="al '+(r.failed>0?'al-er':'al-ok')+'"><i class="bi '+(r.failed>0?'bi-exclamation-triangle':'bi-check-circle')+'"></i> Bulk Export: '+r.succeeded+' สำเร็จ, '+r.failed+' ล้มเหลว</div>');
    toast('✅ Bulk Export: '+r.succeeded+' สำเร็จ'+(r.failed>0?', '+r.failed+' ล้มเหลว':''), r.failed>0?'er':'ok');
  }).withFailureHandler(function(e){
    document.getElementById('loaderBulkSAPExec').classList.add('hidden');
    showResult('resultBulkSAP','<div class="al al-er"><i class="bi bi-x-circle"></i> '+e.message+'</div>');
    toast('❌ '+e.message,'er');
  }).bulkExportSAPJE(selected);
}

function loadWidePreview(){
  var period=document.getElementById('schedPeriod').value.trim();
  if(period&&!/^\d{4}-\d{2}$/.test(period)){toast('รูปแบบ YYYY-MM หรือว่าง','er');return}
  document.getElementById('loaderWide').classList.remove('hidden');
  document.getElementById('resultWide').classList.remove('show');
  google.script.run.withSuccessHandler(function(r){
    document.getElementById('loaderWide').classList.add('hidden');
    if(!r.ok){showResult('resultWide','<div class="al al-er">'+r.error+'</div>');return}
    var thead=document.getElementById('wideHead');
    var tbody=document.getElementById('wideBody');
    var headHtml='<tr>';
    for(var i=0;i<r.headers.length;i++){
      var isMonth=i>=r.baseCount;
      headHtml+='<th style="'+(isMonth?'background:#cfe2f3;color:#1a5276':'')+'">'+esc(r.headers[i])+'</th>';
    }
    headHtml+='</tr>';
    thead.innerHTML=headHtml;
    if(!r.rows||r.rows.length===0){
      tbody.innerHTML='<tr><td colspan="'+r.headers.length+'" style="text-align:center;color:var(--mt)">No data</td></tr>';
      return;
    }
    tbody.innerHTML=r.rows.map(function(row){
      return '<tr>'+row.map(function(cell,ci){
        var cls=ci>=r.baseCount?'num':'';
        var style=ci>=r.baseCount?'color:#1a5276;font-weight:500':'';
        return '<td class="'+cls+'" style="'+style+'">'+(typeof cell==='number'?fmt(cell):esc(String(cell)))+'</td>';
      }).join('')+'</tr>';
    }).join('');
    showResult('resultWide','<div class="al al-ok"><i class="bi bi-check-circle"></i> แสดง '+r.totalRows+' รายการ ('+r.totalMonths+' เดือน)</div>');
  }).withFailureHandler(function(e){
    document.getElementById('loaderWide').classList.add('hidden');
    showResult('resultWide','<div class="al al-er">'+e.message+'</div>');
  }).getWidePreview(period||null);
}

// ========== PRE-UPLOAD CHECKER ==========
function runChecker(){
  document.getElementById('loaderChecker').classList.remove('hidden');
  document.getElementById('checkerResult').style.display='none';
  google.script.run.withSuccessHandler(function(r){
    document.getElementById('loaderChecker').classList.add('hidden');
    if(!r.ok){toast('❌ '+r.error,'er');return}
    document.getElementById('checkerResult').style.display='block';
    document.getElementById('cTotalItems').textContent=r.totalItems.toLocaleString();
    document.getElementById('cPassed').textContent=(r.totalItems - r.errorCount).toLocaleString();
    document.getElementById('cErrors').textContent=r.errorCount.toLocaleString();
    document.getElementById('cWarnings').textContent=r.warningCount.toLocaleString();
    var badge='';
    if(r.status==='PASS')badge='<span class="al al-ok"><i class="bi bi-check-circle"></i> ✅ PASS — ข้อมูลพร้อม Export</span>';
    else if(r.status==='WARN')badge='<span class="al" style="background:rgba(201,169,110,.07);border-color:rgba(201,169,110,.18);color:var(--gold)"><i class="bi bi-exclamation-triangle"></i> ⚠️ PASS WITH WARNINGS — ควรตรวจสอบก่อน Export</span>';
    else badge='<span class="al al-er"><i class="bi bi-x-circle"></i> ❌ FAIL — แก้ไข Errors ก่อน Export</span>';
    document.getElementById('cStatusBadge').innerHTML=badge;
    if(r.errors&&r.errors.length>0){
      document.getElementById('checkerErrorCard').style.display='block';
      document.getElementById('cErrorBody').innerHTML=r.errors.map(function(e){
        return '<tr><td style="font-family:JetBrains Mono,mono">'+e.row+'</td><td>'+esc(e.field||'')+'</td><td style="max-width:400px;overflow:hidden;text-overflow:ellipsis">'+esc(e.message||'')+'</td></tr>';
      }).join('');
    } else {
      document.getElementById('checkerErrorCard').style.display='none';
    }
    if(r.warnings&&r.warnings.length>0){
      document.getElementById('checkerWarnCard').style.display='block';
      document.getElementById('cWarnBody').innerHTML=r.warnings.map(function(w){
        return '<tr><td style="font-family:JetBrains Mono,mono">'+w.row+'</td><td>'+esc(w.field||'')+'</td><td style="max-width:400px;overflow:hidden;text-overflow:ellipsis">'+esc(w.message||'')+'</td></tr>';
      }).join('');
    } else {
      document.getElementById('checkerWarnCard').style.display='none';
    }
    var ac=r.amortCheck||{};

function calculateNewSchedule() {
  var docNo = document.getElementById('modifyDocNo').value;
  if(!docNo){toast('กรุณาเลือกเอกสาร','er');return}
  var updates = {
    startDate: document.getElementById('modStartDate').value,
    endDate: document.getElementById('modEndDate').value,
    amount: parseFloat(document.getElementById('modAmount').value) || 0
  };
  if(!updates.startDate||!updates.endDate){toast('กรุณากรอกวันที่เริ่มต้นและสิ้นสุด','er');return}
  if(updates.amount<=0){toast('จำนวนเงินต้องมากกว่า 0','er');return}
  if(updates.startDate>updates.endDate){toast('วันที่เริ่มต้นต้อง ≤ วันที่สิ้นสุด','er');return}
  document.getElementById('loaderModifyCalc').classList.remove('hidden');
  document.getElementById('modifyComparison').style.display = 'none';
  document.getElementById('modifyCompareResult').classList.remove('show');
  google.script.run.withSuccessHandler(function(r){
    document.getElementById('loaderModifyCalc').classList.add('hidden');
    if(!r.ok){toast('❌ '+r.error,'er');return}
    window._modifyComparison = r;
    renderModifyComparison(r.old, r.modified);
    document.getElementById('modifyComparison').style.display = 'block';
    toast('✅ คำนวณตารางใหม่เสร็จสิ้น — ตรวจสอบแล้วกด Save','ok');
  }).getModifyPreview(docNo, updates);
}

function renderModifyComparison(oldData, newData) {
  // Summary KPIs
  document.getElementById('modCompareOldAmount').textContent = fmt(oldData.amount);
  document.getElementById('modCompareNewAmount').textContent = fmt(newData.amount);
  document.getElementById('modCompareOldStart').textContent = oldData.startDate;
  document.getElementById('modCompareNewStart').textContent = newData.startDate;
  document.getElementById('modCompareOldEnd').textContent = oldData.endDate;
  document.getElementById('modCompareNewEnd').textContent = newData.endDate;
  document.getElementById('modCompareOldRows').textContent = oldData.scheduleRows;
  document.getElementById('modCompareNewRows').textContent = newData.scheduleRows;
  document.getElementById('modCompareOldRemaining').textContent = fmt(oldData.lastRemaining);
  document.getElementById('modCompareNewRemaining').textContent = fmt(newData.lastRemaining);
  // Old schedule table
  var oldBody = document.getElementById('modOldScheduleBody');
  if(oldData.schedule&&oldData.schedule.length>0){
    oldBody.innerHTML = oldData.schedule.map(function(s){
      return '<tr><td>'+esc(s.period)+'</td><td class="num">'+s.daysInMonth+'</td><td class="num">฿'+fmt(s.amortAmount)+'</td><td class="num">฿'+fmt(s.accumulated)+'</td><td class="num">฿'+fmt(s.remaining)+'</td></tr>';
    }).join('');
  } else {
    oldBody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--mt)">No schedule data</td></tr>';
  }
  // New schedule table
  var newBody = document.getElementById('modNewScheduleBody');
  if(newData.schedule&&newData.schedule.length>0){
    newBody.innerHTML = newData.schedule.map(function(s){
      return '<tr><td>'+esc(s.period)+'</td><td class="num">'+s.daysInMonth+'</td><td class="num">฿'+fmt(s.amortAmount)+'</td><td class="num">฿'+fmt(s.accumulated)+'</td><td class="num">฿'+fmt(s.remaining)+'</td></tr>';
    }).join('');
  } else {
    newBody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--mt)">No schedule data</td></tr>';
  }
  document.getElementById('modifyCompareResult').classList.add('show');
}

function renderImportPreview(data, csvText) {
  var html = '';
  
  // Summary
  html += '<div class="kpi-grid" style="margin-bottom:12px;grid-template-columns:repeat(auto-fit,minmax(120px,1fr))">';
  html += '<div class="kpi gn"><div class="kv" style="font-size:14px">' + data.totalRows + '</div><div class="kl">Total Rows</div></div>';
  html += '<div class="kpi"><div class="kv" style="font-size:14px">' + data.headers.length + '</div><div class="kl">Columns</div></div>';
  html += '<div class="kpi bl"><div class="kv" style="font-size:12px">' + (data.delimiter || ',') + '</div><div class="kl">Delimiter</div></div>';
  html += '</div>';
  
  // Warnings
  if (data.warnings && data.warnings.length > 0) {
    html += '<div class="al al-er" style="margin-bottom:10px">';
    html += '<i class="bi bi-exclamation-triangle"></i><div>';
    for (var w = 0; w < data.warnings.length; w++) {
      html += '<div>' + esc(data.warnings[w]) + '</div>';
    }
    html += '</div></div>';
  }
  
  // Column Mapping
  html += '<h3 style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.10em;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:8px">';
  html += '<i class="bi bi-diagram-3"></i> Column Mapping';
  html += '</h3>';
  
  html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px;font-size:11px">';
  html += '<div style="color:var(--mt);font-weight:500">CSV Header</div>';
  html += '<div style="color:var(--mt);font-weight:500">→ System Field</div>';
  html += '<div style="color:var(--mt);font-weight:500">Actions</div>';
  
  // Build map of system fields to columns for dropdown
  var mappedFieldIds = {};
  for (var f in data.mappedColumns) {
    mappedFieldIds[f] = true;
  }
  
  var systemFields = data.systemFields || [];
  
  for (var i = 0; i < data.headers.length; i++) {
    var hdr = data.headers[i];
    var fieldId = null;
    for (var f2 in data.mappedColumns) {
      if (data.mappedColumns[f2].col === i) {
        fieldId = f2;
        break;
      }
    }
    
    html += '<div style="font-family:JetBrains Mono,mono;color:var(--tx)">' + esc(hdr) + '</div>';
    
    // Dropdown for field selection
    html += '<div><select class="sel" id="mapCol_' + i + '" style="width:100%;font-size:10px;padding:4px 6px" onchange="onMappingChange()">';
    html += '<option value="">— skip —</option>';
    for (var s = 0; s < systemFields.length; s++) {
      var sf = systemFields[s];
      var selected = (fieldId === sf) ? ' selected' : '';
      html += '<option value="' + sf + '"' + selected + '>' + sf + '</option>';
    }
    html += '</select></div>';
    
    // Field indicator
    html += '<div style="font-size:10px;color:' + (fieldId ? 'var(--gn)' : 'var(--mt)') + '">';
    html += fieldId ? '✅ ' + fieldId : '—';
    html += '</div>';
  }
  html += '</div>';
  
  // Preview Table
  html += '<h3 style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.10em;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:8px">';
  html += '<i class="bi bi-table"></i> Preview (first ' + data.previewRows.length + ' of ' + data.totalRows + ' rows)';
  html += '</h3>';
  
  html += '<div class="tw" style="max-height:300px;overflow:auto;margin-bottom:12px">';
  html += '<table class="tb" style="font-size:10px">';
  html += '<thead><tr>';
  for (var h = 0; h < data.headers.length; h++) {
    html += '<th>' + esc(data.headers[h]) + '</th>';
  }
  html += '</tr></thead><tbody>';
  
  // We need to re-fetch the raw CSV rows... but we only have previewRows (mapped)
  // Let's use the CSV text directly for preview
  var csvLines = csvText.split(/\r?\n/).filter(function(l) { return l.trim() !== ''; });
  var maxPreview = Math.min(csvLines.length - 1, 10);
  for (var pr = 1; pr <= maxPreview; pr++) {
    // Just show raw line truncated
    var rawLine = csvLines[pr] || '';
    // Truncate long lines
    if (rawLine.length > 200) rawLine = rawLine.substring(0, 200) + '...';
    html += '<tr><td colspan="' + data.headers.length + '" style="font-family:JetBrains Mono,mono;font-size:9px;color:var(--mt);max-width:600px;overflow:hidden;text-overflow:ellipsis">';
    html += esc(rawLine);
    html += '</td></tr>';
  }
  html += '</tbody></table>';
  html += '</div>';
  
  // Import button
  html += '<div class="btn-row">';
  html += '<button class="btn btn-gn" id="importConfirmBtn" onclick="confirmImport()"><i class="bi bi-upload"></i> Import ' + data.totalRows + ' Rows</button>';
  html += '<span style="font-size:11px;color:var(--mt)">Review mapping above before importing</span>';
  html += '</div>';
  
  // Store csvText for later use
  _importCsvText = csvText;
  _importHeaders = data.headers.slice();
  
  var el = document.getElementById('importPreviewContent');
  el.innerHTML = html;
  document.getElementById('importPreviewResult').classList.add('show');
}

  // This is called when the user changes a mapping dropdown
  // We just update the visual, no server call needed
}

var _importCsvText = null;
var _importHeaders = null;

function confirmImport() {
  if (!_importCsvText) { toast('❌ No CSV data to import', 'er'); return; }
  
  // Build column mapping from dropdowns: {fieldId: "Header Name"}
  var columnMapping = {};
  var selects = document.querySelectorAll('#importPreviewContent select[id^="mapCol_"]');
  for (var s = 0; s < selects.length; s++) {
    var sel = selects[s];
    var fieldId = sel.value;
    if (fieldId) {
      // Get the header from the label text before the select
      var colIndex = parseInt(sel.id.replace('mapCol_', ''), 10);
      if (_importHeaders && _importHeaders[colIndex] !== undefined) {
        columnMapping[fieldId] = _importHeaders[colIndex];
      }
    }
  }
  
  document.getElementById('loaderImport').classList.remove('hidden');
  
  google.script.run.withSuccessHandler(function(r) {
    document.getElementById('loaderImport').classList.add('hidden');
    _importCsvText = null;
    
    if (!r.ok) {
      toast('❌ Import failed: ' + (r.error || ''), 'er');
      return;
    }
    
    // Show success result
    var resultHtml = '<div class="al al-ok" style="margin-bottom:10px"><i class="bi bi-check-circle"></i> ';
    resultHtml += '<div><strong>' + r.imported + ' records imported</strong>';
    if (r.skipped > 0) resultHtml += ' — ' + r.skipped + ' skipped';
    resultHtml += '</div></div>';
    
    if (r.errors && r.errors.length > 0) {
      resultHtml += '<div class="tw" style="max-height:200px;overflow:auto"><table class="tb"><thead><tr><th>Row</th><th>Reason</th></tr></thead><tbody>';
      for (var e = 0; e < r.errors.length; e++) {
        resultHtml += '<tr><td style="font-family:JetBrains Mono,mono">' + r.errors[e].row + '</td><td>' + esc(r.errors[e].reason) + '</td></tr>';
      }
      resultHtml += '</tbody></table></div>';
    }
    
    resultHtml += '<div class="btn-row" style="margin-top:8px">';
    resultHtml += '<button class="btn btn-pri btn-sm" onclick="location.reload()"><i class="bi bi-arrow-repeat"></i> Refresh Page</button>';
    resultHtml += '</div>';
    
    document.getElementById('importPreviewContent').innerHTML = resultHtml;
    
    toast('✅ Imported ' + r.imported + ' records' + (r.skipped > 0 ? ', ' + r.skipped + ' skipped' : ''), 'ok');
    
    // Refresh sync data counts if on sync tab
    loadSyncData();
    
  }).withFailureHandler(function(e) {
    document.getElementById('loaderImport').classList.add('hidden');
    toast('❌ ' + e.message, 'er');
  }).confirmImport(_importCsvText, columnMapping);
}

var _adminCache = null;
function loadAdminConsole(){
  // Try cache first
  if (_adminCache) {
    _renderAdminConsole(_adminCache);
    return;
  }
  // Use batchCall to fetch all admin data in one round-trip
  batchCall(
    ['getSystemInfo', 'getTriggerStatus', 'getEmailConfig'],
    function(results, errors) {
      _adminCache = results;
      _renderAdminConsole(results);
      // Auto-refresh every 60s
      if (window._adminRefreshTimer) clearTimeout(window._adminRefreshTimer);
      window._adminRefreshTimer = setTimeout(function(){ _adminCache = null; }, 60000);
    },
    function(error) {
      document.getElementById('adminVersion').textContent = 'Error';
    }
  );
}

      if (results.getSystemInfo && results.getSystemInfo.ok) {

          nextEl.textContent = '—';

      }
    }

function addFilterIconsA3(){
  document.querySelectorAll('.tb thead tr').forEach(function(tr){
    Array.from(tr.children).forEach(function(th,idx){
      if(th.querySelector('.col-filter-icon'))return;
      if(getComputedStyle(th).position==='static')th.style.position='relative';
      var ic=document.createElement('span');
      ic.className='col-filter-icon';
      ic.textContent='▾';
      ic.addEventListener('click',function(e){
        e.stopPropagation();e.preventDefault();toggleColFilterA3(th,idx);
      });
      th.appendChild(ic);
    });
  });
}

function toggleColFilterA3(th,idx){
  // Close sibling dropdowns
  document.querySelectorAll('.col-filter-dropdown.show').forEach(function(d){
    if(d.closest('th')!==th)d.classList.remove('show');
  });
  var dd=th.querySelector('.col-filter-dropdown');
  if(dd){dd.classList.toggle('show');return;}
  var table=th.closest('.tb');
  if(!table)return;
  var tbody=table.querySelector('tbody');
  if(!tbody)return;
  // Gather unique values
  var vals=new Set();
  tbody.querySelectorAll('tr').forEach(function(tr){
    var tds=tr.querySelectorAll('td');
    if(tds.length<=idx||tr.querySelector('td[colspan]'))return;
    vals.add(tds[idx].textContent.trim()||'(empty)');
  });
  var sorted=Array.from(vals).sort();
  dd=document.createElement('div');
  dd.className='col-filter-dropdown';
  // All option
  var allOpt=document.createElement('div');
  allOpt.className='fopt fopt-all';
  allOpt.textContent='— All —';
  allOpt.addEventListener('click',function(){clearColFilterA3(th,idx);dd.classList.remove('show');});
  dd.appendChild(allOpt);
  // Value options
  sorted.forEach(function(v){
    var opt=document.createElement('div');
    opt.className='fopt';
    opt.textContent=v;
    opt.addEventListener('click',function(){setColFilterA3(th,idx,v);dd.classList.remove('show');});
    dd.appendChild(opt);
  });
  th.appendChild(dd);
  dd.classList.add('show');
}

function setColFilterA3(th,idx,val){
  var table=th.closest('.tb');
  if(!table)return;
  var tid=table.id||(table.id='tb_'+(+new Date()).toString(36));
  if(!_colF[tid])_colF[tid]={};
  _colF[tid][idx]=val;
  var ic=th.querySelector('.col-filter-icon');
  if(ic)ic.classList.add('active');
  var dd=th.querySelector('.col-filter-dropdown');
  if(dd)dd.classList.remove('show');
  applyA3Filters();
}

function clearColFilterA3(th,idx){
  var table=th.closest('.tb');
  if(!table)return;
  var tid=table.id||'';
  if(_colF[tid]){delete _colF[tid][idx];if(Object.keys(_colF[tid]).length===0)delete _colF[tid];}
  var ic=th.querySelector('.col-filter-icon');
  if(ic)ic.classList.remove('active');
  applyA3Filters();
}

function clearAllFiltersA3(){
  _searchQ='';_colF={};
  var inp=document.getElementById('globalSearchInput');
  if(inp)inp.value='';
  document.querySelectorAll('.col-filter-icon.active').forEach(function(ic){ic.classList.remove('active');});
  document.querySelectorAll('.col-filter-dropdown').forEach(function(d){d.remove();});
  applyA3Filters();
}

function applyA3Filters(){
  var hasF=_searchQ||Object.keys(_colF).length>0;
  var total=0,vis=0;
  // Remove all existing highlights first
  document.querySelectorAll('.cf-highlight').forEach(function(m){
    var p=m.parentNode;var tn=document.createTextNode(m.textContent);
    p.replaceChild(tn,m);p.normalize();
  });
  // Process each .tb table
  document.querySelectorAll('.tb').forEach(function(table){
    var tbody=table.querySelector('tbody');
    if(!tbody)return;
    var tid=table.id||'';
    var filters=_colF[tid]||{};
    var rows=tbody.querySelectorAll('tr');
    var hasVisibleData=false;
    rows.forEach(function(row){
      var cc=row.querySelector('td[colspan]');
      if(cc){row.style.display='none';return;}
      total++;
      var match=true;
      // Text search across the whole row
      if(_searchQ){
        if(row.textContent.toLowerCase().indexOf(_searchQ.toLowerCase())===-1)match=false;
      }
      // Column-level filters
      if(match&&Object.keys(filters).length>0){
        var cells=row.querySelectorAll('td');
        for(var ci in filters){
          var cell=cells[parseInt(ci)];
          if(!cell||cell.textContent.trim()!==filters[ci]){match=false;break;}
        }
      }
      if(match){
        row.style.display='';
        vis++;hasVisibleData=true;
        // Highlight matching text in visible row cells
        if(_searchQ)highlightRowA3(row,_searchQ);
      }else{
        row.style.display='none';
      }
    });
    // Show "no data" row only when filtering hides everything
    rows.forEach(function(row){
      var cc=row.querySelector('td[colspan]');
      if(cc)row.style.display=hasVisibleData||!hasF?'none':'';
    });
  });
  // Badge
  var badge=document.getElementById('filterCountBadge');
  if(badge){
    if(hasF&&total>0){
      badge.textContent=vis.toLocaleString()+' of '+total.toLocaleString()+' items';
      badge.className='filter-count-badge show';
    }else{
      badge.textContent='';badge.className='filter-count-badge';
    }
  }
  // Clear button
  var clr=document.getElementById('clearFiltersBtn');
  if(clr)clr.className='clear-filters-btn'+(hasF?' show':'');
}

function highlightRowA3(row,query){
  if(!query)return;
  var lq=query.toLowerCase();
  var cells=row.querySelectorAll('td');
  cells.forEach(function(cell){
    if(cell.textContent.toLowerCase().indexOf(lq)===-1)return;
    // Walk text nodes
    var tw=document.createTreeWalker(cell,NodeFilter.SHOW_TEXT,null,false);
    var nodes=[];
    while(tw.nextNode())nodes.push(tw.currentNode);
    nodes.forEach(function(tn){
      var txt=tn.textContent;
      var ltxt=txt.toLowerCase();
      var idx=ltxt.indexOf(lq);
      if(idx===-1)return;
      var parts=[];
      var last=0;
      while(idx!==-1){
        if(idx>last)parts.push(document.createTextNode(txt.slice(last,idx)));
        var m=document.createElement('span');m.className='cf-highlight';m.textContent=txt.slice(idx,idx+query.length);
        parts.push(m);
        last=idx+query.length;
        idx=ltxt.indexOf(lq,last);
      }
      if(last<txt.length)parts.push(document.createTextNode(txt.slice(last)));
      var frag=document.createDocumentFragment();
      parts.forEach(function(p){frag.appendChild(p);});
      tn.parentNode.replaceChild(frag,tn);
    });
  });
}

var _sortState = {};
document.getElementById('ct').addEventListener('click', function(e) {
  var th = e.target.closest('.tb th');
  if (!th) return;
  var table = th.closest('.tb');
  if (!table) return;
  var ths = table.querySelectorAll('thead th');
  var idx = Array.prototype.indexOf.call(ths, th);
  if (idx < 0) return;

  var tid = table.id || (table.id = 'tb_' + Math.random().toString(36).substr(2,5));
  var dir = 'asc';
  if (_sortState[tid] && _sortState[tid].col === idx) dir = _sortState[tid].dir === 'asc' ? 'desc' : 'asc';
  _sortState[tid] = {col: idx, dir: dir};

  ths.forEach(function(h, i) {
    var txt = h.textContent.replace(/[↑↓]/g, '').trim();
    h.innerHTML = txt + (i === idx ? (dir === 'asc' ? ' ↑' : ' ↓') : '');
  });

  var tbody = table.querySelector('tbody');
  if (!tbody) return;
  var rows = Array.from(tbody.querySelectorAll('tr'));
  var dataRows = rows.filter(function(r) { return !r.querySelector('td[colspan]'); });
  var others = rows.filter(function(r) { return r.querySelector('td[colspan]'); });
  if (dataRows.length < 2) return;

  var sample = (dataRows[0].querySelectorAll('td')[idx] || {}).textContent || '';
  var isNum = sample.replace(/[฿,$,\s]/g, '').length > 0 && !isNaN(parseFloat(sample.replace(/[฿,$,\s]/g, '')));

  dataRows.sort(function(a, b) {
    var av = (a.querySelectorAll('td')[idx] || {}).textContent || '';
    var bv = (b.querySelectorAll('td')[idx] || {}).textContent || '';
    if (isNum) {
      av = parseFloat(av.replace(/[฿,$,\s]/g, '')) || 0;
      bv = parseFloat(bv.replace(/[฿,$,\s]/g, '')) || 0;
    } else {
      av = av.toLowerCase(); bv = bv.toLowerCase();
    }
    return av < bv ? (dir === 'asc' ? -1 : 1) : av > bv ? (dir === 'asc' ? 1 : -1) : 0;
  });

  dataRows.forEach(function(r) { tbody.appendChild(r); });
  others.forEach(function(r) { tbody.appendChild(r); });
});

function exportTableCSV(tableId, filename) {
  var table = document.getElementById(tableId);
  if (!table) { toast('Table not found', 'er'); return; }
  var rows = [];
  var hRow = table.querySelector('thead tr');
  if (hRow) {
    rows.push(Array.from(hRow.querySelectorAll('th')).map(function(th) {
      return '"' + th.textContent.trim().replace(/[↑↓]/g, '').replace(/"/g, '""') + '"';
    }).join(','));
  }
  var hasData = false;
  Array.from(table.querySelectorAll('tbody tr')).forEach(function(tr) {
    var cells = tr.querySelectorAll('td');
    if (!cells.length || (cells.length === 1 && cells[0].colSpan > 1)) return;
    hasData = true;
    rows.push(Array.from(cells).map(function(td) {
      return '"' + td.textContent.trim().replace(/"/g, '""') + '"';
    }).join(','));
  });
  if (!hasData) { toast('No data to export', 'er'); return; }
  var csv = '\ufeff' + rows.join('\n');
  var blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('✅ Downloaded ' + filename + '.csv', 'ok');
}

        return;

      var html = '<div style="margin-bottom:8px;font-size:11px;color:var(--mt)">Showing ' + items.length + ' items</div>';
      html += '<table class="tb" style="font-size:11px"><thead><tr><th>Doc No</th><th>Doc No 2</th><th>Description</th><th>End Date</th><th class="num">Amount</th><th class="num">Remaining</th></tr></thead><tbody>';
      html += items.slice(0, 50).map(function(e) {
        return '<tr><td style="font-family:JetBrains Mono,mono">' + esc(e.docNo) + '</td><td style="font-family:JetBrains Mono,mono">' + esc(e.docNo2||'') + '</td><td>' + esc((e.description||'').substring(0,40)) + '</td><td>' + esc(e.endDate) + '</td><td class="num">฿' + fmt(e.amount) + '</td><td class="num">฿' + fmt(e.remaining) + '</td></tr>';
      }).join('');
      html += '</tbody></table>';
      showDrillPanel(kl, html);
    };
    kpi.addEventListener('click', kpi._drillClick);
  });

  // Chart segment click handlers
  Object.keys(chartInstances).forEach(function(key) {
    var chart = chartInstances[key];
    if (!chart) return;
    chart.options.onClick = function(ev, elements) {
      if (!elements || !elements.length) return;
      var idx = elements[0].index;
      var dsIdx = elements[0].datasetIndex || 0;
      var label = chart.data.labels ? chart.data.labels[idx] : '';
      var ds = chart.data.datasets[dsIdx];
      var value = ds ? ds.data[idx] : '';
      var datasetLabel = ds ? ds.label || '' : '';

      var title = (chart.canvas || {}).id || key;
      title = title.replace(/([A-Z])/g, ' $1').replace(/^./, function(s) { return s.toUpperCase(); });

      var drillHtml = '<div class="kpi-grid" style="margin-bottom:10px">';
      drillHtml += '<div class="kpi"><div class="kv" style="font-size:16px">' + esc(String(label)) + '</div><div class="kl">' + esc(datasetLabel || 'Category') + '</div></div>';
      drillHtml += '<div class="kpi gn"><div class="kv" style="font-size:16px">' + (typeof value === 'number' ? '฿' + fmt(value) : esc(String(value))) + '</div><div class="kl">Value</div></div>';
      if (r.totalItems !== undefined) drillHtml += '<div class="kpi bl"><div class="kv" style="font-size:16px">' + r.totalItems.toLocaleString() + '</div><div class="kl">Total Items</div></div>';
      drillHtml += '</div>';

      var items = r.expiringSoon || [];
      if (items.length) {
        drillHtml += '<div style="font-size:11px;color:var(--mt);margin-bottom:4px">Related — Expiring Soon (' + items.length + '):</div>';
        drillHtml += '<table class="tb"><thead><tr><th>Doc</th><th>Doc No 2</th><th>End Date</th><th class="num">Amount</th></tr></thead><tbody>';
        drillHtml += items.slice(0, 10).map(function(e) {
          return '<tr><td style="font-family:JetBrains Mono,mono">' + esc(e.docNo) + '</td><td style="font-family:JetBrains Mono,mono">' + esc(e.docNo2||'') + '</td><td>' + esc(e.endDate) + '</td><td class="num">฿' + fmt(e.amount) + '</td></tr>';
        }).join('');
        drillHtml += '</tbody></table>';
      } else {
        drillHtml += '<div style="text-align:center;color:var(--mt);padding:20px;font-size:11px">📊 Click a chart segment to see related items</div>';
      }
      showDrillPanel(title + ': ' + label, drillHtml);
    };
  });
}

// ========== B5: RUNNING BALANCE VIEW ==========
var _rbDocs = [];          // Full doc list from getDocList()
var _rbData = {};          // {docNo: detail} accumulator
var _rbRunning = false;

function toggleRunningBalance() {
  var body = document.getElementById('runningBalanceBody');
  var toggle = document.getElementById('rbToggle');
  if (!body) return;
  var isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  if (toggle) toggle.textContent = isOpen ? '▶' : '▼';
  // If opening and table is empty, trigger load
  if (!isOpen && !_rbRunning && _rbDocs.length === 0) {
    loadRunningBalance(null);
  }
}

function loadRunningBalance(dashData) {
  _rbRunning = true;
  document.getElementById('rbProgress').textContent = '⏳ Loading document list...';
  google.script.run.withSuccessHandler(function(r) {
    if (!r.ok || !r.list || r.list.length === 0) {
      document.getElementById('rbProgress').textContent = 'No documents found.';
      _rbRunning = false;
      return;
    }
    _rbDocs = r.list;
    document.getElementById('rbProgress').textContent =
      'Loaded ' + r.list.length + ' docs. Fetching details...';
    document.getElementById('rbDocCount').textContent =
      r.list.length + ' documents';
    document.getElementById('rbDocCount').style.display = 'inline';
    // Start processing items sequentially
    _rbData = {};
    processRbItem(0);
  }).withFailureHandler(function(e) {
    document.getElementById('rbProgress').textContent = 'Error: ' + e.message;
    _rbRunning = false;
  }).getDocList();
}

function processRbItem(idx) {
  if (idx >= _rbDocs.length) {
    // Done
    document.getElementById('rbProgress').textContent =
      '✅ Loaded ' + _rbDocs.length + ' documents';
    _rbRunning = false;
    updateRbAvgConsumed();
    return;
  }
  var doc = _rbDocs[idx];
  document.getElementById('rbLoaderText').textContent =
    '⏳ Loading ' + (idx + 1) + ' of ' + _rbDocs.length + ': ' + doc.docNo + '...';
  google.script.run.withSuccessHandler(function(detail) {
    if (detail && detail.ok) {
      _rbData[detail.docNo] = detail;
      renderRbRow(detail);
    }
    // Progress indicator
    var pct = Math.round((idx + 1) / _rbDocs.length * 100);
    document.getElementById('rbProgress').textContent =
      'Loaded ' + (idx + 1) + ' of ' + _rbDocs.length + ' (' + pct + '%)';
    // Next item
    setTimeout(function() { processRbItem(idx + 1); }, 10);
  }).withFailureHandler(function(e) {
    // Skip failed item, continue
    console.warn('Failed to load', doc.docNo, e);
    setTimeout(function() { processRbItem(idx + 1); }, 10);
  }).getDocDetail(doc.docNo);
}

function renderRbRow(detail) {
  var tbody = document.getElementById('runningBalanceTbody');
  if (!tbody) return;
  // Remove loading row if present
  var lr = document.getElementById('rbLoadingRow');
  if (lr) lr.remove();

  var amount = detail.amount || 0;
  var amortized = detail.amortized || 0;
  var remaining = detail.remaining || 0;
  var pctConsumed = amount > 0 ? (amortized / amount * 100) : 0;

  var tr = document.createElement('tr');
  tr.style.cursor = 'pointer';
  tr.setAttribute('data-docno', detail.docNo);
  tr.addEventListener('click', function() {
    showRbDocDetail(detail.docNo);
  });

  var startEnd = detail.startDate + ' – ' + detail.endDate;
  // Shorten dates to show month/year
  if (startEnd.length > 30) {
    var s = (detail.startDate || '').substring(0, 7);
    var e = (detail.endDate || '').substring(0, 7);
    startEnd = s + ' – ' + e;
  }

  tr.innerHTML =
    '<td style="font-family:JetBrains Mono,mono;font-size:11px">' + esc(detail.docNo) + '</td>' +
    '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis">' + esc((detail.description || '').substring(0, 40)) + '</td>' +
    '<td style="font-size:10px;white-space:nowrap">' + esc(startEnd) + '</td>' +
    '<td class="num">฿' + fmt(amount) + '</td>' +
    '<td class="num">฿' + fmt(amortized) + '</td>' +
    '<td class="num">฿' + fmt(remaining) + '</td>' +
    '<td class="num">' + pctConsumed.toFixed(1) + '%</td>';

  tbody.appendChild(tr);
}

function updateRbAvgConsumed() {
  var el = document.getElementById('dAvgConsumed');
  if (!el) return;
  var keys = Object.keys(_rbData);
  if (keys.length === 0) { el.textContent = '—'; return; }
  var totalPct = 0, count = 0;
  keys.forEach(function(k) {
    var d = _rbData[k];
    if (d && d.amount > 0) {
      totalPct += (d.amortized / d.amount * 100);
      count++;
    }
  });
  el.textContent = count > 0 ? totalPct.toFixed(1) + '%' : '—';
}

function showRbDocDetail(docNo) {
  if (!docNo) return;
  // If we already have the detail in _rbData, use it; otherwise fetch
  var detail = _rbData[docNo];
  if (detail) {
    showRbDetailPanel(detail);
  } else {
    document.getElementById('rbProgress').textContent =
      '⏳ Fetching ' + docNo + '...';
    google.script.run.withSuccessHandler(function(r) {
      if (r && r.ok) {
        _rbData[r.docNo] = r;
        showRbDetailPanel(r);
      } else {
        toast('❌ ' + (r ? r.error : 'Failed to load detail'), 'er');
      }
    }).withFailureHandler(function(e) {
      toast('❌ ' + e.message, 'er');
    }).getDocDetail(docNo);
  }
}

    '<div class="kpi"><div class="kv" style="font-size:14px">฿' + fmt(detail.amount) + '</div><div class="kl">Amount</div></div>' +
    '<div class="kpi gn"><div class="kv" style="font-size:14px">฿' + fmt(detail.amortized) + '</div><div class="kl">Amortized</div></div>' +
    '<div class="kpi rd"><div class="kv" style="font-size:14px">฿' + fmt(detail.remaining) + '</div><div class="kl">Remaining</div></div>' +
    '</div>' +
    '<div style="font-size:11px;color:var(--mt);margin-bottom:6px">' +
    esc(detail.description || '') +
    (detail.startDate ? ' · ' + esc(detail.startDate) + ' → ' + esc(detail.endDate) : '') +

  if (schedule.length > 0) {
    html += '<div style="font-weight:500;font-size:12px;margin-bottom:4px">📅 Month-by-Month Schedule (' + schedule.length + ' of ' + (detail.scheduleRows || schedule.length) + ' rows shown)</div>' +
      '<table class="tb" style="font-size:11px"><thead><tr>' +
      '<th>Period</th><th class="num">Amort Amount</th><th class="num">Accumulated</th><th class="num">Remaining</th><th>GL</th><th>IO</th><th class="num">Days</th>' +
      '</tr></thead><tbody>' +
      schedule.map(function(s) {
        return '<tr>' +
          '<td style="font-family:JetBrains Mono,mono">' + esc(s.period) + '</td>' +
          '<td class="num">฿' + fmt(s.amortAmount) + '</td>' +
          '<td class="num">฿' + fmt(s.accumulated) + '</td>' +
          '<td class="num">฿' + fmt(s.remaining) + '</td>' +
          '<td style="font-family:JetBrains Mono,mono;font-size:10px">' + esc(s.glPrepaid || '') + '</td>' +
